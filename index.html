<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindBack 产品看板</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap');

      :root{
        --bg:                #111319;
        --surface:           #1e1f26;
        --surface-raised:    #252731;
        --surface-overlay:   #2e2f3a;

        --primary:           #b4c5ff;
        --primary-accent:    #628aff;
        --secondary:         #45dfa4;
        --tertiary:          #f9bd22;
        --danger:            #ff6b6b;

        --text-primary:      #e3e4f0;
        --text-secondary:    #8b8fa8;
        --text-disabled:     #4a4d5e;

        --radius-sm:         10px;
        --radius-md:         16px;
        --radius-lg:         24px;

        --font-display:      'Manrope', sans-serif;
        --font-body:         'Inter', sans-serif;
      }

      *{ box-sizing:border-box; margin:0; padding:0; }
      html, body{ height:100%; }
      body{
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text-primary);
        font-size: 13px;
        letter-spacing: 0.02em;
        overflow: hidden;
      }

      /* 注意：按指令禁止 1px solid 描边；全站通过背景层级与阴影区分 */

      .app{
        height:100%;
        display:flex;
      }

      /* ── Sidebar ── */
      .sidebar{
        width:220px;
        background: rgba(30,31,38,0.88);
        display:flex;
        flex-direction:column;
        padding: 18px 14px;
        gap: 16px;
      }
      .brand{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: var(--radius-md);
        background: rgba(37,39,49,0.55);
      }
      .brand-dot{
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(98,138,255,0.35);
        box-shadow: 0 0 18px rgba(98,138,255,0.22);
        flex-shrink:0;
      }
      .brand-name{
        font-family: var(--font-display);
        font-weight: 800;
        letter-spacing: 0.04em;
        font-size: 14px;
      }

      .nav{
        display:flex;
        flex-direction:column;
        gap: 6px;
        padding-top: 4px;
      }
      .nav-item{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: var(--radius-md);
        color: var(--text-secondary);
        cursor:pointer;
        transition: background .15s ease, color .15s ease, transform .15s ease;
        position: relative;
        user-select:none;
      }
      .nav-item:hover{
        background: rgba(37,39,49,0.72);
        color: var(--text-primary);
      }
      .nav-item.active{
        background: var(--surface);
        color: var(--text-primary);
      }
      .nav-item.active::before{
        content:'';
        position:absolute;
        left:0;
        top:8px;
        bottom:8px;
        width:3px;
        border-radius: 999px;
        background: var(--primary-accent);
      }
      .nav-ico{
        width: 18px;
        text-align:center;
        opacity: 0.92;
        flex-shrink:0;
      }
      .nav-label{ font-weight: 650; }
      .nav-count{
        margin-left:auto;
        font-size: 11px;
        font-weight: 800;
        color: var(--text-secondary);
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(46,47,58,0.75);
      }

      .sidebar-bottom{
        margin-top:auto;
        padding: 10px 12px;
        border-radius: var(--radius-md);
        background: rgba(98,138,255,0.12);
        color: var(--primary);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      /* ── Main ── */
      .main{
        flex:1;
        min-width:0;
        display:flex;
        flex-direction:column;
      }
      .header{
        height:64px;
        background: var(--bg);
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding: 0 24px;
        position: sticky;
        top:0;
        z-index: 10;
      }
      .header-title{
        font-family: var(--font-display);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .header-right{
        display:flex;
        align-items:center;
        gap: 10px;
        color: var(--text-secondary);
        font-size: 12px;
      }
      .btn{
        background: rgba(46,47,58,0.85);
        color: var(--text-secondary);
        border: 0;
        border-radius: var(--radius-sm);
        padding: 8px 10px;
        cursor:pointer;
        transition: background .15s ease, color .15s ease, transform .15s ease;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .btn:hover{
        background: rgba(37,39,49,1);
        color: var(--text-primary);
        transform: translateY(-1px);
      }
      .btn.primary{
        background: rgba(98,138,255,0.92);
        color: rgba(0,41,121,0.92);
      }
      .btn.primary:hover{ background: rgba(98,138,255,1); }
      .btn.ghost{
        background: rgba(46,47,58,0.25);
        color: var(--text-secondary);
      }
      .btn.danger{
        background: rgba(255,107,107,0.12);
        color: var(--danger);
      }

      .content{
        flex:1;
        overflow:auto;
        padding: 24px;
        scrollbar-width: thin;
        scrollbar-color: #2e2f3a #111319;
      }
      .content::-webkit-scrollbar{ width: 8px; height: 8px; }
      .content::-webkit-scrollbar-thumb{ background:#2e2f3a; border-radius: 999px; }
      .content::-webkit-scrollbar-track{ background:#111319; }

      /* ── Common layout ── */
      .section{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
      }
      .section + .section{ margin-top: 24px; }
      .kicker{
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        color: var(--text-secondary);
        margin-bottom: 12px;
      }

      .chip{
        display:inline-flex;
        align-items:center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
        color: var(--text-secondary);
        background: rgba(46,47,58,0.75);
        user-select:none;
      }

      .badge{
        display:inline-flex;
        align-items:center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        cursor:pointer;
        user-select:none;
        transition: opacity .15s ease, background .15s ease;
      }
      .badge:hover{ opacity: 1.1; }
      .badge.prog{ background: rgba(249,189,34,0.15); color: var(--tertiary); }
      .badge.done{ background: rgba(69,223,164,0.15); color: var(--secondary); }
      .badge.block{ background: rgba(255,107,107,0.15); color: var(--danger); }
      .badge.ns{ background: rgba(46,47,58,0.8); color: var(--text-secondary); }

      /* ── ThisWeek: focus cards（每行 4 张，多行向下排，不横滑） ── */
      .focus-grid{
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .focus-card{
        min-width: 0;
        background: var(--surface);
        border-radius: var(--radius-md);
        padding: 14px 12px;
        transition: background .15s ease, transform .15s ease;
        cursor:pointer;
      }
      .focus-card:hover{ background: var(--surface-raised); transform: translateY(-1px); }
      .focus-top{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .focus-card .chip{
        font-size: 10px;
        font-weight: 800;
        padding: 3px 7px;
        letter-spacing: 0.03em;
      }
      .focus-card .badge{
        font-size: 9px;
        font-weight: 800;
        padding: 2px 7px;
        letter-spacing: 0.05em;
        flex-shrink: 0;
      }
      .focus-top-right{
        display:flex;
        flex-wrap:wrap;
        gap: 4px;
        justify-content:flex-end;
        align-items:center;
        max-width: 68%;
      }
      .plat-tag{
        flex-shrink:0;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.03em;
        padding: 2px 6px;
        border-radius: 999px;
      }
      .plat-tag.ios{ background: rgba(180,197,255,0.18); color: var(--primary); }
      .plat-tag.android{ background: rgba(69,223,164,0.15); color: var(--secondary); }
      .plat-tag.web{ background: rgba(249,189,34,0.15); color: var(--tertiary); }
      .focus-name{
        font-family: var(--font-display);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.03em;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .focus-info{
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .focus-info-row{
        font-size: 11px;
        color: var(--text-secondary);
        line-height: 1.35;
        display: flex;
        align-items: baseline;
        gap: 4px;
        min-width: 0;
      }
      .focus-info-row .lbl{
        flex-shrink: 0;
        color: var(--text-disabled);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .focus-info-row .val{
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .meta-row{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-top: 10px;
        padding-top: 8px;
        color: var(--text-secondary);
        font-size: 10px;
        letter-spacing: 0.02em;
      }

      /* ── ThisWeek: columns ── */
      .columns3{
        display:grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
      }
      .col{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        min-height: 220px;
      }
      .col-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom: 12px;
      }
      .col-title{
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        color: var(--text-secondary);
      }
      .add-btn{
        background: rgba(46,47,58,0.75);
        border: 0;
        color: var(--text-secondary);
        border-radius: 999px;
        padding: 6px 10px;
        cursor:pointer;
        transition: background .15s ease, color .15s ease;
        font-size: 12px;
        font-weight: 900;
      }
      .add-btn:hover{ background: var(--surface-raised); color: var(--primary); }
      .list{
        display:flex;
        flex-direction:column;
        gap: 4px;
      }
      .row-item{
        height: 44px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 12px;
        padding: 0 12px;
        border-radius: var(--radius-md);
        background: rgba(37,39,49,0.75);
        cursor:pointer;
        transition: background .15s ease, transform .15s ease;
        position: relative;
      }
      .row-item:hover{ background: var(--surface-raised); transform: translateY(-1px); }
      .row-item::before{
        content:'';
        position:absolute;
        left:0;
        top: 8px;
        bottom: 8px;
        width:4px;
        border-radius: 999px;
        background: rgba(98,138,255,0.9);
      }
      .row-item.bug::before{ background: rgba(255,107,107,0.9); }
      .row-item.ops::before{ background: rgba(69,223,164,0.9); }
      .row-name{
        font-size: 14px;
        font-weight: 700;
        color: var(--text-primary);
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
      }
      .dot{
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(139,143,168,0.8);
      }
      .dot.prog{ background: rgba(249,189,34,0.9); }
      .dot.done{ background: rgba(69,223,164,0.9); }
      .dot.block{ background: rgba(255,107,107,0.9); }

      /* ── Overview ── */
      .overview-wrap{
        display:grid;
        grid-template-columns: 30% 45% 25%;
        gap: 12px;
      }
      .kpi-stack{
        display:flex;
        flex-direction:column;
        gap: 12px;
      }
      .kpi-card{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        cursor:pointer;
        transition: background .15s ease, transform .15s ease;
      }
      .kpi-card:hover{ background: var(--surface-raised); transform: translateY(-1px); }
      .kpi-label{
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        color: var(--text-secondary);
      }
      .kpi-value{
        font-family: var(--font-display);
        font-size: 32px;
        font-weight: 800;
        letter-spacing: 0.04em;
        margin-top: 10px;
      }
      .kpi-value.primary{ color: var(--primary); }
      .kpi-value.warn{ color: var(--tertiary); }
      .kpi-value.good{ color: var(--secondary); }
      .kpi-value.bad{ color: var(--danger); }
      .kpi-sub{
        margin-top: 8px;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .phase-card{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
      }
      .phase-title{
        font-family: var(--font-display);
        font-weight: 800;
        letter-spacing: 0.04em;
        font-size: 16px;
      }
      .phase-sub{
        margin-top: 8px;
        color: var(--text-secondary);
        font-size: 12px;
      }
      .bar{
        margin-top: 14px;
        height: 10px;
        background: rgba(46,47,58,0.8);
        border-radius: 999px;
        overflow:hidden;
      }
      .bar > i{
        display:block;
        height:100%;
        width: 0%;
        background: rgba(98,138,255,0.95);
        border-radius: 999px;
        box-shadow: 0 0 18px rgba(98,138,255,0.25);
        transition: width .35s ease;
      }
      .milestone-list{
        margin-top: 16px;
        display:flex;
        flex-direction:column;
        gap: 8px;
      }
      .ms-row{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 12px;
        padding: 10px 12px;
        border-radius: var(--radius-md);
        background: rgba(37,39,49,0.75);
        cursor:pointer;
        transition: background .15s ease;
      }
      .ms-row:hover{ background: var(--surface-raised); }
      .ms-left{
        display:flex;
        align-items:center;
        gap: 10px;
        min-width:0;
      }
      .ms-date{
        color: var(--text-secondary);
        font-size: 12px;
        flex-shrink:0;
      }
      .ms-name{
        font-size: 14px;
        color: var(--text-primary);
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
      }
      .ms-name.done{
        color: var(--text-disabled);
        text-decoration: line-through;
      }

      .ver-stack{
        display:flex;
        flex-direction:column;
        gap: 12px;
      }
      .ver-mini{
        background: var(--surface-raised);
        border-radius: var(--radius-md);
        padding: 14px 14px;
        cursor:pointer;
        transition: background .15s ease;
      }
      .ver-mini:hover{ background: rgba(46,47,58,0.95); }
      .ver-top{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
      }
      .ver-num{
        font-family: var(--font-display);
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .ver-plat{
        margin-top: 8px;
        color: var(--text-secondary);
        font-size: 12px;
      }
      .ver-group{
        background: rgba(37,39,49,0.55);
        border-radius: var(--radius-md);
        padding: 12px;
      }
      .ver-group + .ver-group{ margin-top: 10px; }
      .ver-group-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
        cursor:pointer;
        user-select:none;
        padding: 2px 2px 10px 2px;
        flex-wrap: wrap;
      }
      .ver-group-title{
        font-family: var(--font-display);
        font-weight: 800;
        letter-spacing: 0.04em;
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.25;
        white-space: normal;
        flex: 1 1 auto;
        min-width: 0;
      }
      .ver-group-meta{
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 750;
        line-height: 1.25;
        white-space: normal;
        flex: 0 1 auto;
      }
      .ver-related{
        margin-top: 10px;
        display:grid;
        grid-template-columns: 1fr;
        gap: 10px;
        background: rgba(30,31,38,0.55);
        border-radius: var(--radius-md);
        padding: 10px;
      }
      .ver-rel-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
      }
      .ver-rel-title{
        font-weight: 850;
        letter-spacing: 0.03em;
        color: var(--text-secondary);
        font-size: 11px;
      }
      .ver-rel-list{
        margin-top: 8px;
        display:flex;
        flex-direction:column;
        gap: 8px;
      }
      .ver-rel-item{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
        padding: 8px 10px;
        border-radius: var(--radius-md);
        background: rgba(46,47,58,0.72);
        cursor:pointer;
        transition: background .15s ease, transform .15s ease;
        min-width:0;
      }
      .ver-rel-item:hover{ background: rgba(46,47,58,0.92); transform: translateY(-1px); }
      .ver-rel-name{
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
        font-weight: 700;
        min-width:0;
      }
      .ver-rel-sub{
        color: var(--text-secondary);
        font-size: 12px;
        flex-shrink:0;
        max-width: 88px;
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
      }
      .ver-related .badge{ flex-shrink:0; white-space:nowrap; }

      /* ── Versions tab ── */
      .pill-tabs{
        display:flex;
        gap: 10px;
        margin-bottom: 16px;
      }
      .pill-tab{
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(46,47,58,0.55);
        color: var(--text-secondary);
        cursor:pointer;
        transition: background .15s ease, color .15s ease;
        font-weight: 900;
      }
      .pill-tab:hover{ background: var(--surface-raised); color: var(--text-primary); }
      .pill-tab.active{
        background: var(--surface-raised);
        color: var(--text-primary);
      }
      .version-card{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 12px;
      }
      .version-head{
        display:flex;
        align-items:center;
        gap: 12px;
        margin-bottom: 12px;
        cursor:pointer;
      }
      .version-num{
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .version-tasks{
        background: rgba(37,39,49,0.55);
        border-radius: var(--radius-md);
        padding: 12px;
      }
      .chk-row{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: var(--radius-md);
        cursor:pointer;
        transition: background .15s ease;
      }
      .chk-row:hover{ background: rgba(46,47,58,0.75); }
      .chk{
        width: 16px;
        height: 16px;
        border-radius: 6px;
        background: rgba(17,19,25,0.55);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size: 12px;
        color: rgba(0,0,0,0);
        flex-shrink:0;
        user-select:none;
      }
      .chk.done{
        background: rgba(69,223,164,0.2);
        color: var(--secondary);
      }
      .chk-name{
        flex:1;
        min-width:0;
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
        font-size: 13px;
      }
      .chk-name.done{
        color: var(--text-disabled);
        text-decoration: line-through;
      }

      /* ── Milestones tab ── */
      .phase-axis{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 12px;
      }
      .axis-line{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 12px;
      }
      .axis-node{
        flex:1;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap: 8px;
      }
      .node-dot{
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(139,143,168,0.65);
        box-shadow: none;
      }
      .axis-node.current .node-dot{
        width: 16px;
        height: 16px;
        background: rgba(98,138,255,0.95);
        box-shadow: 0 0 20px rgba(98,138,255,0.28);
      }
      .axis-node.past .node-dot{
        background: rgba(74,77,94,0.75);
      }
      .node-name{
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 800;
        text-align:center;
        line-height: 1.25;
      }
      .axis-node.current .node-name{ color: var(--text-primary); }
      .ms-group{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;

    <script>
      // Supabase REST config
      const SUPABASE_URL = 'https://youwcvqibzscimrcumej.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable__IxFWKd1RZG2qnXRKg5uhg_lxIhgDSx';
      const LEGACY_FILE = 'MindBack产品看板_部署版%20(13).html';

      const app = {
        activeTab: 'thisweek',
        accessToken: null,
        user: null,
        board: null,
        versionsPlatform: 'ios',
        backlogPhase: null,
        drawer: { open:false, kind:null, row:null },
        localOnly: false, // 写回后端（失败则进入待同步队列，前端仍保持变更）
        syncQueue: [],    // { op:'patch'|'insert'|'delete', table, idField, idValue, patch|row, tempId? }
        pendingCreateKind: null,
      };

      const TABS = [
        { id:'overview', label:'总览', ico:'⬤' },
        { id:'thisweek', label:'本周', ico:'⚡' },
        { id:'versions', label:'版本管理', ico:'⬆' },

      function $(id){ return document.getElementById(id); }
      function esc(s){ return String(s ?? '').replace(/[&<>"']/g, (m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

      function toast(type, msg){
        const el = $('toast');
        el.className = 'toast show ' + (type || '');
        el.textContent = msg;
        clearTimeout(toast._t);
        toast._t = setTimeout(()=>{ el.className = 'toast'; }, 2200);
      }

      function queueKey(){
        return 'mindback_dashboard_sync_queue_v1';
      }

      function loadQueue(){
        try{
          const raw = localStorage.getItem(queueKey());
          if(!raw) return [];
          const data = JSON.parse(raw);
          return Array.isArray(data) ? data : [];
        }catch(_e){
          return [];
        }
      }

      function saveQueue(){
        try{
          localStorage.setItem(queueKey(), JSON.stringify(app.syncQueue || []));
        }catch(_e){}
      }

      function enqueue(op){
        app.syncQueue = app.syncQueue || [];
        app.syncQueue.push({ ...op, ts: Date.now(), tries: (op.tries || 0) });
        saveQueue();
        renderHeader();
      }

      function dequeueFirst(){
        if(!app.syncQueue || app.syncQueue.length===0) return null;
        const op = app.syncQueue.shift();
        saveQueue();
        renderHeader();
        return op;
      }

      function draftKey(){
        // 按环境固定一个 key，避免与其它页面冲突
        return 'mindback_dashboard_local_draft_v1';
      }

      function loadLocalDraft(){
        try{
          const raw = localStorage.getItem(draftKey());
          if(!raw) return null;
          const data = JSON.parse(raw);
          return data && typeof data === 'object' ? data : null;
        }catch(_e){
          return null;
        }
      }

      function saveLocalDraft(){
        // 始终保存本地草稿：用于“前端先生效 + 后端同步中”的重放
        try{
          localStorage.setItem(draftKey(), JSON.stringify({ board: app.board, ts: Date.now() }));
        }catch(_e){}
      }

      function clearLocalDraft(){
        try{ localStorage.removeItem(draftKey()); }catch(_e){}
      }

      function todayStr(){
        const d = new Date();
        const pad = (n)=> String(n).padStart(2,'0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      }
      function parseYmdLocal(s){
        const m = String(s||'').trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if(!m) return null;
        const y = Number(m[1]), mo = Number(m[2]), da = Number(m[3]);
        const d = new Date(y, mo-1, da);
        if(d.getFullYear()!==y || (d.getMonth()+1)!==mo || d.getDate()!==da) return null;
        return d;
      }
      function startOfWeekMonday(d){
        const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const day = x.getDay(); // 0 Sun .. 6 Sat
        const diff = (day + 6) % 7; // Mon -> 0, Sun -> 6
        x.setDate(x.getDate() - diff);
        x.setHours(0,0,0,0);
        return x;
      }
      function endOfWeekSunday(d){
        const s = startOfWeekMonday(d);
        const e = new Date(s);
        e.setDate(e.getDate() + 6);
        e.setHours(23,59,59,999);
        return e;
      }
      function isInSameWeekMondayToSunday(a, b){
        return startOfWeekMonday(a).getTime() === startOfWeekMonday(b).getTime();
      }

      async function sbFetch(path, { method='GET', headers={}, body=null } = {}){
        const h = {
          apikey: SUPABASE_ANON_KEY,
          Authorization: 'Bearer ' + (app.accessToken || SUPABASE_ANON_KEY),
          ...headers,
        };
        const res = await fetch(SUPABASE_URL + path, {
          method,
          headers: h,
          body: body ? JSON.stringify(body) : null,
        });
        const text = await res.text();
        let json = null;
        try{ json = text ? JSON.parse(text) : null; }catch(_e){}
        if(!res.ok){
          const msg = (json && (json.message || json.error_description || json.error)) ? (json.message || json.error_description || json.error) : text;
          const err = new Error(msg || ('HTTP ' + res.status));
          err.status = res.status;
          err.payload = json || text;
          throw err;
        }
        return json;
      }

      async function selectTable(table, select='*', query=''){
        const q = query ? '&' + query.replace(/^\&+/, '') : '';
        const path = `/rest/v1/${encodeURIComponent(table)}?select=${encodeURIComponent(select)}${q}`;
        return await sbFetch(path);
      }

      async function patchById(table, idField, idValue, patch){
        if(!app.accessToken){
          toast('warn', '未登录：变更已保留，待登录后同步');
          throw new Error('not_authenticated');
        }
        const qs = `${encodeURIComponent(idField)}=eq.${encodeURIComponent(String(idValue))}`;
        const path = `/rest/v1/${encodeURIComponent(table)}?${qs}`;
        return await sbFetch(path, {
          method:'PATCH',
          headers: { 'Content-Type':'application/json', Prefer:'return=representation' },
          body: patch,
        });
      }

      async function insertRow(table, row){
        if(!app.accessToken){
          toast('warn', '未登录：新增已保留，待登录后同步');
          throw new Error('not_authenticated');
        }
        const path = `/rest/v1/${encodeURIComponent(table)}`;
        return await sbFetch(path, {
          method:'POST',
          headers: { 'Content-Type':'application/json', Prefer:'return=representation' },
          body: row,
        });
      }

      async function deleteById(table, idField, idValue){
        if(!app.accessToken){
          toast('warn', '未登录：删除已保留，待登录后同步');
          throw new Error('not_authenticated');
        }
        const qs = `${encodeURIComponent(idField)}=eq.${encodeURIComponent(String(idValue))}`;
        const path = `/rest/v1/${encodeURIComponent(table)}?${qs}`;
        return await sbFetch(path, {
          method:'DELETE',
          headers: { Prefer:'return=representation' },
        });
      }

      async function signIn(email, password){
        const path = `/auth/v1/token?grant_type=password`;
        const res = await fetch(SUPABASE_URL + path, {
          method:'POST',
          headers:{ apikey: SUPABASE_ANON_KEY, 'Content-Type':'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const text = await res.text();
        let json = null;
        try{ json = text ? JSON.parse(text) : null; }catch(_e){}
        if(!res.ok){
          const msg = (json && (json.msg || json.message || json.error_description || json.error)) ? (json.msg || json.message || json.error_description || json.error) : text;
          const err = new Error(msg || ('HTTP ' + res.status));
          err.status = res.status;
          throw err;
        }
        app.accessToken = json?.access_token || null;
        app.user = json?.user || null;
        return json;
      }

      function formatOwnersDisplay(row){
        const arr = Array.isArray(row?.owners) ? row.owners : [];
        const s = arr.map(x=>String(x||'').trim()).filter(Boolean).join('、');
        return s || '—';
      }

      function milestoneOptions(currentId){
        const ms = app.board?.milestones || [];
        let html = `<option value="">（未关联里程碑）</option>`;
        for(const m of ms){
          if(!m) continue;
          const sel = String(m.id) === String(currentId || '') ? ' selected' : '';
          html += `<option value="${esc(m.id)}"${sel}>${esc(m.title || m.id)}</option>`;
        }
        return html;
      }

      function versionSelectOptions(platform, selectedId){
        const vers = (app.board?.versions || [])
          .filter(v=>v && v.platform === platform)
          .slice()
          .sort((a,b)=>(Number(a.sort_order)||0) - (Number(b.sort_order)||0));
        let html = `<option value="">（不关联）</option>`;
        for(const v of vers){
          const sel = selectedId != null && selectedId !== '' && Number(selectedId) === Number(v.id) ? ' selected' : '';
          const lab = (v.version_num || '').trim() || ('#' + v.id);
          html += `<option value="${v.id}"${sel}>${esc(lab)}</option>`;
        }
        return html;
      }

      function readVersionSelect(elId){
        const el = $(elId);
        if(!el) return null;
        const raw = String(el.value || '').trim();
        if(raw === '') return null;
        const n = Number(raw);
        return Number.isFinite(n) ? n : null;
      }

      function taskVersionBundleFromSelects(iosEl, androidEl, webEl){
        const vi = readVersionSelect(iosEl);
        const va = readVersionSelect(androidEl);
        const vw = readVersionSelect(webEl);
        const plats = [];
        if(vi) plats.push('ios');
        if(va) plats.push('android');
        if(vw) plats.push('web');
        const vPri = vi ?? va ?? vw ?? null;
        return { version_ios_id: vi, version_android_id: va, version_web_id: vw, platforms: plats, version_id: vPri };
      }

      function taskRowPlatformsOrdered(kind, row){
        if(!row) return [];
        if(kind === 'task'){
          const from = [];
          if(row.version_ios_id) from.push('ios');
          if(row.version_android_id) from.push('android');
          if(row.version_web_id) from.push('web');
          if(from.length) return from;
          if(row.version_id != null && row.version_id !== ''){
            const v = (app.board?.versions || []).find(x=>x && Number(x.id) === Number(row.version_id));
            if(v && v.platform) return [v.platform];
          }
        }
        const pl = Array.isArray(row.platforms) ? row.platforms : [];
        const order = ['ios','android','web'];
        return order.filter(p=>pl.includes(p));
      }

      function platformTagsHtmlForFocus(kind, row){
        const tags = taskRowPlatformsOrdered(kind, row);
        return tags.map(p=>{
          const lab = p === 'ios' ? 'iOS' : p === 'android' ? '安卓' : 'Web';
          return `<span class="plat-tag ${p}">${esc(lab)}</span>`;
        }).join('');
      }

      function formatVersionForFocus(kind, row){
        if(kind !== 'task' || row == null) return '—';
        const parts = [];
        const pushVid = (vid)=>{
          if(vid == null || vid === '') return;
          const v = (app.board?.versions || []).find(x=>x && Number(x.id) === Number(vid));
          if(!v) return;
          const plat = v.platform === 'ios' ? 'iOS' : v.platform === 'android' ? '安卓' : 'Web';
          const num = (v.version_num || '').trim();
          parts.push(num ? `${plat} ${num}` : plat);
        };
        pushVid(row.version_ios_id);
        pushVid(row.version_android_id);
        pushVid(row.version_web_id);
        if(parts.length === 0) pushVid(row.version_id);
        return parts.length ? parts.join(' · ') : '—';
      }

      function priRank(p){ return p==='p0'?0 : p==='p1'?1 : p==='p2'?2 : 3; }
      function priDotCls(p){ return p==='p0' ? 'high' : p==='p1' ? 'mid' : ''; }
      function dotCls(s){ return s==='done'?'done' : s==='prog'?'prog' : s==='block'?'block' : ''; }

      function statusCycle(s){
        const order = ['ns','prog','block','done'];
        const i = Math.max(0, order.indexOf(s));
        return order[(i + 1) % order.length];
      }
      function taskStatusBadge(s){
        const cls = s==='done'?'done' : s==='prog'?'prog' : s==='block'?'block' : 'ns';
        const label = s==='done'?'已完成' : s==='prog'?'进行中' : s==='block'?'阻塞' : '待开始';
        return { cls, label };
      }

      function versionBadge(status){
        const map = {
          dev: { cls:'ns', label:'开发中' },
          testing: { cls:'prog', label:'测试中' },
          submitted: { cls:'prog', label:'已提审' },
          released: { cls:'done', label:'已发布' },
        };
        return map[status] || { cls:'ns', label:'未知' };
      }
      function versionStatusCycle(s){
        const order = ['dev','testing','submitted','released'];
        const i = Math.max(0, order.indexOf(s));
        return order[(i+1)%order.length];
      }
      function msStatusToTaskStatus(msStatus){
        if(msStatus==='done') return 'done';
        if(msStatus==='current') return 'prog';
        if(msStatus==='delay') return 'block';
        return 'ns';
      }
      function taskStatusToMsStatus(s){
        if(s==='done') return 'done';
        if(s==='prog') return 'current';
        if(s==='block') return 'delay';
        return 'plan';
      }

      async function loadBoard(){
        const [phases, versions, milestones, tasks, bugs, ops, backlog, overviewRows] = await Promise.all([
          selectTable('phases', '*', 'order=sort_order.asc'),
          selectTable('versions', '*', 'order=sort_order.asc'),
          selectTable('milestones', '*', 'order=sort_order.asc'),
          selectTable('tasks', '*', 'order=id.asc'),
          selectTable('bugs', '*', 'order=id.asc'),
          selectTable('ops_actions', '*', 'order=id.asc'),
          selectTable('backlog', '*', 'order=id.asc'),
          selectTable('board_overview', '*', 'order=month_key.desc&limit=1'),
        ]);
        const currentPhase = (Array.isArray(phases) ? phases : []).find(p=>p && p.is_current) || (phases||[])[0] || null;
        const overview = (Array.isArray(overviewRows) ? overviewRows[0] : null) || null;
        return { phases: phases||[], currentPhase, versions: versions||[], milestones: milestones||[], tasks: tasks||[], bugs: bugs||[], ops: ops||[], backlog: backlog||[], overview };
      }

          return `<div class="${active}" data-tab="${t.id}">

          syncBtn.textContent = n > 0 ? `同步(${n})` : '同步';
          syncBtn.title = n > 0 ? '将待同步变更写回后端' : '当前没有待同步变更';

      async function syncNow(){
        if(!app.syncQueue || app.syncQueue.length===0){
          await refreshRemote();
          return;
        }
        if(!app.accessToken){
          toast('warn', '请先登录管理员再同步');
          openLogin();
          return;
        }
        let processed = 0;
        while(app.syncQueue.length > 0){
          const op = app.syncQueue[0];
          try{
            if(op.op === 'patch'){
              await patchById(op.table, op.idField, op.idValue, op.patch);
              app.syncQueue.shift();
            }else if(op.op === 'delete'){
              await deleteById(op.table, op.idField, op.idValue);
              app.syncQueue.shift();
            }else if(op.op === 'insert'){
              const rows = await insertRow(op.table, op.row);
              const created = Array.isArray(rows) ? rows[0] : null;
              if(created && typeof created.id !== 'undefined' && op.tempId){
                // 替换临时 id 为真实 id
                replaceTempId(op.table, op.tempId, created.id);
              }
              app.syncQueue.shift();
            }else{
              // unknown op, drop
              app.syncQueue.shift();
            }
            processed += 1;
            saveQueue();
          }catch(e){
            console.warn('sync failed', op, e);
            // 失败先停，避免狂刷
            op.tries = (op.tries || 0) + 1;
            op.lastError = e?.message || String(e);
            saveQueue();
            toast('bad', '同步失败：检查 RLS/网络');
            break;
          }
        }
        renderHeader();
        saveLocalDraft();
        if(processed > 0 && app.syncQueue.length === 0){
          toast('ok', '已全部同步');
        }
      }

      function replaceTempId(table, tempId, realId){
        // table -> listName mapping
        const kind = table === 'tasks' ? 'task'
          : table === 'bugs' ? 'bug'
          : table === 'ops_actions' ? 'ops'
          : table === 'backlog' ? 'backlog'
          : null;
        if(!kind) return;
        const listName = kind==='task' ? 'tasks' : kind==='bug' ? 'bugs' : kind==='ops' ? 'ops' : 'backlog';
        const list = app.board?.[listName] || [];
        const idx = list.findIndex(x=> x && String(x.id) === String(tempId));
        if(idx >= 0){
          list[idx] = { ...list[idx], id: realId };
        }
      }

      async function refreshRemote(){
        app.board = await loadBoard();
        render();
      }

      function render(){
        renderNav();
        renderHeader();
        const el = $('content');
        if(!app.board){
          el.innerHTML = `<div class="section">加载中…</div>`;
          return;
        }
        if(app.activeTab==='thisweek') return renderThisWeek(el);
        if(app.activeTab==='overview') return renderOverview(el);
        if(app.activeTab==='versions') return renderVersions(el);
        if(app.activeTab==='milestones') return renderMilestones(el);
        if(app.activeTab==='backlog') return renderBacklog(el);
      }

      function kindToTable(kind){
        return kind==='task' ? 'tasks'
          : kind==='bug' ? 'bugs'
          : kind==='ops' ? 'ops_actions'
          : kind==='milestone' ? 'milestones'
          : kind==='version' ? 'versions'
          : kind==='backlog' ? 'backlog'
          : '';
      }
      function findRow(kind, id){
        const nid = (kind==='milestone') ? String(id) : Number(id);
        if(kind==='task') return (app.board.tasks||[]).find(x=>x && x.id===nid);
        if(kind==='bug') return (app.board.bugs||[]).find(x=>x && x.id===nid);
        if(kind==='ops') return (app.board.ops||[]).find(x=>x && x.id===nid);
        if(kind==='version') return (app.board.versions||[]).find(x=>x && x.id===nid);
        if(kind==='milestone') return (app.board.milestones||[]).find(x=>x && x.id===String(id));
        if(kind==='backlog') return (app.board.backlog||[]).find(x=>x && x.id===nid);
        return null;
      }

      function applyLocal(kind, id, patch){
        const listName = kind==='task' ? 'tasks'
          : kind==='bug' ? 'bugs'
          : kind==='ops' ? 'ops'
          : kind==='milestone' ? 'milestones'
          : kind==='version' ? 'versions'
          : kind==='backlog' ? 'backlog'
          : null;
        if(!listName) return;
        const list = app.board[listName] || [];
        const idx = list.findIndex(x=> x && (String(x.id)===String(id)));
        if(idx<0) return;
        app.board[listName][idx] = { ...app.board[listName][idx], ...patch };
      }

      async function drawerSave(){
        const { kind, row } = app.drawer;
        const name = $('f_name') ? $('f_name').value.trim() : '';
        const status = $('f_status') ? $('f_status').value : '';
        const priority = $('f_priority') ? $('f_priority').value : null;
        const due = $('f_due') ? $('f_due').value.trim() : null;
        const note = $('f_note') ? $('f_note').value : '';
        const module = $('f_module') ? $('f_module').value.trim() : null;
        const focus = $('f_focus') ? ($('f_focus').value === 'true') : null;
        const owners = $('f_owners')
          ? String($('f_owners').value || '')
            .split(',')
            .map(s=>s.trim())
            .filter(Boolean)
          : null;
        const versBundle = (kind === 'task' || kind === 'bug' || kind === 'ops')
          ? taskVersionBundleFromSelects('f_v_ios', 'f_v_android', 'f_v_web')
          : null;
        const thisWeekTask = kind === 'task' && $('f_this_week') ? ($('f_this_week').value === 'true') : null;
        const taskTypeVal = kind === 'task' && $('f_task_type') ? $('f_task_type').value : null;
        const sourceVal = kind === 'task' && $('f_source') ? $('f_source').value : null;
        const milestoneVal = kind === 'task' && $('f_milestone') ? String($('f_milestone').value || '').trim() : null;
        const isArchivedVal = kind === 'task' && $('f_archived') ? ($('f_archived').value === 'true') : null;
        const platformVal = kind === 'version' && $('f_platform') ? $('f_platform').value : null;
        const versionInternalSave = kind === 'version' && $('f_version_notes') ? $('f_version_notes').value : '';

        const before = structuredClone(findRow(kind, row.id));
        try{
          // optimistic update
          if(kind==='milestone'){
            applyLocal(kind, row.id, { title: name, status: taskStatusToMsStatus(status), delayed_note: note });
          }else if(kind==='version'){
            applyLocal(kind, row.id, {
              version_num: name,
              status,
              target_date: due || '',
              release_notes: note,
              notes: versionInternalSave,
              platform: platformVal || row.platform,
            });
          }else if(kind==='ops'){
            applyLocal(kind, row.id, {
              name, status, target_date: due, note, is_focus: focus,
              version_ios_id: versBundle.version_ios_id,
              version_android_id: versBundle.version_android_id,
              version_web_id: versBundle.version_web_id,
              version_id: versBundle.version_id,
            });
          }else if(kind==='bug'){
            applyLocal(kind, row.id, {
              name, status, due_date: due, note, module, is_focus: focus,
              version_ios_id: versBundle.version_ios_id,
              version_android_id: versBundle.version_android_id,
              version_web_id: versBundle.version_web_id,
              version_id: versBundle.version_id,
              platforms: versBundle.platforms,
            });
          }else if(kind==='task'){
            applyLocal(kind, row.id, {
              name, status, priority, due_date: due, note, module, is_focus: focus, owners: owners || [],
              version_ios_id: versBundle.version_ios_id,
              version_android_id: versBundle.version_android_id,
              version_web_id: versBundle.version_web_id,
              version_id: versBundle.version_id,
              platforms: versBundle.platforms,
              this_week: thisWeekTask,
              task_type: taskTypeVal,
              source: sourceVal,
              milestone_id: milestoneVal || null,
              is_archived: isArchivedVal,
            });
          }else if(kind==='backlog'){
            applyLocal(kind, row.id, { name, priority, note, module });
          }
          render();

          const patch = {};
          if(kind==='milestone'){
            patch.title = name;
            patch.status = taskStatusToMsStatus(status);
            patch.delayed_note = note;
          }else if(kind==='version'){
            patch.version_num = name;
            patch.status = status;
            patch.target_date = due || '';
            patch.release_notes = note;
            patch.notes = versionInternalSave;
            if(platformVal) patch.platform = platformVal;
          }else if(kind==='ops'){
            patch.name = name;
            patch.status = status;
            patch.target_date = due;
            patch.note = note;
            patch.is_focus = focus;
            patch.version_ios_id = versBundle.version_ios_id;
            patch.version_android_id = versBundle.version_android_id;
            patch.version_web_id = versBundle.version_web_id;
            patch.version_id = versBundle.version_id;
          }else if(kind==='bug'){
            patch.name = name;
            patch.status = status;
            patch.due_date = due;
            patch.note = note;
            patch.module = module;
            patch.is_focus = focus;
            patch.version_ios_id = versBundle.version_ios_id;
            patch.version_android_id = versBundle.version_android_id;
            patch.version_web_id = versBundle.version_web_id;
            patch.version_id = versBundle.version_id;
            patch.platforms = versBundle.platforms;
          }else if(kind==='task'){
            patch.name = name;
            patch.status = status;
            patch.priority = priority;
            patch.due_date = due;
            patch.note = note;
            patch.module = module;
            patch.is_focus = focus;
            patch.owners = owners || [];
            patch.version_ios_id = versBundle.version_ios_id;
            patch.version_android_id = versBundle.version_android_id;
            patch.version_web_id = versBundle.version_web_id;
            patch.version_id = versBundle.version_id;
            patch.platforms = versBundle.platforms;
            if(thisWeekTask !== null) patch.this_week = thisWeekTask;
            if(taskTypeVal) patch.task_type = taskTypeVal;
            if(sourceVal) patch.source = sourceVal;
            patch.milestone_id = milestoneVal || null;
            if(isArchivedVal !== null) patch.is_archived = isArchivedVal;
          }else if(kind==='backlog'){
            patch.name = name;
            patch.priority = priority;
            patch.note = note;
            patch.module = module;
          }

          await patchById(kindToTable(kind), 'id', row.id, patch);
          toast('ok', '已保存');
          saveLocalDraft();
          await refreshRemote();
          closeDrawer();
        }catch(e){
          console.warn(e);
          // 保持前端变更不回滚，进入待同步队列
          if(before){
            // 不回滚，只是记录到队列
          }
          enqueue({ op:'patch', table: kindToTable(kind), idField:'id', idValue: row.id, patch });
          saveLocalDraft();
          if(String(e.message||'').includes('not_authenticated')){
            toast('warn', '未登录：已在前端生效，待登录后同步');
          }else if(e && (e.status===401 || e.status===403)){
            toast('warn', 'RLS 未放开：已在前端生效，待修复后同步');
          }else{

      async function drawerDelete(){
        const { kind, row } = app.drawer;
        if(!row) return;
        if(!confirm('确认删除？此操作不可恢复。')) return;
        try{
          await deleteById(kindToTable(kind), 'id', row.id);
          toast('ok', '已删除');
          await refreshRemote();
          closeDrawer();
        }catch(e){
          console.warn(e);
          // 前端先删掉，后端进入待同步
          removeLocal(kind, row.id);
          render();
          enqueue({ op:'delete', table: kindToTable(kind), idField:'id', idValue: row.id });
          saveLocalDraft();
          toast('warn', '已在前端删除，待同步后端');
          closeDrawer();
        }
      }

      function removeLocal(kind, id){
        const listName = kind==='task' ? 'tasks'
          : kind==='bug' ? 'bugs'
          : kind==='ops' ? 'ops'
          : kind==='milestone' ? 'milestones'
          : kind==='version' ? 'versions'
          : kind==='backlog' ? 'backlog'
          : null;
        if(!listName) return;
        app.board[listName] = (app.board[listName] || []).filter(x=>!(x && String(x.id)===String(id)));
      }

      async function toggleStatus(kind, id){
        const row = findRow(kind, id);
        if(!row) return;
        const before = structuredClone(row);
        try{
          if(kind==='version'){
            const next = versionStatusCycle(row.status);
            applyLocal(kind, row.id, { status: next });
            render();
            await patchById('versions','id',row.id,{ status: next });
            toast('ok','已更新');
            await refreshRemote();
            return;
          }
          if(kind==='milestone'){
            const cur = msStatusToTaskStatus(row.status);
            const next = statusCycle(cur);
            applyLocal(kind, row.id, { status: taskStatusToMsStatus(next) });
            render();
            await patchById('milestones','id',row.id,{ status: taskStatusToMsStatus(next) });
            toast('ok','已更新');
            await refreshRemote();
            return;
          }
          const next = statusCycle(row.status);
          applyLocal(kind, row.id, { status: next });
          render();
          await patchById(kindToTable(kind), 'id', row.id, { status: next });
          toast('ok', '已更新');
          saveLocalDraft();
          await refreshRemote();
        }catch(e){
          console.warn(e);
          // 保持前端变更不回滚，进入待同步队列
          enqueue({ op:'patch', table: kindToTable(kind), idField:'id', idValue: row.id, patch: { status: (kind==='milestone' ? taskStatusToMsStatus(statusCycle(msStatusToTaskStatus(before.status))) : (kind==='version' ? versionStatusCycle(before.status) : statusCycle(before.status))) } });
          saveLocalDraft();
          toast('warn', '已在前端更新，待同步后端');
        }
      }

        const idx = list.findIndex(x=>x && String(x.id) === String(realId));
        if(idx >= 0) list[idx] = { ...list[idx], ...created };
      }

        el.querySelectorAll('[data-open]').forEach(x=>{

            openDrawerByKey(kind, id);

      function kpiCard(label, value, tone, sub){
        return `
          <div class="kpi-card">
            <div class="kpi-label">${esc(label)}</div>
            <div class="kpi-value ${esc(tone)}">${esc(value)}</div>
            <div class="kpi-sub">${esc(sub || '')}</div>
          </div>
        `;
      }

      function renderOverview(el){
        const tasks = (app.board.tasks || []).filter(t=>t && !t.is_archived);
        const bugs = (app.board.bugs || []).filter(b=>b && !b.is_archived && b.status !== 'done');
        const ops = (app.board.ops || []).filter(o=>o && !o.is_archived);
        const milestones = (app.board.milestones || []);
        const backlog = (app.board.backlog || []).filter(x=>x && !x.is_archived);

        const doneThisWeek = tasks.filter(t=>t.this_week && t.status==='done').length;
        const currentMs = milestones.filter(m=>m.status==='current').length;
        const openBugs = bugs.length;
        const backlogRate = backlog.length ? Math.round((tasks.filter(t=>t.moved_from_backlog_id).length / Math.max(1, backlog.length)) * 100) : 0;

        const phase = app.board.currentPhase;
        const phaseTitle = phase ? `${phase.name || ''}·${phase.theme || ''}`.replace(/\s*·\s*$/,'') : '第一阶段·稳功能基础';
        const phaseRange = phase?.month_range || '';
        const phaseDesc = phase?.description || '';

        const pTotal = 30;
        const pNow = Math.min(pTotal, 12);
        const pct = Math.round((pNow/pTotal) * 100);

        const versAll = (app.board.versions || []).slice().sort((a,b)=>(Number(a.sort_order)||0)-(Number(b.sort_order)||0));
        const now = new Date();
        const wStart = startOfWeekMonday(now);
        const wEnd = endOfWeekSunday(now);

        const classify = (v)=>{
          // 已提审/已发布：默认视为历史（用户语义：提审通过 = 上周历史）
          if(v?.status === 'submitted' || v?.status === 'released') return 'past';
          const d = parseYmdLocal(v?.target_date);
          if(d){
            if(isInSameWeekMondayToSunday(d, now)) return 'thisweek';
            if(d.getTime() < wStart.getTime()) return 'past';
            if(d.getTime() > wEnd.getTime()) return 'future';
          }
          // 无法解析日期的：先归到 other（可手工维护）
          return 'other';
        };

        const groups = {
          thisweek: versAll.filter(v=> classify(v)==='thisweek'),
          future: versAll.filter(v=> classify(v)==='future'),
          past: versAll.filter(v=> classify(v)==='past'),
          other: versAll.filter(v=> classify(v)==='other'),
        };

        // 若本周没有可解析日期的版本：每个平台兜底取最近一个“未提审/未发布”的版本放到本周区
        const pickFallbackThisWeek = ()=>{
          const picked = [];
          const plats = ['ios','android','web'];
          for(const p of plats){
            const existing = groups.thisweek.find(v=>v && v.platform===p);
            if(existing) continue;
            const cand = versAll
              .filter(v=>v && v.platform===p && v.status !== 'submitted' && v.status !== 'released')
              .slice()
              .sort((a,b)=>(Number(a.sort_order)||0)-(Number(b.sort_order)||0))
              .pop(); // 取最新一个
            if(cand) picked.push(cand);
          }
          // 避免重复
          const ids = new Set(groups.thisweek.map(v=>v.id));
          for(const v of picked){
            if(!ids.has(v.id)){
              groups.thisweek.push(v);
              // 从其它组移除
              groups.future = groups.future.filter(x=>x.id!==v.id);
              groups.other = groups.other.filter(x=>x.id!==v.id);
            }
          }
        };
        pickFallbackThisWeek();

        app.overviewVersionExpanded = app.overviewVersionExpanded || {};
        app.overviewGroupOpen = app.overviewGroupOpen || { future:false, past:false, other:false };
        app.overviewSort = app.overviewSort || {}; // key: `${vid}:${kind}` -> sortKey

        // 默认展开当周版本
        for(const v of groups.thisweek){
          if(typeof app.overviewVersionExpanded[v.id] === 'undefined') app.overviewVersionExpanded[v.id] = true;
        }

        function linkedByVersion(row, vid){
          if(!row) return false;
          const id = Number(vid);
          if(Number(row.version_id) === id) return true;
          if(Number(row.version_ios_id) === id) return true;
          if(Number(row.version_android_id) === id) return true;
          if(Number(row.version_web_id) === id) return true;
          return false;
        }
        function listByVersion(vid){
          return {
            t: tasks.filter(x=> linkedByVersion(x, vid)),
            b: bugs.filter(x=> linkedByVersion(x, vid)),
            o: ops.filter(x=> linkedByVersion(x, vid)),
          };
        }
        function opsStatusBadge(s){
          const cls = s==='done'?'done' : s==='prog'?'prog' : s==='pause'?'block' : 'ns';
          const label = s==='done'?'已完成' : s==='prog'?'进行中' : s==='pause'?'暂停' : '计划中';
          return { cls, label };
        }
        function sortList(kind, list, sortKey){
          if(!Array.isArray(list)) return [];
          if(!sortKey || sortKey === 'default') return list; // 保持当前默认顺序
          const arr = list.slice();
          if(sortKey === 'status'){
            const rank = (s)=>{
              if(kind === 'ops') return s==='prog'?0 : s==='plan'?1 : s==='pause'?2 : s==='done'?3 : 9;
              return s==='block'?0 : s==='prog'?1 : s==='ns'?2 : s==='done'?3 : 9;
            };
            arr.sort((a,b)=> rank(a?.status) - rank(b?.status));
            return arr;
          }
          if(sortKey === 'due'){
            const get = (r)=>{
              const raw = kind==='ops' ? (r?.target_date || '') : (r?.due_date || '');
              const d = parseYmdLocal(raw);
              return d ? d.getTime() : Number.POSITIVE_INFINITY;
            };
            arr.sort((a,b)=> get(a) - get(b));
            return arr;
          }
          if(sortKey === 'pri' && kind === 'task'){
            arr.sort((a,b)=> priRank(a?.priority) - priRank(b?.priority));
            return arr;
          }
          return list;
        }
        function relBlock(label, list, kind, expanded){
          if(!expanded) return '';
          const vid = String(app._overviewActiveVid || '');
          const key = `${vid}:${kind}`;
          const sortKey = app.overviewSort[key] || 'default';
          const sorted = sortList(kind, list, sortKey);
          const rows = sorted.slice(0, 12);
          const more = sorted.length > rows.length ? `<div style="color:var(--text-secondary);font-size:12px;">还有 ${sorted.length-rows.length} 条…</div>` : '';
          return `
            <div class="ver-related">
              <div class="ver-rel-head">
                <div class="ver-rel-title">${esc(label)}（${list.length}）</div>
                <select class="select" data-sort="${esc(key)}" style="width:auto;min-width:140px;padding:6px 10px;font-size:12px;">
                  <option value="default" ${sortKey==='default'?'selected':''}>默认顺序</option>
                  ${kind==='task' ? `<option value="pri" ${sortKey==='pri'?'selected':''}>按优先级</option>` : ``}
                  <option value="status" ${sortKey==='status'?'selected':''}>按状态</option>
                  <option value="due" ${sortKey==='due'?'selected':''}>按截止/目标日期</option>
                </select>
              </div>
              <div class="ver-rel-list">
                ${rows.map(r=>{
                  const badge = (kind==='ops') ? opsStatusBadge(r.status) : taskStatusBadge(r.status);
                  const sub = (kind==='ops') ? (r.target_date || '—') : (r.due_date || '—');
                  return `
                    <div class="ver-rel-item" data-open="${kind}:${esc(r.id)}">
                      <div class="ver-rel-name">${esc(r.name || '未命名')}</div>
                      <div class="ver-rel-sub">${esc(sub)}</div>
                      <span class="badge ${esc(badge.cls)}">${esc(badge.label)}</span>
                    </div>
                  `;
                }).join('') || `<div style="color:var(--text-secondary);font-size:12px;">暂无</div>`}
                ${more}
              </div>
            </div>
          `;
        }
        function verCard(v){
          const vb = versionBadge(v.status);
          const plat = v.platform==='ios'?'📱 iOS' : v.platform==='android'?'🤖 Android' : '🕸 Web';
          const expanded = !!app.overviewVersionExpanded[v.id];
          const { t, b, o } = listByVersion(v.id);
          const cnt = `${t.length} 功能 · ${b.length} Bug · ${o.length} 运营`;
          const addDefaults = v.platform==='ios'
            ? { version_ios_id: v.id, this_week: false, module:'功能开发' }
            : v.platform==='android'
              ? { version_android_id: v.id, this_week: false, module:'功能开发' }
              : { version_web_id: v.id, this_week: false, module:'功能开发' };
          return `
            <div class="ver-mini" data-vid="${esc(v.id)}">
              <div class="ver-top" style="align-items:flex-start;">
                <div style="min-width:0;">
                  <div class="ver-num" data-open="version:${esc(v.id)}">${esc(v.version_num || '')}</div>
                  <div class="ver-plat">${esc(plat)} · ${esc(v.target_date || '')}</div>
                  <div style="margin-top:6px;color:var(--text-secondary);font-size:12px;">${esc(cnt)}</div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
                  <span class="badge ${vb.cls}" data-toggle="version:${esc(v.id)}">${esc(vb.label)}</span>
                  <button class="btn ghost" type="button" data-vertogglebtn="${esc(v.id)}" style="padding:6px 10px;">${expanded?'收起':'展开'}</button>
                  <button class="btn" type="button" data-addtask="${esc(v.id)}" style="padding:6px 10px;">+ 新增功能</button>
                </div>
              </div>
              ${(() => { app._overviewActiveVid = v.id; return ''; })()}
              ${relBlock('功能', t, 'task', expanded)}
              ${relBlock('Bug', b, 'bug', expanded)}
              ${relBlock('运营', o, 'ops', expanded)}
            </div>
          `;
        }

        const weekRangeStr = `本周：${wStart.getFullYear()}-${String(wStart.getMonth()+1).padStart(2,'0')}-${String(wStart.getDate()).padStart(2,'0')} ~ ${wEnd.getFullYear()}-${String(wEnd.getMonth()+1).padStart(2,'0')}-${String(wEnd.getDate()).padStart(2,'0')}`;

        el.innerHTML = `
          <div class="overview-wrap">
            <div class="kpi-stack">
              ${kpiCard('本周完成任务数', String(doneThisWeek), 'good', '可点击筛选（待补）')}
              ${kpiCard('进行中里程碑', String(currentMs), 'primary', '可点击筛选（待补）')}
              ${kpiCard('未解决 Bug 数', String(openBugs), openBugs>0?'bad':'good', '可点击筛选（待补）')}
              ${kpiCard('本月 Backlog 处理率', backlogRate + '%', 'warn', '按 moved_from_backlog_id 粗略计算')}
            </div>

            <div class="phase-card">
              <div class="phase-title">${esc(phaseTitle)}</div>
              <div class="phase-sub">${esc(phaseRange)}</div>
              <div class="phase-sub" style="margin-top:10px;">${esc(phaseDesc)}</div>
              <div class="bar"><i style="width:${pct}%"></i></div>
              <div class="milestone-list">
                ${(milestones || []).slice(0,4).map(m=>{
                  const b = taskStatusBadge(msStatusToTaskStatus(m.status));
                  const d = m.date_short || m.date_full || '';
                  const doneCls = m.status==='done' ? 'done' : '';
                  return `
                    <div class="ms-row" data-open="milestone:${esc(m.id)}">
                      <div class="ms-left">
                        <span class="ms-date">${esc(d || '—')}</span>
                        <span class="ms-name ${doneCls}">${esc(m.title || '未命名')}</span>
                      </div>
                      <span class="badge ${b.cls}" data-toggle="milestone:${esc(m.id)}">${esc(b.label)}</span>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>

            <div class="ver-stack">
              <div class="ver-group">
                <div class="ver-group-head" data-vgroup="thisweek">
                  <div class="ver-group-title">${esc(weekRangeStr)}</div>
                  <div class="ver-group-meta"></div>
                </div>
                ${(groups.thisweek||[]).map(v=> verCard(v)).join('') || `<div style="color:var(--text-secondary);font-size:12px;padding:4px 2px;">本周暂无可解析目标日期的版本</div>`}
              </div>

              <div class="ver-group">
                <div class="ver-group-head" data-vgroup="future">
                  <div class="ver-group-title">未来版本</div>
                  <div class="ver-group-meta">${(groups.future||[]).length} 个 · 点击展开</div>
                </div>
                <div style="display:${app.overviewGroupOpen.future?'block':'none'};" data-vgroup-body="future">
                  ${(groups.future||[]).map(v=> verCard(v)).join('') || `<div style="color:var(--text-secondary);font-size:12px;padding:4px 2px;">暂无</div>`}
                </div>
              </div>

              <div class="ver-group">
                <div class="ver-group-head" data-vgroup="past">
                  <div class="ver-group-title">历史版本</div>
                  <div class="ver-group-meta">${(groups.past||[]).length} 个 · 点击展开</div>
                </div>
                <div style="display:${app.overviewGroupOpen.past?'block':'none'};" data-vgroup-body="past">
                  ${(groups.past||[]).map(v=> verCard(v)).join('') || `<div style="color:var(--text-secondary);font-size:12px;padding:4px 2px;">暂无</div>`}
                </div>
              </div>

              <div class="ver-group">
                <div class="ver-group-head" data-vgroup="other">
                  <div class="ver-group-title">未识别日期（手工维护）</div>
                  <div class="ver-group-meta">${(groups.other||[]).length} 个 · 点击展开</div>
                </div>
                <div style="display:${app.overviewGroupOpen.other?'block':'none'};" data-vgroup-body="other">
                  ${(groups.other||[]).map(v=> verCard(v)).join('') || `<div style="color:var(--text-secondary);font-size:12px;padding:4px 2px;">暂无</div>`}
                </div>
              </div>
            </div>
          </div>
        `;

        el.querySelectorAll('[data-open]').forEach(x=>{
          x.addEventListener('click', ()=>{
            const [kind, id] = x.getAttribute('data-open').split(':');
            openDrawerByKey(kind, id);
          });
        });
        el.querySelectorAll('[data-vertogglebtn]').forEach(x=>{
          x.addEventListener('click', (e)=>{
            e.stopPropagation();
            const vid = x.getAttribute('data-vertogglebtn');
            if(!vid) return;
            const id = Number(vid);
            app.overviewVersionExpanded[id] = !app.overviewVersionExpanded[id];
            render();
          });
        });
        el.querySelectorAll('[data-addtask]').forEach(x=>{
          x.addEventListener('click', (e)=>{
            e.stopPropagation();
            const vid = Number(x.getAttribute('data-addtask'));
            const v = (app.board?.versions || []).find(z=>z && Number(z.id) === Number(vid));
            if(!v){ toast('bad','未找到版本'); return; }
            const defaults = v.platform==='ios'
              ? { version_ios_id: v.id, this_week: false, module:'功能开发' }
              : v.platform==='android'
                ? { version_android_id: v.id, this_week: false, module:'功能开发' }
                : { version_web_id: v.id, this_week: false, module:'功能开发' };
            openCreateModalWithDefaults('task', defaults);
          });
        });
        el.querySelectorAll('[data-vgroup]').forEach(x=>{
          x.addEventListener('click', ()=>{
            const gid = x.getAttribute('data-vgroup');
            if(!gid || gid === 'thisweek') return;
            app.overviewGroupOpen[gid] = !app.overviewGroupOpen[gid];
            render();
          });
        });
        el.querySelectorAll('[data-sort]').forEach(x=>{
          x.addEventListener('change', (e)=>{
            e.stopPropagation();
            const k = x.getAttribute('data-sort');
            if(!k) return;
            app.overviewSort[k] = x.value;
            render();
          });
          x.addEventListener('click', (e)=> e.stopPropagation());
        });
        el.querySelectorAll('[data-toggle]').forEach(x=>{
          x.addEventListener('click', async (e)=>{
            e.stopPropagation();
            const [kind, id] = x.getAttribute('data-toggle').split(':');
            await toggleStatus(kind, id);
          });
        });
      }

      function renderVersions(el){

        const versions = (app.board.versions || []).filter(v=>v && v.platform===app.versionsPlatform);
        const tasks = (app.board.tasks || []).filter(t=>t && !t.is_archived);

        el.innerHTML = `
          <div class="pill-tabs">
            ${plats.map(p=>`<div class="pill-tab ${p===app.versionsPlatform?'active':''}" data-plat="${p}">${platLabel(p)}</div>`).join('')}
          </div>
          <div>
            ${versions.map(v=>{
              const b = versionBadge(v.status);
              const vTasks = tasks.filter(t=>{

                  || Number(t.version_ios_id) === Number(id)
                  || Number(t.version_android_id) === Number(id)
                  || Number(t.version_web_id) === Number(id);
              });
              return `
                <div class="version-card">
                  <div class="version-head" data-open="version:${esc(v.id)}">

                    <span style="margin-left:auto;color:var(--text-secondary);font-size:12px;">${esc(v.target_date || '')}</span>

                  </div>
                  <div class="version-tasks">
                    ${vTasks.map(t=>{

                        <div class="chk-row" data-open="task:${esc(t.id)}">
                          <span class="chk ${done?'done':''}">${done?'✓':''}</span>
                          <span class="chk-name ${done?'done':''}">${esc(t.name || '未命名')}</span>
                          <span class="badge ${tb.cls}" data-toggle="task:${esc(t.id)}">${esc(tb.label)}</span>
                        </div>
                      `;
