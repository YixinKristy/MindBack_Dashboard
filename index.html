<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindBack 产品看板</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap');

      :root{
        --bg:                #111319;
        --surface:           #1e1f26;
        --surface-raised:    #252731;
        --surface-overlay:   #2e2f3a;

        --primary:           #b4c5ff;
        --primary-accent:    #628aff;
        --secondary:         #45dfa4;
        --tertiary:          #f9bd22;
        --danger:            #ff6b6b;

        --text-primary:      #e3e4f0;
        --text-secondary:    #8b8fa8;
        --text-disabled:     #4a4d5e;

        --radius-sm:         10px;
        --radius-md:         16px;
        --radius-lg:         24px;

        --font-display:      'Manrope', sans-serif;
        --font-body:         'Inter', sans-serif;
      }

      *{ box-sizing:border-box; margin:0; padding:0; }
      html, body{ height:100%; }
      body{
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text-primary);
        font-size: 13px;
        letter-spacing: 0.02em;
        overflow: hidden;
      }

      /* 注意：按指令禁止 1px solid 描边；全站通过背景层级与阴影区分 */

      .app{
        height:100%;
        display:flex;
      }

      /* ── Sidebar ── */
      .sidebar{
        width:220px;
        background: rgba(30,31,38,0.88);
        display:flex;
        flex-direction:column;
        padding: 18px 14px;
        gap: 16px;
      }
      .brand{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: var(--radius-md);
        background: rgba(37,39,49,0.55);
      }
      .brand-dot{
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(98,138,255,0.35);
        box-shadow: 0 0 18px rgba(98,138,255,0.22);
        flex-shrink:0;
      }
      .brand-name{
        font-family: var(--font-display);
        font-weight: 800;
        letter-spacing: 0.04em;
        font-size: 14px;
      }

      .nav{
        display:flex;
        flex-direction:column;
        gap: 6px;
        padding-top: 4px;
      }
      .nav-item{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: var(--radius-md);
        color: var(--text-secondary);
        cursor:pointer;
        transition: background .15s ease, color .15s ease, transform .15s ease;
        position: relative;
        user-select:none;
      }
      .nav-item:hover{
        background: rgba(37,39,49,0.72);
        color: var(--text-primary);
      }
      .nav-item.active{
        background: var(--surface);
        color: var(--text-primary);
      }
      .nav-item.active::before{
        content:'';
        position:absolute;
        left:0;
        top:8px;
        bottom:8px;
        width:3px;
        border-radius: 999px;
        background: var(--primary-accent);
      }
      .nav-ico{
        width: 18px;
        text-align:center;
        opacity: 0.92;
        flex-shrink:0;
      }
      .nav-label{ font-weight: 650; }
      .nav-count{
        margin-left:auto;
        font-size: 11px;
        font-weight: 800;
        color: var(--text-secondary);
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(46,47,58,0.75);
      }

      .sidebar-bottom{
        margin-top:auto;
        padding: 10px 12px;
        border-radius: var(--radius-md);
        background: rgba(98,138,255,0.12);
        color: var(--primary);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      /* ── Main ── */
      .main{
        flex:1;
        min-width:0;
        display:flex;
        flex-direction:column;
      }
      .header{
        height:64px;
        background: var(--bg);
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding: 0 24px;
        position: sticky;
        top:0;
        z-index: 10;
      }
      .header-title{
        font-family: var(--font-display);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .header-right{
        display:flex;
        align-items:center;
        gap: 10px;
        color: var(--text-secondary);
        font-size: 12px;
      }
      .btn{
        background: rgba(46,47,58,0.85);
        color: var(--text-secondary);
        border: 0;
        border-radius: var(--radius-sm);
        padding: 8px 10px;
        cursor:pointer;
        transition: background .15s ease, color .15s ease, transform .15s ease;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .btn:hover{
        background: rgba(37,39,49,1);
        color: var(--text-primary);
        transform: translateY(-1px);
      }
      .btn.primary{
        background: rgba(98,138,255,0.92);
        color: rgba(0,41,121,0.92);
      }
      .btn.primary:hover{ background: rgba(98,138,255,1); }
      .btn.ghost{
        background: rgba(46,47,58,0.25);
        color: var(--text-secondary);
      }
      .btn.danger{
        background: rgba(255,107,107,0.12);
        color: var(--danger);
      }

      .content{
        flex:1;
        overflow:auto;
        padding: 24px;
        scrollbar-width: thin;
        scrollbar-color: #2e2f3a #111319;
      }
      .content::-webkit-scrollbar{ width: 8px; height: 8px; }
      .content::-webkit-scrollbar-thumb{ background:#2e2f3a; border-radius: 999px; }
      .content::-webkit-scrollbar-track{ background:#111319; }

      /* ── Common layout ── */
      .section{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
      }
      .section + .section{ margin-top: 24px; }
      .kicker{
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        color: var(--text-secondary);
        margin-bottom: 12px;
      }

      .chip{
        display:inline-flex;
        align-items:center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
        color: var(--text-secondary);
        background: rgba(46,47,58,0.75);
        user-select:none;
      }

      .badge{
        display:inline-flex;
        align-items:center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        cursor:pointer;
        user-select:none;
        transition: opacity .15s ease, background .15s ease;
      }
      .badge:hover{ opacity: 1.1; }
      .badge.prog{ background: rgba(249,189,34,0.15); color: var(--tertiary); }
      .badge.done{ background: rgba(69,223,164,0.15); color: var(--secondary); }
      .badge.block{ background: rgba(255,107,107,0.15); color: var(--danger); }
      .badge.ns{ background: rgba(46,47,58,0.8); color: var(--text-secondary); }

      /* ── ThisWeek: focus cards ── */
      .focus-grid{
        display:grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .focus-card{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        transition: background .15s ease, transform .15s ease;
        cursor:pointer;
      }
      .focus-card:hover{ background: var(--surface-raised); transform: translateY(-2px); }
      .focus-top{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .focus-name{
        font-family: var(--font-display);
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.04em;
        line-height: 1.2;
      }
      .meta-row{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-top: 14px;
        color: var(--text-secondary);
        font-size: 12px;
      }

      /* ── ThisWeek: columns ── */
      .columns3{
        display:grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
      }
      .col{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        min-height: 220px;
      }
      .col-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom: 12px;
      }
      .col-title{
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        color: var(--text-secondary);
      }
      .add-btn{
        background: rgba(46,47,58,0.75);
        border: 0;
        color: var(--text-secondary);
        border-radius: 999px;
        padding: 6px 10px;
        cursor:pointer;
        transition: background .15s ease, color .15s ease;
        font-size: 12px;
        font-weight: 900;
      }
      .add-btn:hover{ background: var(--surface-raised); color: var(--primary); }
      .list{
        display:flex;
        flex-direction:column;
        gap: 4px;
      }
      .row-item{
        height: 44px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 12px;
        padding: 0 12px;
        border-radius: var(--radius-md);
        background: rgba(37,39,49,0.75);
        cursor:pointer;
        transition: background .15s ease, transform .15s ease;
        position: relative;
      }
      .row-item:hover{ background: var(--surface-raised); transform: translateY(-1px); }
      .row-item::before{
        content:'';
        position:absolute;
        left:0;
        top: 8px;
        bottom: 8px;
        width:4px;
        border-radius: 999px;
        background: rgba(98,138,255,0.9);
      }
      .row-item.bug::before{ background: rgba(255,107,107,0.9); }
      .row-item.ops::before{ background: rgba(69,223,164,0.9); }
      .row-name{
        font-size: 14px;
        font-weight: 700;
        color: var(--text-primary);
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
      }
      .dot{
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(139,143,168,0.8);
      }
      .dot.prog{ background: rgba(249,189,34,0.9); }
      .dot.done{ background: rgba(69,223,164,0.9); }
      .dot.block{ background: rgba(255,107,107,0.9); }

      /* ── Overview ── */
      .overview-wrap{
        display:grid;
        grid-template-columns: 30% 45% 25%;
        gap: 12px;
      }
      .kpi-stack{
        display:flex;
        flex-direction:column;
        gap: 12px;
      }
      .kpi-card{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        cursor:pointer;
        transition: background .15s ease, transform .15s ease;
      }
      .kpi-card:hover{ background: var(--surface-raised); transform: translateY(-1px); }
      .kpi-label{
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        color: var(--text-secondary);
      }
      .kpi-value{
        font-family: var(--font-display);
        font-size: 32px;
        font-weight: 800;
        letter-spacing: 0.04em;
        margin-top: 10px;
      }
      .kpi-value.primary{ color: var(--primary); }
      .kpi-value.warn{ color: var(--tertiary); }
      .kpi-value.good{ color: var(--secondary); }
      .kpi-value.bad{ color: var(--danger); }
      .kpi-sub{
        margin-top: 8px;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .phase-card{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
      }
      .phase-title{
        font-family: var(--font-display);
        font-weight: 800;
        letter-spacing: 0.04em;
        font-size: 16px;
      }
      .phase-sub{
        margin-top: 8px;
        color: var(--text-secondary);
        font-size: 12px;
      }
      .bar{
        margin-top: 14px;
        height: 10px;
        background: rgba(46,47,58,0.8);
        border-radius: 999px;
        overflow:hidden;
      }
      .bar > i{
        display:block;
        height:100%;
        width: 0%;
        background: rgba(98,138,255,0.95);
        border-radius: 999px;
        box-shadow: 0 0 18px rgba(98,138,255,0.25);
        transition: width .35s ease;
      }
      .milestone-list{
        margin-top: 16px;
        display:flex;
        flex-direction:column;
        gap: 8px;
      }
      .ms-row{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 12px;
        padding: 10px 12px;
        border-radius: var(--radius-md);
        background: rgba(37,39,49,0.75);
        cursor:pointer;
        transition: background .15s ease;
      }
      .ms-row:hover{ background: var(--surface-raised); }
      .ms-left{
        display:flex;
        align-items:center;
        gap: 10px;
        min-width:0;
      }
      .ms-date{
        color: var(--text-secondary);
        font-size: 12px;
        flex-shrink:0;
      }
      .ms-name{
        font-size: 14px;
        color: var(--text-primary);
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
      }
      .ms-name.done{
        color: var(--text-disabled);
        text-decoration: line-through;
      }

      .ver-stack{
        display:flex;
        flex-direction:column;
        gap: 12px;
      }
      .ver-mini{
        background: var(--surface-raised);
        border-radius: var(--radius-md);
        padding: 14px 14px;
        cursor:pointer;
        transition: background .15s ease;
      }
      .ver-mini:hover{ background: rgba(46,47,58,0.95); }
      .ver-top{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
      }
      .ver-num{
        font-family: var(--font-display);
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .ver-plat{
        margin-top: 8px;
        color: var(--text-secondary);
        font-size: 12px;
      }

      /* ── Versions tab ── */
      .pill-tabs{
        display:flex;
        gap: 10px;
        margin-bottom: 16px;
      }
      .pill-tab{
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(46,47,58,0.55);
        color: var(--text-secondary);
        cursor:pointer;
        transition: background .15s ease, color .15s ease;
        font-weight: 900;
      }
      .pill-tab:hover{ background: var(--surface-raised); color: var(--text-primary); }
      .pill-tab.active{
        background: var(--surface-raised);
        color: var(--text-primary);
      }
      .version-card{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 12px;
      }
      .version-head{
        display:flex;
        align-items:center;
        gap: 12px;
        margin-bottom: 12px;
        cursor:pointer;
      }
      .version-num{
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .version-tasks{
        background: rgba(37,39,49,0.55);
        border-radius: var(--radius-md);
        padding: 12px;
      }
      .chk-row{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: var(--radius-md);
        cursor:pointer;
        transition: background .15s ease;
      }
      .chk-row:hover{ background: rgba(46,47,58,0.75); }
      .chk{
        width: 16px;
        height: 16px;
        border-radius: 6px;
        background: rgba(17,19,25,0.55);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size: 12px;
        color: rgba(0,0,0,0);
        flex-shrink:0;
        user-select:none;
      }
      .chk.done{
        background: rgba(69,223,164,0.2);
        color: var(--secondary);
      }
      .chk-name{
        flex:1;
        min-width:0;
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
        font-size: 13px;
      }
      .chk-name.done{
        color: var(--text-disabled);
        text-decoration: line-through;
      }

      /* ── Milestones tab ── */
      .phase-axis{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 12px;
      }
      .axis-line{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 12px;
      }
      .axis-node{
        flex:1;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap: 8px;
      }
      .node-dot{
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(139,143,168,0.65);
        box-shadow: none;
      }
      .axis-node.current .node-dot{
        width: 16px;
        height: 16px;
        background: rgba(98,138,255,0.95);
        box-shadow: 0 0 20px rgba(98,138,255,0.28);
      }
      .axis-node.past .node-dot{
        background: rgba(74,77,94,0.75);
      }
      .node-name{
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 800;
        text-align:center;
        line-height: 1.25;
      }
      .axis-node.current .node-name{ color: var(--text-primary); }
      .ms-group{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 12px;
      }
      .group-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom: 12px;
      }
      .group-badge{
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(37,39,49,0.65);
        color: var(--text-secondary);
        font-weight: 900;
        font-size: 11px;
        letter-spacing: 0.04em;
      }

      /* ── Backlog tab ── */
      .pool-row{
        display:flex;
        gap: 10px;
        flex-wrap:wrap;
        margin-bottom: 12px;
      }
      .pool{
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(46,47,58,0.55);
        color: var(--text-secondary);
        cursor:pointer;
        transition: background .15s ease, color .15s ease;
        font-weight: 900;
        font-size: 12px;
      }
      .pool:hover{ background: var(--surface-raised); color: var(--text-primary); }
      .pool.active{ background: var(--surface-raised); color: var(--text-primary); }
      .backlog-list .bl-row{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 12px 14px;
        display:flex;
        align-items:center;
        gap: 10px;
        margin-bottom: 10px;
        cursor:pointer;
        transition: background .15s ease;
      }
      .backlog-list .bl-row:hover{ background: var(--surface-raised); }
      .pri-dot{
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(139,143,168,0.8);
        flex-shrink:0;
      }
      .pri-dot.high{ background: rgba(255,107,107,0.95); }
      .pri-dot.mid{ background: rgba(249,189,34,0.95); }
      .bl-name{
        flex:1;
        min-width:0;
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
        font-size: 13px;
        font-weight: 750;
      }
      .bl-tags{
        display:flex;
        gap: 8px;
        flex-wrap:wrap;
        justify-content:flex-end;
      }
      .tag{
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(46,47,58,0.75);
        color: var(--text-secondary);
        font-size: 11px;
        font-weight: 800;
      }

      /* ── Drawer ── */
      .overlay{
        position: fixed;
        inset: 0;
        background: rgba(17,19,25,0.65);
        backdrop-filter: blur(8px);
        display:none;
        justify-content:flex-end;
        z-index: 50;
      }
      .overlay.open{ display:flex; }
      .drawer{
        width: 380px;
        height: 100%;
        background: var(--surface-overlay);
        display:flex;
        flex-direction:column;
      }
      .drawer-head{
        padding: 18px 18px 14px;
        position: sticky;
        top: 0;
        background: var(--surface-overlay);
        z-index: 1;
      }
      .drawer-kicker{
        color: var(--text-secondary);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        margin-bottom: 8px;
      }
      .drawer-title{
        font-family: var(--font-display);
        font-weight: 800;
        letter-spacing: 0.04em;
        font-size: 16px;
      }
      .drawer-close{
        position:absolute;
        right: 14px;
        top: 14px;
        width: 32px;
        height: 32px;
        border-radius: 999px;
        border: 0;
        background: rgba(46,47,58,0.75);
        color: var(--text-secondary);
        cursor:pointer;
        transition: background .15s ease, color .15s ease;
      }
      .drawer-close:hover{ background: rgba(37,39,49,1); color: var(--text-primary); }
      .drawer-body{
        padding: 18px;
        display:flex;
        flex-direction:column;
        gap: 12px;
        overflow:auto;
      }
      .field{
        display:flex;
        flex-direction:column;
        gap: 6px;
      }
      .label{
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        color: var(--text-secondary);
      }
      .input, .select, .textarea{
        border: 0;
        border-radius: var(--radius-md);
        background: rgba(37,39,49,0.75);
        color: var(--text-primary);
        padding: 10px 12px;
        outline:none;
        font-size: 13px;
        transition: background .15s ease;
      }
      .input:focus, .select:focus, .textarea:focus{ background: rgba(37,39,49,1); }
      .textarea{ min-height: 90px; resize: vertical; }
      .drawer-foot{
        padding: 14px 18px;

    <div class="toast" id="toast"></div>

    <script>
      // Supabase REST config
      const SUPABASE_URL = 'https://youwcvqibzscimrcumej.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable__IxFWKd1RZG2qnXRKg5uhg_lxIhgDSx';
      const LEGACY_FILE = 'MindBack产品看板_部署版%20(13).html';

      const app = {
        activeTab: 'thisweek',
        accessToken: null,
        user: null,
        board: null,
        versionsPlatform: 'ios',
        backlogPhase: null,
        drawer: { open:false, kind:null, row:null },
        localOnly: true, // 默认：只在前端生效，不写回后端
      };

      const TABS = [
        { id:'overview', label:'总览', ico:'⬤' },
        { id:'thisweek', label:'本周', ico:'⚡' },
        { id:'versions', label:'版本管理', ico:'⬆' },
        { id:'milestones', label:'里程碑', ico:'◆' },
        { id:'backlog', label:'Backlog', ico:'≡' },
      ];

      function $(id){ return document.getElementById(id); }
      function esc(s){ return String(s ?? '').replace(/[&<>"']/g, (m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

      function toast(type, msg){
        const el = $('toast');
        el.className = 'toast show ' + (type || '');
        el.textContent = msg;
        clearTimeout(toast._t);
        toast._t = setTimeout(()=>{ el.className = 'toast'; }, 2200);
      }

      function draftKey(){
        // 按环境固定一个 key，避免与其它页面冲突
        return 'mindback_dashboard_local_draft_v1';
      }

      function loadLocalDraft(){
        try{
          const raw = localStorage.getItem(draftKey());
          if(!raw) return null;
          const data = JSON.parse(raw);
          return data && typeof data === 'object' ? data : null;
        }catch(_e){
          return null;
        }
      }

      function saveLocalDraft(){
        if(!app.localOnly) return;
        try{
          localStorage.setItem(draftKey(), JSON.stringify({ board: app.board, ts: Date.now() }));
        }catch(_e){}
      }

      function clearLocalDraft(){
        try{ localStorage.removeItem(draftKey()); }catch(_e){}
      }

      function todayStr(){
        const d = new Date();
        const pad = (n)=> String(n).padStart(2,'0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      }

      async function sbFetch(path, { method='GET', headers={}, body=null } = {}){
        const h = {
          apikey: SUPABASE_ANON_KEY,
          Authorization: 'Bearer ' + (app.accessToken || SUPABASE_ANON_KEY),
          ...headers,
        };
        const res = await fetch(SUPABASE_URL + path, {
          method,
          headers: h,
          body: body ? JSON.stringify(body) : null,
        });
        const text = await res.text();
        let json = null;
        try{ json = text ? JSON.parse(text) : null; }catch(_e){}
        if(!res.ok){
          const msg = (json && (json.message || json.error_description || json.error)) ? (json.message || json.error_description || json.error) : text;
          const err = new Error(msg || ('HTTP ' + res.status));
          err.status = res.status;
          err.payload = json || text;
          throw err;
        }
        return json;
      }

      async function selectTable(table, select='*', query=''){
        const q = query ? '&' + query.replace(/^\&+/, '') : '';
        const path = `/rest/v1/${encodeURIComponent(table)}?select=${encodeURIComponent(select)}${q}`;
        return await sbFetch(path);
      }

      async function patchById(table, idField, idValue, patch){
        if(app.localOnly){
          // 本地草稿模式：不写后端
          return [{ [idField]: idValue, ...patch }];
        }
        if(!app.accessToken){
          toast('warn', '请先登录管理员以写入');
          throw new Error('not_authenticated');
        }
        const qs = `${encodeURIComponent(idField)}=eq.${encodeURIComponent(String(idValue))}`;
        const path = `/rest/v1/${encodeURIComponent(table)}?${qs}`;
        return await sbFetch(path, {
          method:'PATCH',
          headers: { 'Content-Type':'application/json', Prefer:'return=representation' },
          body: patch,
        });
      }

      async function insertRow(table, row){
        if(app.localOnly){
          // 本地草稿模式：生成临时负 id，直接落到内存
          const tmpId = -Math.floor(Math.random() * 1e9);
          return [{ id: tmpId, ...row }];
        }
        if(!app.accessToken){
          toast('warn', '请先登录管理员以写入');
          throw new Error('not_authenticated');
        }
        const path = `/rest/v1/${encodeURIComponent(table)}`;
        return await sbFetch(path, {
          method:'POST',
          headers: { 'Content-Type':'application/json', Prefer:'return=representation' },
          body: row,
        });
      }

      async function deleteById(table, idField, idValue){
        if(app.localOnly){
          return [{ [idField]: idValue }];
        }
        if(!app.accessToken){
          toast('warn', '请先登录管理员以写入');
          throw new Error('not_authenticated');
        }
        const qs = `${encodeURIComponent(idField)}=eq.${encodeURIComponent(String(idValue))}`;
        const path = `/rest/v1/${encodeURIComponent(table)}?${qs}`;
        return await sbFetch(path, {
          method:'DELETE',
          headers: { Prefer:'return=representation' },
        });
      }

      async function signIn(email, password){
        const path = `/auth/v1/token?grant_type=password`;
        const res = await fetch(SUPABASE_URL + path, {
          method:'POST',
          headers:{ apikey: SUPABASE_ANON_KEY, 'Content-Type':'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const text = await res.text();
        let json = null;
        try{ json = text ? JSON.parse(text) : null; }catch(_e){}
        if(!res.ok){
          const msg = (json && (json.msg || json.message || json.error_description || json.error)) ? (json.msg || json.message || json.error_description || json.error) : text;
          const err = new Error(msg || ('HTTP ' + res.status));
          err.status = res.status;
          throw err;
        }
        app.accessToken = json?.access_token || null;
        app.user = json?.user || null;
        return json;
      }

      function priRank(p){ return p==='p0'?0 : p==='p1'?1 : p==='p2'?2 : 3; }
      function priDotCls(p){ return p==='p0' ? 'high' : p==='p1' ? 'mid' : ''; }
      function dotCls(s){ return s==='done'?'done' : s==='prog'?'prog' : s==='block'?'block' : ''; }

      function statusCycle(s){
        const order = ['ns','prog','block','done'];
        const i = Math.max(0, order.indexOf(s));
        return order[(i + 1) % order.length];
      }
      function taskStatusBadge(s){
        const cls = s==='done'?'done' : s==='prog'?'prog' : s==='block'?'block' : 'ns';
        const label = s==='done'?'已完成' : s==='prog'?'进行中' : s==='block'?'阻塞' : '待开始';
        return { cls, label };
      }

      function versionBadge(status){
        const map = {
          dev: { cls:'ns', label:'开发中' },
          testing: { cls:'prog', label:'测试中' },
          submitted: { cls:'prog', label:'已提审' },
          released: { cls:'done', label:'已发布' },
        };
        return map[status] || { cls:'ns', label:'未知' };
      }
      function versionStatusCycle(s){
        const order = ['dev','testing','submitted','released'];
        const i = Math.max(0, order.indexOf(s));
        return order[(i+1)%order.length];
      }
      function msStatusToTaskStatus(msStatus){
        if(msStatus==='done') return 'done';
        if(msStatus==='current') return 'prog';
        if(msStatus==='delay') return 'block';
        return 'ns';
      }
      function taskStatusToMsStatus(s){
        if(s==='done') return 'done';
        if(s==='prog') return 'current';
        if(s==='block') return 'delay';
        return 'plan';
      }

      async function loadBoard(){
        const [phases, versions, milestones, tasks, bugs, ops, backlog, overviewRows] = await Promise.all([
          selectTable('phases', '*', 'order=sort_order.asc'),
          selectTable('versions', '*', 'order=sort_order.asc'),
          selectTable('milestones', '*', 'order=sort_order.asc'),
          selectTable('tasks', '*', 'order=id.asc'),
          selectTable('bugs', '*', 'order=id.asc'),
          selectTable('ops_actions', '*', 'order=id.asc'),
          selectTable('backlog', '*', 'order=id.asc'),
          selectTable('board_overview', '*', 'order=month_key.desc&limit=1'),
        ]);
        const currentPhase = (Array.isArray(phases) ? phases : []).find(p=>p && p.is_current) || (phases||[])[0] || null;
        const overview = (Array.isArray(overviewRows) ? overviewRows[0] : null) || null;
        return { phases: phases||[], currentPhase, versions: versions||[], milestones: milestones||[], tasks: tasks||[], bugs: bugs||[], ops: ops||[], backlog: backlog||[], overview };
      }

      function renderNav(){
        const el = $('nav');
        const backlogCount = (app.board?.backlog || []).filter(x=>x && !x.is_archived).length;
        el.innerHTML = TABS.map(t=>{
          const active = t.id===app.activeTab ? 'nav-item active' : 'nav-item';
          const cnt = t.id==='backlog' ? `<span class="nav-count">${backlogCount}</span>` : '';
          return `<div class="${active}" data-tab="${t.id}">
            <span class="nav-ico">${esc(t.ico)}</span>
            <span class="nav-label">${esc(t.label)}</span>
            ${cnt}
          </div>`;
        }).join('');
        el.querySelectorAll('[data-tab]').forEach(btn=>{
          btn.addEventListener('click', ()=>{
            app.activeTab = btn.getAttribute('data-tab');
            render();
          });
        });
      }

      function renderHeader(){
        const tab = TABS.find(t=>t.id===app.activeTab);
        $('headerTitle').textContent = tab ? tab.label : '看板';
        $('todayStr').textContent = todayStr();
        const p = app.board?.currentPhase;
        const badge = $('phaseBadge');
        if(p){
          badge.textContent = `${p.name || '阶段'}·${p.theme || ''}`.replace(/\s*·\s*$/,'');
        }
        const adminBtn = $('adminBtn');
        if(adminBtn){
          adminBtn.textContent = app.localOnly ? '本地草稿 ✓' : (app.accessToken ? '已登录 ✓' : '管理员登录');
        }
      }

      function render(){
        renderNav();
        renderHeader();
        const el = $('content');
        if(!app.board){
          el.innerHTML = `<div class="section">加载中…</div>`;
          return;
        }
        if(app.activeTab==='thisweek') return renderThisWeek(el);
        if(app.activeTab==='overview') return renderOverview(el);
        if(app.activeTab==='versions') return renderVersions(el);
        if(app.activeTab==='milestones') return renderMilestones(el);
        if(app.activeTab==='backlog') return renderBacklog(el);
      }

      function kindToTable(kind){
        return kind==='task' ? 'tasks'
          : kind==='bug' ? 'bugs'
          : kind==='ops' ? 'ops_actions'
          : kind==='milestone' ? 'milestones'
          : kind==='version' ? 'versions'
          : kind==='backlog' ? 'backlog'
          : '';
      }
      function findRow(kind, id){
        const nid = (kind==='milestone') ? String(id) : Number(id);
        if(kind==='task') return (app.board.tasks||[]).find(x=>x && x.id===nid);
        if(kind==='bug') return (app.board.bugs||[]).find(x=>x && x.id===nid);
        if(kind==='ops') return (app.board.ops||[]).find(x=>x && x.id===nid);
        if(kind==='version') return (app.board.versions||[]).find(x=>x && x.id===nid);
        if(kind==='milestone') return (app.board.milestones||[]).find(x=>x && x.id===String(id));
        if(kind==='backlog') return (app.board.backlog||[]).find(x=>x && x.id===nid);
        return null;
      }

      function applyLocal(kind, id, patch){
        const listName = kind==='task' ? 'tasks'
          : kind==='bug' ? 'bugs'
          : kind==='ops' ? 'ops'
          : kind==='milestone' ? 'milestones'
          : kind==='version' ? 'versions'
          : kind==='backlog' ? 'backlog'
          : null;
        if(!listName) return;
        const list = app.board[listName] || [];
        const idx = list.findIndex(x=> x && (String(x.id)===String(id)));
        if(idx<0) return;
        app.board[listName][idx] = { ...app.board[listName][idx], ...patch };
      }

      function openDrawer(kind, row){
        app.drawer = { open:true, kind, row: structuredClone(row) };
        $('overlay').classList.add('open');
        document.body.style.overflow = 'hidden';
        renderDrawer();
      }
      function closeDrawer(){
        app.drawer.open = false;
        $('overlay').classList.remove('open');
        document.body.style.overflow = '';
      }

      function openDrawerByKey(kind, id){
        const row = findRow(kind, id);
        if(!row){ toast('bad','未找到数据'); return; }
        openDrawer(kind, row);
      }

      function kindLabel(kind){
        return kind==='task' ? '编辑任务'
          : kind==='bug' ? '编辑 Bug'
          : kind==='ops' ? '编辑运营动作'
          : kind==='milestone' ? '编辑里程碑'
          : kind==='version' ? '编辑版本'
          : kind==='backlog' ? '编辑 Backlog'
          : '编辑';
      }
      function rowTitle(kind, row){
        if(kind==='milestone') return row.title || '—';
        if(kind==='version') return row.version_num || '—';
        return row.name || '—';
      }

      function statusOptions(kind, current){
        if(kind==='version'){
          const opts = ['dev','testing','submitted','released'];
          return opts.map(s=>`<option value="${s}" ${s===current?'selected':''}>${esc(versionBadge(s).label)}</option>`).join('');
        }
        const opts = ['ns','prog','block','done'];
        return opts.map(s=>`<option value="${s}" ${s===current?'selected':''}>${esc(taskStatusBadge(s).label)}</option>`).join('');
      }

      function renderDrawer(){
        const { kind, row } = app.drawer;
        if(!row) return;
        $('drawerKicker').textContent = kindLabel(kind);
        $('drawerTitle').textContent = rowTitle(kind, row);

        const body = $('drawerBody');
        const foot = $('drawerFoot');

        const nameValue = kind==='milestone' ? (row.title || '') : (row.name || '');
        const statusValue = kind==='milestone' ? msStatusToTaskStatus(row.status) : (kind==='version' ? (row.status || 'dev') : (row.status || 'ns'));
        const priorityValue = row.priority || 'p2';
        const dueValue = kind==='task' ? (row.due_date || '') : kind==='bug' ? (row.due_date || '') : kind==='ops' ? (row.target_date || '') : '';
        const noteValue = kind==='version' ? (row.release_notes || row.notes || '') : (row.note || '');
        const moduleValue = row.module || '';

        body.innerHTML = `
          <div class="field">
            <div class="label">名称</div>
            <input class="input" id="f_name" value="${esc(nameValue)}" />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="field">
              <div class="label">状态</div>
              <select class="select" id="f_status">${statusOptions(kind, statusValue)}</select>
            </div>
            ${(kind==='task' || kind==='backlog') ? `
              <div class="field">
                <div class="label">优先级</div>
                <select class="select" id="f_priority">
                  ${['p0','p1','p2','p3'].map(p=>`<option value="${p}" ${p===priorityValue?'selected':''}>${p.toUpperCase()}</option>`).join('')}
                </select>
              </div>
            ` : `<div></div>`}
          </div>

          ${(kind==='task' || kind==='bug' || kind==='ops') ? `
            <div class="field">
              <div class="label">截止日期</div>
              <input class="input" id="f_due" value="${esc(dueValue)}" placeholder="例如：2026-04-27 或 本周" />
            </div>
          ` : ''}

          ${(kind==='task' || kind==='bug' || kind==='backlog') ? `
            <div class="field">
              <div class="label">模块</div>
              <input class="input" id="f_module" value="${esc(moduleValue)}" placeholder="例如：功能开发 / Bug / 运营" />
            </div>
          ` : ''}

          ${(kind==='task' || kind==='bug' || kind==='ops') ? `
            <div class="field">
              <div class="label">本周重点</div>
              <select class="select" id="f_focus">
                <option value="false" ${row.is_focus ? '' : 'selected'}>否</option>
                <option value="true" ${row.is_focus ? 'selected' : ''}>是</option>
              </select>
            </div>
          ` : ''}

          <div class="field">
            <div class="label">备注</div>
            <textarea class="textarea" id="f_note" placeholder="点击添加备注…">${esc(noteValue)}</textarea>
          </div>
        `;

        const saveBtn = `<button class="btn primary" id="drawerSave" type="button">保存</button>`;
        const moveBtn = (kind==='task')
          ? `<button class="btn ghost" id="drawerMove" type="button">移至 Backlog</button>`
          : (kind==='backlog')
            ? `<button class="btn ghost" id="drawerToWeek" type="button">→ 移入本周</button>`
            : `<button class="btn ghost" type="button" disabled style="opacity:.55;cursor:not-allowed;">—</button>`;
        const delBtn = (kind==='milestone' || kind==='version')
          ? `<button class="btn danger" type="button" disabled style="opacity:.55;cursor:not-allowed;">删除</button>`
          : `<button class="btn danger" id="drawerDelete" type="button">删除</button>`;

        foot.innerHTML = saveBtn + moveBtn + delBtn;
        $('drawerSave').onclick = ()=> drawerSave();
        if($('drawerDelete')) $('drawerDelete').onclick = ()=> drawerDelete();
        if($('drawerMove')) $('drawerMove').onclick = ()=> moveTaskToBacklog();
        if($('drawerToWeek')) $('drawerToWeek').onclick = ()=> moveBacklogToThisWeek();
      }

      async function drawerSave(){
        const { kind, row } = app.drawer;
        const name = $('f_name') ? $('f_name').value.trim() : '';
        const status = $('f_status') ? $('f_status').value : '';
        const priority = $('f_priority') ? $('f_priority').value : null;
        const due = $('f_due') ? $('f_due').value.trim() : null;
        const note = $('f_note') ? $('f_note').value : '';
        const module = $('f_module') ? $('f_module').value.trim() : null;
        const focus = $('f_focus') ? ($('f_focus').value === 'true') : null;

        const before = structuredClone(findRow(kind, row.id));
        try{
          // optimistic update
          if(kind==='milestone'){
            applyLocal(kind, row.id, { title: name, status: taskStatusToMsStatus(status), delayed_note: note });
          }else if(kind==='version'){
            applyLocal(kind, row.id, { status, release_notes: note });
          }else if(kind==='ops'){
            applyLocal(kind, row.id, { name, status, target_date: due, note, is_focus: focus });
          }else if(kind==='bug'){
            applyLocal(kind, row.id, { name, status, due_date: due, note, module, is_focus: focus });
          }else if(kind==='task'){
            applyLocal(kind, row.id, { name, status, priority, due_date: due, note, module, is_focus: focus });
          }else if(kind==='backlog'){
            applyLocal(kind, row.id, { name, priority, note, module });
          }
          render();

          const patch = {};
          if(kind==='milestone'){
            patch.title = name;
            patch.status = taskStatusToMsStatus(status);
            patch.delayed_note = note;
          }else if(kind==='version'){
            patch.status = status;
            patch.release_notes = note;
          }else if(kind==='ops'){
            patch.name = name;
            patch.status = status;
            patch.target_date = due;
            patch.note = note;
            patch.is_focus = focus;
          }else if(kind==='bug'){
            patch.name = name;
            patch.status = status;
            patch.due_date = due;
            patch.note = note;
            patch.module = module;
            patch.is_focus = focus;
          }else if(kind==='task'){
            patch.name = name;
            patch.status = status;
            patch.priority = priority;
            patch.due_date = due;
            patch.note = note;
            patch.module = module;
            patch.is_focus = focus;
          }else if(kind==='backlog'){
            patch.name = name;
            patch.priority = priority;
            patch.note = note;
            patch.module = module;
          }

          await patchById(kindToTable(kind), 'id', row.id, patch);
          toast('ok', app.localOnly ? '已在本地保存（不影响后端）' : '已保存');
          saveLocalDraft();
          if(!app.localOnly) await refresh();
          closeDrawer();
        }catch(e){
          console.warn(e);
          // 本地草稿模式不回滚；远程模式才回滚
          if(!app.localOnly){
            if(before) applyLocal(kind, row.id, before);
            render();
          }
          if(app.localOnly){
            toast('ok', '已在本地保存（不影响后端）');
            saveLocalDraft();
            closeDrawer();
            return;
          }
          if(e && (e.status===401 || e.status===403)) toast('bad', '保存失败：RLS/未授权');
          else if(String(e.message||'').includes('not_authenticated')) toast('warn', '请先登录管理员以写入');
          else toast('bad', '保存失败');
        }
      }

      function removeLocal(kind, id){
        const listName = kind==='task' ? 'tasks'
          : kind==='bug' ? 'bugs'
          : kind==='ops' ? 'ops'
          : kind==='milestone' ? 'milestones'
          : kind==='version' ? 'versions'
          : kind==='backlog' ? 'backlog'
          : null;
        if(!listName) return;
        app.board[listName] = (app.board[listName] || []).filter(x=>!(x && String(x.id)===String(id)));
      }

      async function toggleStatus(kind, id){
        const row = findRow(kind, id);
        if(!row) return;
        const before = structuredClone(row);
        try{
          if(kind==='version'){
            const next = versionStatusCycle(row.status);
            applyLocal(kind, row.id, { status: next });
            render();
            await patchById('versions','id',row.id,{ status: next });
            toast('ok','已更新');
            await refresh();
            return;
          }
          if(kind==='milestone'){
            const cur = msStatusToTaskStatus(row.status);
            const next = statusCycle(cur);
            applyLocal(kind, row.id, { status: taskStatusToMsStatus(next) });
            render();
            await patchById('milestones','id',row.id,{ status: taskStatusToMsStatus(next) });
            toast('ok','已更新');
            await refresh();
            return;
          }
          const next = statusCycle(row.status);
          applyLocal(kind, row.id, { status: next });
          render();
          await patchById(kindToTable(kind), 'id', row.id, { status: next });
          toast('ok', app.localOnly ? '已在本地更新（不影响后端）' : '已更新');
          saveLocalDraft();
          if(!app.localOnly) await refresh();
        }catch(e){
          console.warn(e);
          if(!app.localOnly){
            applyLocal(kind, row.id, before);
            render();
            if(e && (e.status===401 || e.status===403)) toast('bad', '更新失败：RLS/未授权');
            else if(String(e.message||'').includes('not_authenticated')) toast('warn', '请先登录管理员以写入');
            else toast('bad','更新失败');
            return;
          }
          // 本地草稿模式：保持变更不回滚
          toast('ok', '已在本地更新（不影响后端）');
          saveLocalDraft();
        }
      }

        const currentId = app.board.currentPhase?.id || null;
        const milestones = app.board.milestones || [];
        const byPhase = new Map();
        phases.forEach(p=> byPhase.set(p.id, []));
        milestones.forEach(m=>{
          const pid = m.phase_id || currentId || 1;
          if(!byPhase.has(pid)) byPhase.set(pid, []);
          byPhase.get(pid).push(m);
        });

        el.innerHTML = `
          <div class="phase-axis">
            <div class="axis-line">
              ${phases.map((p)=>{
                const cls = p.is_current ? 'axis-node current' : ((p.sort_order||0) < currentSort ? 'axis-node past' : 'axis-node');
                const name = `${p.month_range || ''}·${p.theme || p.name || ''}`.replace(/^\s*·\s*/,'').replace(/\s*·\s*$/,'');
                return `
                  <div class="${cls}">
                    <div class="node-dot"></div>
                    <div class="node-name">${esc(name || p.name || '阶段')}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>

          ${phases.map(p=>{
            const list = (byPhase.get(p.id) || []).slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
            const isCurrent = !!p.is_current;
            return `
              <div class="ms-group" style="${isCurrent?'background: rgba(37,39,49,0.9);':''}">
                <div class="group-head">
                  <span class="group-badge">${esc(`${p.name || ''}·${p.month_range || ''}`.replace(/\s*·\s*$/,''))}</span>
                  <span style="color:var(--text-secondary);font-size:12px;">${esc(p.theme || '')}</span>
                </div>
                <div class="milestone-list">
                  ${list.map(m=>{
                    const b = taskStatusBadge(msStatusToTaskStatus(m.status));
                    const d = m.date_short || m.date_full || '—';
                    const doneCls = m.status==='done' ? 'done' : '';
                    return `
                      <div class="ms-row" data-open="milestone:${esc(m.id)}">
                        <div class="ms-left">
                          <span class="ms-date">${esc(d)}</span>
                          <span class="ms-name ${doneCls}">${esc(m.title || '未命名')}</span>
                        </div>
                        <span class="badge ${b.cls}" data-toggle="milestone:${esc(m.id)}">${esc(b.label)}</span>
                      </div>
                    `;
                  }).join('') || `<div style="color:var(--text-secondary)">暂无</div>`}
                </div>
              </div>
            `;
          }).join('')}
        `;

        el.querySelectorAll('[data-open]').forEach(x=>{
          x.addEventListener('click', ()=>{
            const [kind, id] = x.getAttribute('data-open').split(':');
            openDrawerByKey(kind, id);
          });
        });
        el.querySelectorAll('[data-toggle]').forEach(x=>{
          x.addEventListener('click', async (e)=>{
            e.stopPropagation();
            const [kind, id] = x.getAttribute('data-toggle').split(':');
            await toggleStatus(kind, id);
          });
        });
      }

      function renderBacklog(el){
        const phases = app.board.phases || [];
        const backlog = (app.board.backlog || []).filter(x=>x && !x.is_archived);
        const counts = new Map();
        phases.forEach(p=> counts.set(p.id, 0));
        backlog.forEach(x=>{
          const pid = x.phase_id || phases?.[0]?.id || 1;
          counts.set(pid, (counts.get(pid)||0) + 1);
        });
        if(!app.backlogPhase){
          app.backlogPhase = app.board.currentPhase?.id || (phases?.[0]?.id || null);
        }
        const filtered = backlog.filter(x=> (x.phase_id || app.backlogPhase) === app.backlogPhase)
          .slice()
          .sort((a,b)=> priRank(a.priority) - priRank(b.priority));

        el.innerHTML = `
          <div class="pool-row">
            ${phases.map(p=>{
              const active = p.id===app.backlogPhase ? 'pool active' : 'pool';
              const label = `${p.name || ''} ${p.month_range || ''}`.trim();
              return `<div class="${active}" data-pool="${esc(p.id)}">${esc(label)} · ${counts.get(p.id)||0}</div>`;
            }).join('')}
            <div style="margin-left:auto;">
              <button class="add-btn" id="addBacklogBtn" type="button">+ 新增 Backlog</button>
            </div>
          </div>

          <div class="backlog-list">
            ${filtered.map(x=>{
              const pd = priDotCls(x.priority);
              const mod = x.module || '—';
              const phase = phases.find(p=>p.id=== (x.phase_id || app.backlogPhase));
              return `
                <div class="bl-row" data-open="backlog:${esc(x.id)}">
                  <span class="pri-dot ${esc(pd)}"></span>
                  <span class="bl-name">${esc(x.name || '未命名')}</span>
                  <div class="bl-tags">
                    <span class="tag">${esc(mod)}</span>
                    <span class="tag">${esc(phase ? (phase.name || '') : '阶段')}</span>
                    <span class="tag">${esc((x.platforms||[]).slice(0,2).join('/').toUpperCase() || '—')}</span>
                  </div>
                </div>
              `;
            }).join('') || `<div class="section">暂无 Backlog</div>`}
          </div>
        `;

        el.querySelectorAll('[data-pool]').forEach(x=>{
          x.addEventListener('click', ()=>{
            app.backlogPhase = Number(x.getAttribute('data-pool'));
            render();
          });
        });
        el.querySelectorAll('[data-open]').forEach(x=>{
          x.addEventListener('click', ()=>{
            const [kind, id] = x.getAttribute('data-open').split(':');
            openDrawerByKey(kind, id);
          });
        });
        $('addBacklogBtn').addEventListener('click', ()=> quickAdd('backlog'));
      }

      async function refresh(){
        if(app.localOnly){
          toast('warn', '当前为本地草稿模式：刷新不会从后端覆盖本地修改');
          return;
        }
        app.board = await loadBoard();
        render();
      }

      function openLogin(){
        if(app.localOnly){
          // 本地草稿模式：不需要登录也能编辑
          const next = false;
          app.localOnly = next;
          clearLocalDraft();
          toast('warn', '已切换到写回后端模式（需要管理员登录）');
          render();
          return;
        }
        $('loginModal').classList.add('open');
        $('loginErr').style.display = 'none';
        $('loginErr').textContent = '';
      }
      function closeLogin(){
        $('loginModal').classList.remove('open');
        $('loginErr').style.display = 'none';
      }
      async function doLogin(){
        const email = $('loginEmail').value.trim();
        const password = $('loginPassword').value;
        const err = $('loginErr');
        err.style.display = 'none';
        try{
          await signIn(email, password);
          $('adminBtn').textContent = '已登录 ✓';
          toast('ok', '登录成功');
          closeLogin();
        }catch(e){
          err.textContent = e.message || '登录失败';
          err.style.display = 'block';
        }
      }

      $('refreshBtn').addEventListener('click', ()=> refresh().catch(e=>{ console.warn(e); toast('bad','刷新失败'); }));
      $('legacyBtn').addEventListener('click', ()=> window.open(LEGACY_FILE, '_blank'));
      $('adminBtn').addEventListener('click', openLogin);
      $('loginCancel').addEventListener('click', closeLogin);
      $('loginSubmit').addEventListener('click', doLogin);

      $('overlay').addEventListener('click', (e)=>{ if(e.target === e.currentTarget) closeDrawer(); });
      $('drawerClose').addEventListener('click', closeDrawer);
      document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') { closeDrawer(); closeLogin(); } });
      $('loginModal').addEventListener('click', (e)=>{ if(e.target === e.currentTarget) closeLogin(); });

      (async function init(){
        $('todayStr').textContent = todayStr();
        try{
          const draft = loadLocalDraft();
          if(draft?.board){
            app.board = draft.board;
            toast('warn', '已加载本地草稿（后端数据不会变）');
          }else{
            app.board = await loadBoard();
          }
          render();
        }catch(e){
          console.warn(e);
          $('content').innerHTML = `<div class="section">无法从 Supabase 读取数据，请检查网络或 RLS。</div>`;
          toast('bad','加载失败');
        }
      })();
    </script>
  </body>
</html>
