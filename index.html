<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindBack 产品看板</title>
    <!-- Luminous Curator: typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <style>
      :root{
        /* ════════════════════════════════════════
           Luminous Curator Design Tokens
        ════════════════════════════════════════ */
        --surface:                   #f5f6f8;
        --surface-container-lowest:  #ffffff;
        --surface-container-low:     #eff1f3;
        --surface-container:         #e6e8eb;
        --surface-container-high:    #e0e3e5;
        --surface-container-highest: #dadde0;

        --on-surface:                #2c2f31;
        --on-surface-variant:        #595c5e;
        --on-surface-disabled:       #9a9d9f;
        --outline:                   #737678;
        --outline-variant:           #abadaf;

        --primary:                   #254cd8;
        --on-primary:                #ffffff;
        --primary-container:         #dce3ff;
        --on-primary-container:      #001258;

        --warning:                   #c05621;
        --warning-container:         #fef3e2;
        --success:                   #1a6b40;
        --success-container:         #d4f4e6;
        --error:                     #ba1a1a;
        --error-container:           #ffdad6;
        --info:                      #006570;
        --info-container:            #b2ebf2;

        --gradient-hero-pink:        linear-gradient(135deg, #a7295a 0%, #ffc1d0 100%);
        --gradient-hero-teal:        linear-gradient(135deg, #006570 0%, #6debfd 100%);

        --radius-xs:                 0.25rem;
        --radius-sm:                 0.5rem;
        --radius-md:                 0.75rem;
        --radius-lg:                 1rem;
        --radius-xl:                 1.5rem;
        --radius-full:               9999px;

        --space-1:                   0.25rem;
        --space-2:                   0.5rem;
        --space-3:                   0.75rem;
        --space-4:                   1rem;
        --space-5:                   1.25rem;
        --space-6:                   1.5rem;
        --space-8:                   2rem;
        --space-10:                  2.5rem;
        --space-12:                  3rem;

        --shadow-sm:                 0px 2px 8px 0px rgba(44, 47, 49, 0.05);
        --shadow-md:                 0px 4px 16px 0px rgba(44, 47, 49, 0.06);
        --shadow-lg:                 0px 10px 40px 0px rgba(44, 47, 49, 0.08);
        --shadow-float:              0px 16px 48px 0px rgba(44, 47, 49, 0.10);

        --font-family:               'Manrope', 'PingFang SC', 'Noto Sans SC', sans-serif;

        --transition-fast:           0.1s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base:           0.15s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow:           0.25s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-spring:         0.3s cubic-bezier(0.34, 1.56, 0.64, 1);

        /* ── Legacy aliases (to be removed) ── */
        --bg:                        var(--surface);
        --surface-raised:            var(--surface-container-low);
        --surface-overlay:           var(--surface-container);
        --primary-accent:            var(--primary);
        --secondary:                 var(--success);
        --tertiary:                  var(--warning);
        --danger:                    var(--error);
        --text-primary:              var(--on-surface);
        --text-secondary:            var(--on-surface-variant);
        --text-disabled:             var(--on-surface-disabled);
        --font-display:              var(--font-family);
        --font-body:                 var(--font-family);
      }

      /* ── Global Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; }
      html, body { height: 100%; }
      body{
        font-family: var(--font-family);
        background-color: var(--surface);
        color: var(--on-surface);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.5;
        overflow: hidden;
      }
      a{
        color: var(--primary);
        text-decoration: none;
        transition: opacity var(--transition-base);
      }
      a:hover{ opacity: .75; }
      button, a, input, select, textarea, [role="button"]{
        transition:
          background-color var(--transition-base),
          color var(--transition-base),
          box-shadow var(--transition-base),
          opacity var(--transition-base),
          transform var(--transition-base),
          border-color var(--transition-base);
      }

      /* ── Typography Utilities ── */
      .text-display-lg{ font-size: 3.5rem; font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; color: var(--on-surface); }
      .text-display-md{ font-size: 2.5rem; font-weight: 700; line-height: 1.15; letter-spacing: -0.01em; color: var(--on-surface); }
      .text-headline-lg{ font-size: 2rem; font-weight: 600; line-height: 1.25; color: var(--on-surface); }
      .text-headline-md{ font-size: 1.5rem; font-weight: 600; line-height: 1.3; color: var(--on-surface); }
      .text-title-lg{ font-size: 1.25rem; font-weight: 600; line-height: 1.4; color: var(--on-surface); }
      .text-title-md{ font-size: 1.125rem; font-weight: 600; line-height: 1.4; color: var(--on-surface); }
      .text-title-sm{ font-size: 1rem; font-weight: 600; line-height: 1.4; color: var(--on-surface); }
      .text-body-lg{ font-size: 1rem; font-weight: 400; line-height: 1.6; color: var(--on-surface); }
      .text-body-md{ font-size: 0.875rem; font-weight: 400; line-height: 1.6; color: var(--on-surface-variant); }
      .text-body-sm{ font-size: 0.8125rem; font-weight: 400; line-height: 1.5; color: var(--on-surface-variant); }
      .text-label-lg{ font-size: 0.875rem; font-weight: 500; line-height: 1.4; color: var(--on-surface-variant); }
      .text-label-md{ font-size: 0.75rem; font-weight: 500; line-height: 1.4; color: var(--on-surface-variant); }
      .text-label-sm{ font-size: 0.6875rem; font-weight: 500; line-height: 1.4; letter-spacing: 0.02em; color: var(--on-surface-variant); }

      /* ── Core components ── */
      .card{
        background-color: var(--surface-container-lowest);
        border-radius: var(--radius-xl);
        padding: var(--space-8);
        box-shadow: var(--shadow-lg);
        border: none;
        position: relative;
        overflow: hidden;
      }
      .card--interactive{
        cursor: pointer;
        transition: box-shadow var(--transition-base), transform var(--transition-base);
      }
      .card--interactive:hover{
        box-shadow: var(--shadow-float);
        transform: translateY(-2px);
      }
      .card-inner{
        background-color: var(--surface);
        border-radius: var(--radius-lg);
        padding: var(--space-4) var(--space-5);
        border: none;
      }
      .divider{
        width: calc(100% - var(--space-8));
        margin: var(--space-4) auto;
        height: 1px;
        background-color: color-mix(in srgb, var(--outline-variant) 15%, transparent);
        border: none;
      }
      .list{ display:flex; flex-direction:column; gap: var(--space-2); }
      .list-item{
        display:flex;
        align-items:center;
        gap: var(--space-3);
        padding: var(--space-3) var(--space-4);
        border-radius: var(--radius-lg);
        background-color: var(--surface);
        border:none;
        cursor:pointer;
        transition: background-color var(--transition-base);
      }
      .list-item:hover{ background-color: var(--surface-container-low); }
      .progress-bar{
        width: 100%;
        height: 8px;
        background-color: var(--surface-container-highest);
        border-radius: var(--radius-full);
        overflow:hidden;
      }
      .progress-bar__fill{
        height: 100%;
        border-radius: var(--radius-full);
        background-color: var(--primary);
        transition: width var(--transition-slow);
      }

      /* 注意：按指令禁止 1px solid 描边；全站通过背景层级与阴影区分 */

      .app{
        height:100%;
        display:flex;
      }

      /* ── Sidebar ── */
      .sidebar{
        width:220px;
        background-color: var(--surface-container-low);
        display:flex;
        flex-direction:column;
        padding: var(--space-6) var(--space-4);
        gap: var(--space-1);
        transition: width var(--transition-base), padding var(--transition-base), opacity var(--transition-base);
        overflow:hidden;
      }
      .sidebar.collapsed{
        width: 56px;
        padding: 18px 10px;
        opacity: 1;
        pointer-events:auto;
      }
      .sidebar.collapsed .brand{
        padding: 10px 8px;
        justify-content:center;
      }
      .sidebar.collapsed .brand-logo{ width: 22px; height: 22px; }
      .sidebar.collapsed .brand-name{ display:none; }
      .sidebar.collapsed .sidebar-toggle{ right: 6px; top: 6px; width: 28px; height: 28px; }
      .sidebar.collapsed .nav-item{ justify-content:center; gap: 0; padding: 10px 8px; }
      .sidebar.collapsed .nav-label{ display:none; }
      .sidebar.collapsed .nav-count{ display:none; }
      .sidebar.collapsed .nav-ico{ width: 22px; height: 22px; }
      .sidebar.collapsed .sidebar-bottom{ display:none; }
      .brand{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: var(--radius-lg);
        background-color: var(--surface-container);
        position: relative;
      }
      .sidebar-toggle{
        position:absolute;
        right: 8px;
        top: 8px;
        width: 30px;
        height: 30px;
        border-radius: var(--radius-full);
        border:0;
        background-color: var(--surface-container-high);
        color: var(--on-surface-variant);
        cursor:pointer;
        transition: background var(--transition-base), color var(--transition-base), transform var(--transition-base);
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight: 900;
        letter-spacing: 0.04em;
      }
      .sidebar-toggle:hover{ background-color: var(--surface-container-highest); color: var(--on-surface); transform: translateY(-1px); }
      .brand-logo{
        width: 28px;
        height: 28px;
        object-fit: contain;
        flex-shrink: 0;
        display: block;
        border-radius: 6px;
      }
      .brand-name{
        font-family: var(--font-family);
        font-weight: 600;
        font-size: 1rem;
        color: var(--on-surface);
      }

      .nav{
        display:flex;
        flex-direction:column;
        gap: 6px;
        padding-top: 4px;
      }
      .nav-item{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: var(--radius-lg);
        color: var(--on-surface-variant);
        cursor:pointer;
        transition: background-color var(--transition-base), color var(--transition-base);
        position: relative;
        user-select:none;
        font-size: 0.875rem;
      }
      .nav-item:hover{
        background-color: var(--surface-container);
        color: var(--on-surface);
      }
      .nav-item.active{
        background-color: var(--primary-container);
        color: var(--primary);
        font-weight: 600;
      }
      .nav-ico{
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: inherit;
        opacity: 0.92;
      }
      .nav-ico-svg{
        display: block;
        width: 20px;
        height: 20px;
      }
      .sidebar.collapsed .nav-ico-svg{
        width: 22px;
        height: 22px;
      }
      .nav-label{ font-weight: 650; }
      .nav-count{
        margin-left:auto;
        font-size: 0.6875rem;
        font-weight: 600;
        color: var(--on-surface-variant);
        padding: 2px 8px;
        border-radius: var(--radius-full);
        background-color: var(--surface-container-highest);
      }

      .sidebar-bottom{
        margin-top:auto;
        padding: 10px 12px;
        border-radius: var(--radius-lg);
        background-color: var(--primary-container);
        color: var(--primary);
        font-size: 0.875rem;
        font-weight: 600;
      }

      /* ── Main ── */
      .main{
        flex:1;
        min-width:0;
        display:flex;
        flex-direction:column;
      }
      .header{
        height:52px;
        background: transparent;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding: 0 var(--space-10);
        position: sticky;
        top:0;
        z-index: 10;
      }
      .header-title{
        font-family: var(--font-display);
        font-size: 1.125rem;
        font-weight: 600;
        line-height: 1.35;
        letter-spacing: 0.01em;
        color: var(--on-surface);
      }
      .header-right{
        display:flex;
        align-items:center;
        gap: 10px;
        color: var(--on-surface-variant);
        font-size: 0.875rem;
      }
      .btn{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        gap: var(--space-2);
        border: none;
        cursor:pointer;
        font-family: var(--font-family);
        font-weight: 600;
        white-space: nowrap;
        text-decoration: none;
        transition:
          box-shadow var(--transition-base),
          transform var(--transition-base),
          opacity var(--transition-base),
          background-color var(--transition-base),
          color var(--transition-base);
        font-size: 0.875rem;
        padding: var(--space-2) var(--space-5);
        border-radius: var(--radius-lg);
        height: 40px;
      }
      .btn:active{ transform: scale(0.98); }
      .btn:disabled{ opacity: 0.4; cursor: not-allowed; pointer-events: none; }
      .btn.primary{
        background-color: var(--primary);
        color: var(--on-primary);
        box-shadow: 0px 3px 12px color-mix(in srgb, var(--primary) 28%, transparent);
      }
      .btn.primary:hover{
        background-color: color-mix(in srgb, var(--primary) 90%, var(--on-primary) 10%);
        box-shadow: 0px 6px 18px color-mix(in srgb, var(--primary) 32%, transparent);
        transform: translateY(-1px);
      }
      .btn.ghost{
        background: transparent;
        color: var(--on-surface-variant);
      }
      .btn.ghost:hover{
        background-color: var(--surface-container);
        color: var(--on-surface);
      }
      .btn.danger{
        background-color: var(--error-container);
        color: var(--error);
      }
      .btn.danger:hover{
        background-color: var(--error);
        color: var(--on-primary);
      }

      .content{
        flex:1;
        overflow:auto;
        padding: var(--space-5) var(--space-10) var(--space-8);
        scrollbar-width: thin;
        scrollbar-color: var(--surface-container-highest) var(--surface);
      }
      .content::-webkit-scrollbar{ width: 8px; height: 8px; }
      .content::-webkit-scrollbar-thumb{ background: var(--surface-container-highest); border-radius: var(--radius-full); }
      .content::-webkit-scrollbar-track{ background: var(--surface); }

      /* ── Common layout ── */
      .section{
        background-color: var(--surface-container-lowest);
        border-radius: var(--radius-xl);
        padding: var(--space-8);
        box-shadow: var(--shadow-lg);
      }
      .section + .section{ margin-top: var(--space-6); }
      .kicker{
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        color: var(--text-secondary);
        margin-bottom: 12px;
      }

      .chip{
        display:inline-flex;
        align-items:center;
        gap: 6px;
        padding: 3px var(--space-3);
        border-radius: var(--radius-full);
        font-size: 0.6875rem;
        font-weight: 600;
        border: none;
        white-space: nowrap;
        line-height: 1.4;
        background-color: var(--surface-container);
        color: var(--on-surface-variant);
        user-select:none;
      }
      .chip::before{
        content:'';
        display:inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background-color: currentColor;
        flex-shrink: 0;
      }
      .chip.no-dot::before{ display:none; }
      .chip.primary{ background-color: var(--primary-container); color: var(--primary); }
      .chip.success{ background-color: var(--success-container); color: var(--success); }
      .chip.warning{ background-color: var(--warning-container); color: var(--warning); }
      .chip.error{ background-color: var(--error-container); color: var(--error); }
      .chip.info{ background-color: var(--info-container); color: var(--info); }

      .badge{
        display:inline-flex;
        align-items:center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        cursor:pointer;
        user-select:none;
        transition: opacity .15s ease, background .15s ease;
      }
      .badge:hover{ opacity: 1.1; }
      /* 全局状态色（Luminous Curator） */
      .badge.ns{ background-color: var(--surface-container); color: var(--on-surface-variant); }
      .badge.prog{ background-color: var(--primary-container); color: var(--primary); }
      .badge.test{ background-color: var(--info-container); color: var(--info); }
      .badge.block{ background-color: var(--error-container); color: var(--error); }
      .badge.done{ background-color: var(--success-container); color: var(--success); }
      /* 版本状态需要更细颗粒度 */
      .badge.dev{ background-color: var(--primary-container); color: var(--primary); }
      .badge.testing{ background-color: var(--info-container); color: var(--info); }
      .badge.submitted{ background-color: var(--warning-container); color: var(--warning); }
      .badge.released{ background-color: var(--success-container); color: var(--success); }

      /* 下拉状态也使用同一套颜色（避免误触并保持全局一致） */
      .select.status-ns{ color: var(--on-surface-variant); background-color: var(--surface-container); }
      .select.status-prog{ color: var(--primary); background-color: var(--primary-container); }
      .select.status-block{ color: var(--error); background-color: var(--error-container); }
      .select.status-done{ color: var(--success); background-color: var(--success-container); }
      .select.status-plan{ color: var(--on-surface-variant); background-color: var(--surface-container); }
      .select.status-pause{ color: var(--warning); background-color: var(--warning-container); }
      .select.status-dev{ color: var(--primary); background-color: var(--primary-container); }
      .select.status-testing{ color: var(--info); background-color: var(--info-container); }
      .select.status-test{ color: var(--info); background-color: var(--info-container); }
      .select.status-submitted{ color: var(--warning); background-color: var(--warning-container); }
      .select.status-released{ color: var(--success); background-color: var(--success-container); }
      .select.status-not_started{ color: var(--on-surface-variant); background-color: var(--surface-container); }

      /* ── ThisWeek: focus cards（每行 4 张，多行向下排，不横滑） ── */
      .focus-grid{
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .focus-card{
        min-width: 0;
        background: var(--surface);
        border-radius: var(--radius-md);
        padding: 14px 12px;
        transition: background .15s ease, transform .15s ease;
        cursor:pointer;
      }
      .focus-card:hover{ background: var(--surface-raised); transform: translateY(-1px); }
      .focus-top{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .focus-card .chip{
        font-size: 10px;
        font-weight: 800;
        padding: 3px 7px;
        letter-spacing: 0.03em;
      }
      .focus-card .badge{
        font-size: 9px;
        font-weight: 800;
        padding: 2px 7px;
        letter-spacing: 0.05em;
        flex-shrink: 0;
      }
      .focus-top-right{
        display:flex;
        flex-wrap:wrap;
        gap: 4px;
        justify-content:flex-end;
        align-items:center;
        max-width: 68%;
      }
      .plat-tag{
        flex-shrink:0;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.03em;
        padding: 2px 6px;
        border-radius: 999px;
      }
      .plat-tag.ios{ background-color: var(--primary-container); color: var(--primary); }
      .plat-tag.android{ background-color: var(--success-container); color: var(--success); }
      .plat-tag.web{ background-color: var(--warning-container); color: var(--warning); }
      .focus-name{
        font-family: var(--font-display);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.03em;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .focus-info{
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .focus-info-row{
        font-size: 11px;
        color: var(--text-secondary);
        line-height: 1.35;
        display: flex;
        align-items: baseline;
        gap: 4px;
        min-width: 0;
      }
      .focus-info-row .lbl{
        flex-shrink: 0;
        color: var(--text-disabled);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .focus-info-row .val{
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .meta-row{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-top: 10px;
        padding-top: 8px;
        color: var(--text-secondary);
        font-size: 10px;
        letter-spacing: 0.02em;
      }

      /* ── ThisWeek: columns ── */
      .tw-followup-bar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: var(--space-3);
        flex-wrap:wrap;
        margin-bottom: var(--space-3);
      }
      .tw-followup-bar .kicker{
        margin-bottom: 0;
      }
      .tw-risk-filter{
        display:inline-flex;
        align-items:center;
        gap: 8px;
        cursor:pointer;
        font-size: 0.8125rem;
        font-weight: 650;
        color: var(--text-secondary);
        user-select:none;
        flex-shrink:0;
      }
      .columns3{
        display:grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
      }
      .col{
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 24px;
        min-height: 220px;
      }
      .col-head{
        display:flex;
        align-items:center;
        justify-content:space-between;

      .phase-card{

        const a = 'viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"';

        const body = paths[kind] || paths.overview;
        return `<svg class="nav-ico-svg" ${a} aria-hidden="true">${body}</svg>`;

      function $(id){ return document.getElementById(id); }

      function todayStr(){
        const d = new Date();
        const pad = (n)=> String(n).padStart(2,'0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      }
      function parseYmdLocal(s){
        const m = String(s||'').trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if(!m) return null;
        const y = Number(m[1]), mo = Number(m[2]), da = Number(m[3]);
        const d = new Date(y, mo-1, da);
        if(d.getFullYear()!==y || (d.getMonth()+1)!==mo || d.getDate()!==da) return null;
        return d;
      }
      function startOfWeekMonday(d){
        const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const day = x.getDay(); // 0 Sun .. 6 Sat
        const diff = (day + 6) % 7; // Mon -> 0, Sun -> 6
        x.setDate(x.getDate() - diff);
        x.setHours(0,0,0,0);
        return x;
      }
      function endOfWeekSunday(d){
        const s = startOfWeekMonday(d);
        const e = new Date(s);
        e.setDate(e.getDate() + 6);
        e.setHours(23,59,59,999);
        return e;
      }
      function isInSameWeekMondayToSunday(a, b){
        return startOfWeekMonday(a).getTime() === startOfWeekMonday(b).getTime();
      }
      function formatMdRange(startDate){
        if(!(startDate instanceof Date)) return '—';
        const s = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
        const e = new Date(s); e.setDate(e.getDate()+6);
        const m1 = s.getMonth()+1, d1 = s.getDate();
        const m2 = e.getMonth()+1, d2 = e.getDate();
        return `${m1}月${d1}日 - ${m2}月${d2}日`;
      }
      function formatSlashRange(ws){
        const s = parseYmdLocal(ws);
        if(!s) return '';
        const e = new Date(s); e.setDate(e.getDate()+6);
        const m1 = s.getMonth()+1, d1 = s.getDate();
        const m2 = e.getMonth()+1, d2 = e.getDate();
        return `${m1}/${d1}-${m2}/${d2}`;
      }
      function firstYmdFromMaybeRange(s){
        const raw = String(s||'').trim();
        if(!raw) return '';
        if(raw.includes('~')) return raw.split('~')[0].trim();
        if(raw.includes(' - ')) return raw.split(' - ')[0].trim();
        return raw;
      }
      function parseRangeYmd(raw){
        const s = String(raw||'').trim();
        if(!s) return { start:null, end:null };
        if(s.includes('~')){
          const [a,b] = s.split('~').map(x=>x.trim());
          const ds = parseYmdLocal(a);
          const de = parseYmdLocal(b);
          if(ds && de) return { start: ds, end: de };
          const d1 = parseYmdLocal(a || b);
          return { start: d1, end: d1 };
        }
        const d = parseYmdLocal(s);
        return { start:d, end:d };
      }
      function guessOverviewYear(){
        const raw = String(app?.board?.currentPhase?.month_range || '').trim();
        const m = raw.match(/(\d{4})/);
        if(m) return Number(m[1]);
        return new Date().getFullYear();
      }
      function parseSlashMdWeekRange(s, year){
        const t = String(s||'').trim();
        if(!t) return { start:null, end:null };
        const norm = t.replace(/–|—/g, '-');
        const mm = norm.match(/^(\d{1,2})\/(\d{1,2})-(\d{1,2})\/(\d{1,2})$/);
        if(mm){
          const ds = new Date(year, Number(mm[1])-1, Number(mm[2]));
          let de = new Date(year, Number(mm[3])-1, Number(mm[4]));
          if(ds.getMonth() !== Number(mm[1])-1 || ds.getDate() !== Number(mm[2])) return { start:null, end:null };
          if(de.getMonth() !== Number(mm[3])-1 || de.getDate() !== Number(mm[4])) return { start:null, end:null };
          if(de.getTime() < ds.getTime()){
            de = new Date(year+1, Number(mm[3])-1, Number(mm[4]));
          }
          return { start: ds, end: de };
        }
        const sm = norm.match(/^(\d{1,2})\/(\d{1,2})$/);
        if(sm){
          const d = new Date(year, Number(sm[1])-1, Number(sm[2]));
          if(d.getMonth() !== Number(sm[1])-1 || d.getDate() !== Number(sm[2])) return { start:null, end:null };
          return { start:d, end:d };
        }
        return { start:null, end:null };
      }
      function parseMilestoneRange(m){
        if(!m) return { start:null, end:null };
        const rawFull = String(m.date_full||'').trim();
        const rawShort = String(m.date_short||'').trim();
        let r = parseRangeYmd(rawFull);
        if(r.start && r.end) return r;
        r = parseRangeYmd(rawShort);
        if(r.start && r.end) return r;
        const y = guessOverviewYear();
        r = parseSlashMdWeekRange(rawFull, y);
        if(r.start && r.end) return r;
        return parseSlashMdWeekRange(rawShort, y);
      }
      function milestoneWeekStartFromRange(m){
        const { start } = parseMilestoneRange(m);
        if(!start) return null;
        return startOfWeekMonday(start);
      }
      function buildOverviewMilestoneTimeline(phaseMilestones){
        const list = (phaseMilestones || []).filter(Boolean);
        const withWs = [];
        const noWs = [];
        for(const m of list){
          const ws = milestoneWeekStartFromRange(m);
          if(ws) withWs.push({ m, ws });
          else noWs.push(m);
        }
        withWs.sort((a,b)=> a.ws.getTime() - b.ws.getTime());
        const rows = [];
        for(let i=0;i<withWs.length;i++){
          if(i > 0){
            let gapStart = new Date(withWs[i-1].ws);
            gapStart.setDate(gapStart.getDate() + 7);
            while(gapStart.getTime() < withWs[i].ws.getTime()){
              rows.push({ type:'gap', weekStart: new Date(gapStart) });
              gapStart.setDate(gapStart.getDate() + 7);
            }
          }
          rows.push({ type:'ms', m: withWs[i].m });
        }
        noWs.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
        for(const m of noWs){
          rows.push({ type:'ms', m });
        }
        return rows;
      }

      }

      }
      function rangesOverlap(aStart, aEnd, bStart, bEnd){
        if(!(aStart instanceof Date) || !(aEnd instanceof Date) || !(bStart instanceof Date) || !(bEnd instanceof Date)) return false;
        const as = new Date(aStart.getFullYear(), aStart.getMonth(), aStart.getDate()).getTime();
        const ae = new Date(aEnd.getFullYear(), aEnd.getMonth(), aEnd.getDate()).getTime();
        const bs = new Date(bStart.getFullYear(), bStart.getMonth(), bStart.getDate()).getTime();
        const be = new Date(bEnd.getFullYear(), bEnd.getMonth(), bEnd.getDate()).getTime();
        return Math.max(as, bs) <= Math.min(ae, be);
      }
      function formatYmdZh(s){
        const d = parseYmdLocal(s);
        if(!d) return String(s||'').trim();
        return `${d.getMonth()+1}月${d.getDate()}日`;
      }
      function formatDateOrRange(s){
        const raw = String(s||'').trim();
        if(!raw) return '';
        if(raw.includes('~')){
          const [a,b] = raw.split('~').map(x=>x.trim());
          if(a && b) return `${formatYmdZh(a)} - ${formatYmdZh(b)}`;
          return formatYmdZh(a || b);
        }
        return formatYmdZh(raw);
      }
      function ymd(d){
        const pad = (n)=> String(n).padStart(2,'0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      }

      function readAuthCache(){

      function isJwtExpiredMessage(msg){
        const s = String(msg || '');
        return /JWT expired|jwt expired|token expired|Invalid JWT|invalid jwt|session (?:expired|not found)/i.test(s);
      }

      /** 写入请求前：access将过期时用 refresh_token 换新，避免 PATCH/同步报 401 */
      async function ensureAccessTokenFresh(){
        if(!app.accessToken) return;
        const auth = readAuthCache();
        const rt = auth?.refresh_token;
        if(!rt) return;
        const exp = Number(auth?.expires_at || 0);
        const skewMs = 120 * 1000;
        if(exp && Date.now() < exp - skewMs) return;
        try{
          await refreshSession(rt);
        }catch(e){
          console.warn('ensureAccessTokenFresh: refresh failed', e);
        }
      }

      async function sbFetch(path, { method='GET', headers={}, body=null, _retry=0 } = {}){
        const h = {
          apikey: SUPABASE_ANON_KEY,
          Authorization: 'Bearer ' + (app.accessToken || SUPABASE_ANON_KEY),
          ...headers,
        };
        const res = await fetch(SUPABASE_URL + path, {
          method,
          headers: h,
          body: body ? JSON.stringify(body) : null,
        });
        const text = await res.text();
        let json = null;
        try{ json = text ? JSON.parse(text) : null; }catch(_e){}
        if(!res.ok){
          const msg = (json && (json.message || json.error_description || json.error)) ? (json.message || json.error_description || json.error) : text;
          const jwtExpired = res.status === 401 && app.accessToken && isJwtExpiredMessage(msg);
          if(jwtExpired && _retry < 1){
            const auth = readAuthCache();
            const rt = auth?.refresh_token;
            if(rt){
              try{
                await refreshSession(rt);
                return await sbFetch(path, { method, headers, body, _retry: _retry + 1 });
              }catch(_r){
                console.warn('sbFetch: refresh after401 failed', _r);
              }
            }
          }
          const err = new Error(msg || ('HTTP ' + res.status));
          err.status = res.status;
          err.payload = json || text;
          throw err;
        }
        return json;
      }

          if(row.version_ios_id) from.push('ios');
          if(row.version_android_id) from.push('android');
          if(row.version_web_id) from.push('web');
          if(from.length) return from;
          if(row.version_id != null && row.version_id !== ''){
            const v = (app.board?.versions || []).find(x=>x && Number(x.id) === Number(row.version_id));
            if(v && v.platform) return [v.platform];
          }
        }
        const pl = Array.isArray(row.platforms) ? row.platforms : [];
        const order = ['ios','android','web'];
        return order.filter(p=>pl.includes(p));
      }

      function platformTagsHtmlForFocus(kind, row){
        const tags = taskRowPlatformsOrdered(kind, row);
        return tags.map(p=>{
          const lab = p === 'ios' ? 'iOS' : p === 'android' ? '安卓' : 'Web';
          return `<span class="plat-tag ${p}">${esc(lab)}</span>`;
        }).join('');
      }

      function backlogPlatformsFromVersions(row){
        if(!row) return [];
        const plats = [];
        if(row.version_ios_id) plats.push('ios');
        if(row.version_android_id) plats.push('android');
        if(row.version_web_id) plats.push('web');
        if(plats.length) return plats;
        return Array.isArray(row.platforms) ? row.platforms : [];
      }

      function formatBacklogVersionHint(row){
        if(!row) return '';
        const parts = [];
        const pushVid = (vid)=>{
          if(vid==null || vid==='') return;
          const v = (app.board?.versions || []).find(x=>x && Number(x.id) === Number(vid));
          if(!v) return;
          const plat = v.platform === 'ios' ? 'iOS' : v.platform === 'android' ? '安卓' : 'Web';
          const num = (v.version_num || '').trim();
          parts.push(num ? `${plat} ${num}` : plat);
        };
        pushVid(row.version_ios_id);
        pushVid(row.version_android_id);
        pushVid(row.version_web_id);
        if(!parts.length) pushVid(row.version_id);
        return parts.join(' · ');
      }
      function backlogItemKindLabel(k){
        return k==='bug' ? 'Bug' : k==='ops' ? '运营' : '功能';
      }
      function formatVersionForFocus(kind, row){
        if(kind !== 'task' || row == null) return '—';
        const parts = [];
        const pushVid = (vid)=>{
          if(vid == null || vid === '') return;
          const v = (app.board?.versions || []).find(x=>x && Number(x.id) === Number(vid));
          if(!v) return;
          const plat = v.platform === 'ios' ? 'iOS' : v.platform === 'android' ? '安卓' : 'Web';
          const num = (v.version_num || '').trim();
          parts.push(num ? `${plat} ${num}` : plat);
        };
        pushVid(row.version_ios_id);
        pushVid(row.version_android_id);
        pushVid(row.version_web_id);
        if(parts.length === 0) pushVid(row.version_id);
        return parts.length ? parts.join(' · ') : '—';

      function priRank(p){ return p==='p0'?0 : p==='p1'?1 : p==='p2'?2 : 3; }
      function priDotCls(p){ return p==='p0' ? 'high' : p==='p1' ? 'mid' : ''; }
      function dotCls(s){ return s==='done'?'done' : s==='prog'?'prog' : s==='test'?'test' : s==='block'?'block' : ''; }

      function statusCycle(s){
        const order = ['ns','prog','test','block','done'];
        const i = Math.max(0, order.indexOf(s));
        return order[(i + 1) % order.length];
      }
      function taskStatusBadge(s){
        const cls = s==='done'?'done' : s==='prog'?'prog' : s==='test'?'test' : s==='block'?'block' : 'ns';
        const label = s==='done'?'已完成' : s==='prog'?'进行中' : s==='test'?'测试中' : s==='block'?'阻塞' : '待开始';
        return { cls, label };
      }
      function opsStatusBadge(s){
        const cls = s==='done'?'done' : s==='prog'?'prog' : s==='pause'?'block' : 'ns';
        const label = s==='done'?'已完成' : s==='prog'?'进行中' : s==='pause'?'暂停' : '计划中';
        return { cls, label };
      }

      function linkedByVersion(row, vid){
        if(!row) return false;
        const id = Number(vid);
        if(Number(row.version_id) === id) return true;
        if(Number(row.version_ios_id) === id) return true;
        if(Number(row.version_android_id) === id) return true;
        if(Number(row.version_web_id) === id) return true;
        return false;
      }
      function rowLinkedVersions(row){
        const ids = [];
        if(!row) return ids;
        if(row.version_id) ids.push(Number(row.version_id));
        if(row.version_ios_id) ids.push(Number(row.version_ios_id));
        if(row.version_android_id) ids.push(Number(row.version_android_id));
        if(row.version_web_id) ids.push(Number(row.version_web_id));
        return Array.from(new Set(ids.filter(x=>Number.isFinite(x))));
      }
      function rowHasReleasedVersion(row){
        const vids = rowLinkedVersions(row);
        if(!vids.length) return false;
        const vers = app.board?.versions || [];
        return vids.some(id=>{
          const v = vers.find(x=>x && Number(x.id)===Number(id));
          return v && v.status === 'released';
        });
      }

      function statusSelectHTML(kind, row){
        if(!row) return '';
        if(kind === 'version'){

              <option value="dev" ${cur==='dev'?'selected':''}>开发中</option>
              <option value="testing" ${cur==='testing'?'selected':''}>测试中</option>

              <option value="released" ${cur==='released'?'selected':''}>已发布</option>

        }

          const cur = msStatusToTaskStatus(row.status || 'plan');

            <select class="select status-${esc(cur)}" data-statuspick="milestone:${esc(row.id)}" style="width:auto;min-width:120px;padding:6px 10px;font-size:12px;">

          return `

              <option value="plan" ${cur==='plan'?'selected':''}>计划中</option>
              <option value="prog" ${cur==='prog'?'selected':''}>进行中</option>
              <option value="done" ${cur==='done'?'selected':''}>已完成</option>
              <option value="pause" ${cur==='pause'?'selected':''}>暂停</option>
            </select>

        // task / bug: ns/prog/test/block/done
        const cur = row.status || 'ns';
        const opts = ['ns','prog','test','block','done'];

          <select class="select status-${esc(cur)}" data-statuspick="${esc(kind)}:${esc(row.id)}" style="width:auto;min-width:120px;padding:6px 10px;font-size:12px;">

          </select>

      async function updateStatusByPick(kind, id, next){
        const row = findRow(kind, id);
        if(!row) return;
        const before = structuredClone(row);
        try{
          if(kind === 'milestone'){
            applyLocal(kind, id, { status: taskStatusToMsStatus(next) });
            render();
            await patchById('milestones','id', id, { status: taskStatusToMsStatus(next) });
            toast('ok','已更新');
            await refreshRemote();
            return;
          }
          const donePatch = (next === 'done' && !row?.done_at) ? { done_at: new Date().toISOString() } : {};
          applyLocal(kind, id, { status: next, ...donePatch });
          render();
          await patchById(kindToTable(kind), 'id', id, { status: next, ...donePatch });
          toast('ok','已更新');
          saveLocalDraft();
          await refreshRemote();
        }catch(e){
          console.warn(e);
          // 回填原状态到下拉（通过 refresh/re-render），但前端保持 next 并进入队列
          enqueue({ op:'patch', table: kindToTable(kind), idField:'id', idValue:id, patch: { status: (kind==='milestone' ? taskStatusToMsStatus(next) : next), ...(next === 'done' && !row?.done_at ? { done_at: new Date().toISOString() } : {}) } });
          saveLocalDraft();
          toast('warn','已在前端更新，待同步后端');
        }
      }

      function versionBadge(status){
        const map = {
          not_started: { cls:'ns', label:'未开始' },
          dev: { cls:'dev', label:'开发中' },
          testing: { cls:'testing', label:'测试中' },
          submitted: { cls:'submitted', label:'已提审' },
          released: { cls:'released', label:'已发布' },
        };
        return map[status] || { cls:'ns', label:'未知' };
      }
      function versionStatusCycle(s){
        const order = ['dev','testing','submitted','released'];
        const i = Math.max(0, order.indexOf(s));
        return order[(i+1)%order.length];
      }
      function msStatusToTaskStatus(msStatus){
        if(msStatus==='done') return 'done';
        if(msStatus==='current') return 'prog';
        if(msStatus==='delay') return 'block';
        return 'ns';
      }
      function taskStatusToMsStatus(s){
        if(s==='done') return 'done';
        if(s==='prog' || s==='test') return 'current';
        if(s==='block') return 'delay';
        return 'plan';
      }

      async function loadBoard(){
        const now = new Date();
        const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        const [phases, versions, milestones, tasks, bugs, ops, backlog, overviewRows] = await Promise.all([
          selectTable('phases', '*', 'order=sort_order.asc'),
          selectTable('versions', '*', 'order=sort_order.asc'),
          selectTable('milestones', '*', 'order=sort_order.asc'),
          selectTable('tasks', '*', 'order=sort_order.asc,id.asc'),
          selectTable('bugs', '*', 'order=sort_order.asc,id.asc'),
          selectTable('ops_actions', '*', 'order=sort_order.asc,id.asc'),
          selectTable('backlog', '*', 'order=id.asc'),
          // 月目标按当前月份取值，避免取到未来/历史月份导致“目标取错”
          selectTable('board_overview', '*', `month_key=eq.${encodeURIComponent(monthKey)}&limit=1`),
        ]);
        const currentPhase = (Array.isArray(phases) ? phases : []).find(p=>p && p.is_current) || (phases||[])[0] || null;
        const overview = (Array.isArray(overviewRows) ? overviewRows[0] : null) || null;
        return { phases: phases||[], currentPhase, versions: versions||[], milestones: milestones||[], tasks: tasks||[], bugs: bugs||[], ops: ops||[], backlog: backlog||[], overview };
      }

      async function syncNow(){
        if(!app.syncQueue || app.syncQueue.length===0){
          await refreshRemote();
          return;
        }
        if(!app.accessToken){
          toast('warn', '请先登录管理员再同步');
          openLogin();
          return;
        }
        await ensureAccessTokenFresh();
        let processed = 0;
        while(app.syncQueue.length > 0){
          const op = app.syncQueue[0];
          try{
            if(op.op === 'patch'){
              await patchById(op.table, op.idField, op.idValue, op.patch);
              app.syncQueue.shift();
            }else if(op.op === 'delete'){
              await deleteById(op.table, op.idField, op.idValue);
              app.syncQueue.shift();
            }else if(op.op === 'insert'){
              const rows = await insertRow(op.table, op.row);
              const created = Array.isArray(rows) ? rows[0] : null;
              if(created && typeof created.id !== 'undefined' && op.tempId){
                // 替换临时 id 为真实 id
                replaceTempId(op.table, op.tempId, created.id);
              }
              app.syncQueue.shift();
            }else{
              // unknown op, drop
              app.syncQueue.shift();
            }
            processed += 1;
            saveQueue();
          }catch(e){
            console.warn('sync failed', op, e);
            // 失败先停，避免狂刷
            op.tries = (op.tries || 0) + 1;
            op.lastError = e?.message || String(e);
            saveQueue();
            toast('bad', `同步失败：${op.table}（${e?.status || ''}）${String(e?.message||'')}`.trim());
            break;
          }
        }
        renderHeader();
        saveLocalDraft();
        if(processed > 0 && app.syncQueue.length === 0){
          toast('ok', '已全部同步');
        }
      }

      function replaceTempId(table, tempId, realId){
        // table -> listName mapping
        const kind = table === 'tasks' ? 'task'
          : table === 'bugs' ? 'bug'
          : table === 'ops_actions' ? 'ops'
          : table === 'backlog' ? 'backlog'
          : null;
        if(!kind) return;
        const listName = kind==='task' ? 'tasks' : kind==='bug' ? 'bugs' : kind==='ops' ? 'ops' : 'backlog';
        const list = app.board?.[listName] || [];
        const idx = list.findIndex(x=> x && String(x.id) === String(tempId));
        if(idx >= 0){
          list[idx] = { ...list[idx], id: realId };
        }
      }

      async function refreshRemote(){
        app.board = await loadBoard();
        saveLocalDraft();
        render();
      }

      function render(){
        renderNav();
        renderHeader();
        const el = $('content');
        if(!app.board){
          el.innerHTML = `<div class="section">加载中…</div>`;
          return;
        }
        if(app.activeTab==='thisweek') return renderThisWeek(el);
        if(app.activeTab==='overview') return renderOverview(el);
        if(app.activeTab==='versions') return renderVersions(el);
        if(app.activeTab==='alltasks') return renderAllTasks(el);
        if(app.activeTab==='milestones') return renderMilestones(el);
        if(app.activeTab==='backlog') return renderBacklog(el);
      }

      function kindToTable(kind){
        return kind==='task' ? 'tasks'
          : kind==='bug' ? 'bugs'
          : kind==='ops' ? 'ops_actions'
          : kind==='phase' ? 'phases'
          : kind==='milestone' ? 'milestones'
          : kind==='version' ? 'versions'
          : kind==='backlog' ? 'backlog'
          : '';
      }
      function findRow(kind, id){
        const nid = (kind==='milestone') ? String(id) : Number(id);
        if(kind==='task') return (app.board.tasks||[]).find(x=>x && x.id===nid);
        if(kind==='bug') return (app.board.bugs||[]).find(x=>x && x.id===nid);
        if(kind==='ops') return (app.board.ops||[]).find(x=>x && x.id===nid);
        if(kind==='phase') return (app.board.phases||[]).find(x=>x && Number(x.id)===Number(nid));
        if(kind==='version') return (app.board.versions||[]).find(x=>x && x.id===nid);
        if(kind==='milestone') return (app.board.milestones||[]).find(x=>x && x.id===String(id));
        if(kind==='backlog') return (app.board.backlog||[]).find(x=>x && x.id===nid);
        return null;
      }

      function applyLocal(kind, id, patch){
        const listName = kind==='task' ? 'tasks'
          : kind==='bug' ? 'bugs'
          : kind==='ops' ? 'ops'
          : kind==='phase' ? 'phases'
          : kind==='milestone' ? 'milestones'
          : kind==='version' ? 'versions'
          : kind==='backlog' ? 'backlog'
          : null;
        if(!listName) return;
        const list = app.board[listName] || [];
        const idx = list.findIndex(x=> x && (String(x.id)===String(id)));
        if(idx<0) return;
        app.board[listName][idx] = { ...app.board[listName][idx], ...patch };
        // phases 被编辑时，同时更新 currentPhase 引用（总览/顶部徽标依赖它）
        if(kind==='phase' && app.board?.currentPhase && String(app.board.currentPhase.id) === String(id)){
          app.board.currentPhase = { ...app.board.currentPhase, ...patch };
        }
      }

          : kind==='version' ? '编辑版本'

        if(kind==='version') return row.version_num || '—';
        if(kind==='monthsum') return row.name || '本月关联事项';

      }

      function statusOptions(kind, current){
        if(kind==='version'){
          const opts = ['not_started','dev','testing','submitted','released'];
          return opts.map(s=>`<option value="${s}" ${s===current?'selected':''}>${esc(versionBadge(s).label)}</option>`).join('');
        }
        if(kind==='ops'){
          const cur = current || 'plan';
          const opts = ['plan','prog','done','pause'];
          const labels = { plan:'计划中', prog:'进行中', done:'已完成', pause:'暂停' };
          return opts.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${esc(labels[s] || s)}</option>`).join('');
        }
        if(kind==='task' || kind==='bug'){
          const opts = ['ns','prog','test','block','done'];
          const cur = current || 'ns';
          return opts.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${esc(taskStatusBadge(s).label)}</option>`).join('');
        }
        const opts = ['ns','prog','block','done'];
        const cur = current || 'ns';
        return opts.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${esc(taskStatusBadge(s).label)}</option>`).join('');
      }

      function renderDrawer(){
        const { kind, row } = app.drawer;
        if(!row) return;
        $('drawerKicker').textContent = kindLabel(kind);
        $('drawerTitle').textContent = rowTitle(kind, row);

        const body = $('drawerBody');
        const foot = $('drawerFoot');

        if(kind === 'monthsum'){
          const t = Array.isArray(row.tasks) ? row.tasks : [];
          const b = Array.isArray(row.bugs) ? row.bugs : [];
          const o = Array.isArray(row.ops) ? row.ops : [];
          const renderList = (kind, list, cls)=>{
            if(!list.length) return `<div style="color:var(--text-secondary);font-size:12px;">暂无</div>`;
            return list.map(r=>{
              const nm = (r.name || r.title || '未命名').trim();
              const sub = (kind==='ops') ? formatDateOrRange(r.target_date || '') : (r.due_date || '');
              const badge = (kind==='ops') ? opsStatusBadge(r.status) : taskStatusBadge(r.status);
              const dotStatus = (kind==='ops')
                ? (r.status==='prog'?'prog' : r.status==='done'?'done' : r.status==='pause'?'block' : 'ns')
                : (r.status || 'ns');
              return `
                <div class="row-item ${cls}" data-open="${kind}:${esc(r.id)}" style="margin-bottom:8px;">
                  <div class="row-name">${esc(nm)}</div>
                  ${sub ? `<div style="color:var(--text-secondary);font-size:12px;margin-top:2px;">${esc(sub)}</div>` : ``}
                  <div class="dot ${esc(dotCls(dotStatus))}"></div>
                </div>
              `;
            }).join('');
          };
          body.innerHTML = `
            <div style="color:var(--text-secondary);font-size:12px;margin-bottom:12px;">
              按当前阶段里程碑日期范围聚合（重叠即计入）
            </div>
            <div style="margin-bottom:14px;">
              <div style="color:var(--text-secondary);font-size:12px;font-weight:850;letter-spacing:.04em;margin-bottom:6px;">功能（${t.length}）</div>
              ${renderList('task', t, 'dev')}
            </div>
            <div style="margin-bottom:14px;">
              <div style="color:var(--text-secondary);font-size:12px;font-weight:850;letter-spacing:.04em;margin-bottom:6px;">Bug（${b.length}）</div>
              ${renderList('bug', b, 'bug')}
            </div>
            <div style="margin-bottom:0;">
              <div style="color:var(--text-secondary);font-size:12px;font-weight:850;letter-spacing:.04em;margin-bottom:6px;">运营（${o.length}）</div>
              ${renderList('ops', o, 'ops')}

          const focus = $('f_focus') ? ($('f_focus').value === 'true') : null;

          const sourceVal = (kind === 'task' || kind === 'backlog') && $('f_source') ? $('f_source').value : null;

          const milestoneVal = kind === 'task' && $('f_milestone') ? String($('f_milestone').value || '').trim() : null;
          const isArchivedVal = kind === 'task' && $('f_archived') ? ($('f_archived').value === 'true') : null;
          const platformVal = kind === 'version' && $('f_platform') ? $('f_platform').value : null;
          const weekStartVal = kind === 'version' && $('f_week_start') ? $('f_week_start').value.trim() : null;
          const versionInternalSave = kind === 'version' && $('f_version_notes') ? $('f_version_notes').value : '';
          const msWeekVal = kind === 'milestone' && $('f_ms_week') ? $('f_ms_week').value.trim() : null;

          const before = structuredClone(findRow(kind, row.id));
          // optimistic update
          if(kind==='phase'){
            applyLocal(kind, row.id, {
              name,
              theme: phaseTheme,
              month_range: phaseRange,
              description: phaseDesc,
            });
          }else if(kind==='milestone'){
            const ws = msWeekVal ? parseYmdLocal(msWeekVal) : null;
            const date_full = ws ? `${ymd(ws)}~${ymd((()=>{ const e=new Date(ws); e.setDate(e.getDate()+6); return e; })())}` : (row.date_full || '');
            const date_short = ws ? formatSlashRange(ymd(ws)) : (row.date_short || '');
            applyLocal(kind, row.id, { title: name, status: taskStatusToMsStatus(status), delayed_note: note, date_full, date_short });
          }else if(kind==='version'){
            applyLocal(kind, row.id, {
              version_num: name,
              status,
              week_start: weekStartVal || null,
              release_notes: note,
              notes: versionInternalSave,
              platform: platformVal || row.platform,
            });

            applyLocal(kind, row.id, {
              name, status, target_date: due, note, is_focus: focus, owners: owners || [],
              is_risk: isRiskVal,
              risk_note: isRiskVal ? (riskNote || '') : '',
              version_ios_id: versBundle.version_ios_id,
              version_android_id: versBundle.version_android_id,
              version_web_id: versBundle.version_web_id,
              version_id: versBundle.version_id,
            });

            applyLocal(kind, row.id, {
              name, status, due_date: due, note, module, is_focus: focus, owners: owners || [],
              is_risk: isRiskVal,
              risk_note: isRiskVal ? (riskNote || '') : '',
              version_ios_id: versBundle.version_ios_id,
              version_android_id: versBundle.version_android_id,
              version_web_id: versBundle.version_web_id,
              version_id: versBundle.version_id,

              is_risk: isRiskVal,

              version_ios_id: versBundle.version_ios_id,

            patch.module = module;
            patch.is_focus = focus;
            patch.owners = owners || [];
            if(isRiskVal !== null) patch.is_risk = isRiskVal;
            patch.risk_note = isRiskVal ? (riskNote || '') : '';
            patch.version_ios_id = versBundle.version_ios_id;
            patch.version_android_id = versBundle.version_android_id;
            patch.version_web_id = versBundle.version_web_id;
            patch.version_id = versBundle.version_id;
            patch.platforms = versBundle.platforms;
            if(thisWeekTask !== null) patch.this_week = thisWeekTask;
            if(taskTypeVal) patch.task_type = taskTypeVal;
            if(sourceVal) patch.source = sourceVal;
            patch.milestone_id = milestoneVal || null;
            if(isArchivedVal !== null) patch.is_archived = isArchivedVal;
          }else if(kind==='backlog'){
            patch.name = name;
            patch.priority = priority;
            patch.note = note;
            patch.module = module;
            if(itemKindVal) patch.item_kind = itemKindVal;
            if(sourceVal) patch.source = sourceVal;
            patch.due_date = due;
            patch.owners = owners || [];
            patch.version_ios_id = versBundle.version_ios_id;
            patch.version_android_id = versBundle.version_android_id;
            patch.version_web_id = versBundle.version_web_id;
            patch.version_id = versBundle.version_id;
            patch.platforms = versBundle.platforms;
          }

          try{
            const rows = await patchById(kindToTable(kind), 'id', row.id, patch);
            const updated = Array.isArray(rows) ? rows[0] : null;
            toast('ok', updated ? '已保存（已写入后端）' : '已保存（已写入后端）');
            saveLocalDraft();
            await refreshRemote();
            closeDrawer();
          }catch(e){
            console.warn(e);
            // 保持前端变更不回滚，进入待同步队列
            enqueue({ op:'patch', table: kindToTable(kind), idField:'id', idValue: row.id, patch });
            saveLocalDraft();
            if(String(e.message||'').includes('not_authenticated')){
              toast('warn', '未登录：已在前端生效，待登录后同步');
            }else if(e && (e.status===401 || e.status===403)){
              toast('warn', 'RLS 未放开：已在前端生效，待修复后同步');
            }else{
              toast('warn', '网络/接口失败：未写入后端（已在前端生效，待同步）');
            }
            closeDrawer();
          }
        }catch(e){
          console.warn(e);
          toast('bad', `保存失败：${String(e.message||'前端异常')}`);
        }
      }

      async function drawerDelete(){
        const { kind, row } = app.drawer;
        if(!row) return;
        if(!confirm('确认删除？此操作不可恢复。')) return;
        try{
          await deleteById(kindToTable(kind), 'id', row.id);
          toast('ok', '已删除');
          await refreshRemote();
          closeDrawer();
        }catch(e){
          console.warn(e);
          // 前端先删掉，后端进入待同步
          removeLocal(kind, row.id);
          render();
          enqueue({ op:'delete', table: kindToTable(kind), idField:'id', idValue: row.id });
          saveLocalDraft();
          toast('warn', '已在前端删除，待同步后端');
          closeDrawer();
        }
      }

        const listName = kind==='task' ? 'tasks'

          : kind==='ops' ? 'ops'
          : kind==='milestone' ? 'milestones'
          : kind==='version' ? 'versions'

        if(!listName) return;
        app.board[listName] = (app.board[listName] || []).filter(x=>!(x && String(x.id)===String(id)));

      function mergeCreatedIntoList(table, realId, created){
        const listName = table === 'tasks' ? 'tasks'

          : table === 'ops_actions' ? 'ops'
          : table === 'backlog' ? 'backlog'
          : table === 'versions' ? 'versions'

      // --- Week picker (select a week range, store Monday YYYY-MM-DD) ---
      const weekPicker = { open:false, targetElId:null, cursor:new Date(), weekStart:null };
      function openWeekPicker(targetElId){
        weekPicker.open = true;
        weekPicker.targetElId = targetElId;
        const curVal = ($(targetElId)?.value || '').trim();
        const d = parseYmdLocal(curVal);
        weekPicker.weekStart = d ? startOfWeekMonday(d) : startOfWeekMonday(new Date());
        weekPicker.cursor = new Date(weekPicker.weekStart.getFullYear(), weekPicker.weekStart.getMonth(), 1);
        renderWeekPicker();
        $('weekPickerModal').classList.add('open');
        $('weekPickerModal').setAttribute('aria-hidden','false');
      }
      function closeWeekPicker(){
        weekPicker.open = false;
        $('weekPickerModal').classList.remove('open');
        $('weekPickerModal').setAttribute('aria-hidden','true');
      }
      function renderWeekPicker(){
        const cur = weekPicker.cursor;
        const year = cur.getFullYear();
        const month = cur.getMonth();
        const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        $('wkMonthTitle').textContent = `${monthNames[month]} ${year}`;
        $('wkPickTop').textContent = weekPicker.weekStart ? formatMdRange(weekPicker.weekStart) : '—';
        const grid = $('wkGrid');
        const first = new Date(year, month, 1);
        const last = new Date(year, month+1, 0);
        const startDay = (first.getDay() + 6) % 7; // Monday=0
        const daysInMonth = last.getDate();
        const cells = [];
        for(let i=0;i<startDay;i++) cells.push({ type:'empty' });
        for(let d=1; d<=daysInMonth; d++){
          cells.push({ type:'day', date: new Date(year, month, d) });
        }
        while(cells.length % 7 !== 0) cells.push({ type:'empty' });
        const ws = weekPicker.weekStart ? startOfWeekMonday(weekPicker.weekStart) : null;
        const we = ws ? (()=>{ const x=new Date(ws); x.setDate(x.getDate()+6); return x; })() : null;
        const inRange = (dt)=>{
          if(!ws || !we) return false;
          const t = dt.getTime();
          return t >= ws.getTime() && t <= we.getTime();
        };
        const isEdge = (dt)=>{
          if(!ws || !we) return false;
          return dt.getTime() === ws.getTime() || dt.getTime() === we.getTime();
        };
        grid.innerHTML = cells.map(c=>{
          if(c.type==='empty') return `<button class="day muted" type="button" disabled> </button>`;
          const dt = c.date;
          const cls = inRange(dt) ? (isEdge(dt) ? 'day edge' : 'day sel') : 'day';
          return `<button class="${cls}" type="button" data-wkday="${ymd(dt)}">${dt.getDate()}</button>`;
        }).join('');
        grid.querySelectorAll('[data-wkday]').forEach(btn=>{
          btn.addEventListener('click', ()=>{
            const d = parseYmdLocal(btn.getAttribute('data-wkday'));
            if(!d) return;
            weekPicker.weekStart = startOfWeekMonday(d);
            renderWeekPicker();
          });
        });
      }

      // --- Date / range picker (store 'YYYY-MM-DD' or 'YYYY-MM-DD~YYYY-MM-DD') ---
      function parseDateOrRange(raw){
        const s = String(raw||'').trim();
        if(!s) return { start:'', end:'' };
        if(s.includes('~')){
          const [a,b] = s.split('~').map(x=>x.trim());
          return { start:a||'', end:b||'' };
        }
        return { start:s, end:'' };
      }
      function openDateOrRangePicker(targetId){
        app.datePicker.open = true;
        app.datePicker.targetId = targetId;
        const cur = ($(targetId)?.value || '').trim();

        if($('dpStart')) $('dpStart').value = parsed.start || '';
        if($('dpEnd')) $('dpEnd').value = parsed.end || '';
        $('datePickerModal').classList.add('open');
        $('datePickerModal').setAttribute('aria-hidden','false');

      function renderThisWeek(el){
        const now = new Date();
        const wStart = startOfWeekMonday(now);
        const wEnd = endOfWeekSunday(now);
        const inThisWeekByRange = (raw)=>{
          const { start, end } = parseRangeYmd(raw || '');
          if(!start || !end) return false;
          return rangesOverlap(start, end, wStart, wEnd);
        };
        const tasks = (app.board.tasks || []).filter(t=>t && !t.is_archived && inThisWeekByRange(t.due_date || ''));
        // 本周不展示“上周已随发版结项”的 Bug（done 且关联 released 版本）
        const bugs = (app.board.bugs || []).filter(b=>b && !b.is_archived && inThisWeekByRange(b.due_date || '') && !(b.status==='done' && rowHasReleasedVersion(b)));
        const ops = (app.board.ops || []).filter(o=>o && !o.is_archived && inThisWeekByRange(o.target_date || ''));

        let tasksTw = tasks;
        let bugsTw = bugs;
        let opsTw = ops;
        if(app.thisWeekRiskOnly){
          tasksTw = tasks.filter(t=>t && t.is_risk);
          bugsTw = bugs.filter(b=>b && b.is_risk);
          opsTw = ops.filter(o=>o && o.is_risk);
        }

        const focusItems = [];
        tasksTw.filter(t=>t.is_focus).forEach(t=> focusItems.push({ kind:'task', row:t, module: t.module || '功能开发' }));
        bugsTw.filter(b=>b.is_focus).forEach(b=> focusItems.push({ kind:'bug', row:b, module: b.module || 'Bug' }));
        opsTw.filter(o=>o.is_focus).forEach(o=> focusItems.push({ kind:'ops', row:o, module: o.category || '运营' }));
        const focus = focusItems;

        app.thisWeekSort = app.thisWeekSort || { task:'manual', bug:'manual', ops:'manual' };
        const sortKeyFor = (k)=> (app.thisWeekSort && app.thisWeekSort[k]) ? app.thisWeekSort[k] : 'manual';
        const doneTs = (r)=>{
          const s = String(r?.done_at || '').trim();
          if(s){
            const d = new Date(s);
            if(!Number.isNaN(d.getTime())) return d.getTime();
          }

              return manualRank(a) - manualRank(b) || Number(a.id)-Number(b.id);

        const parseDrag = (s)=>{

          return { kind:k, id:Number(id) };
        };
        const applyReorder = async (kind, ids)=>{
          // renumber sort_order starting at 1
          ids.forEach((id, idx)=> applyLocal(kind, id, { sort_order: idx+1 }));
          render();
          // persist (best effort)
          for(let i=0;i<ids.length;i++){
            const id = ids[i];
            const patch = { sort_order: i+1 };
            try{
              await patchById(kindToTable(kind), 'id', id, patch);
            }catch(e){
              enqueue({ op:'patch', table: kindToTable(kind), idField:'id', idValue:id, patch });
              saveLocalDraft();
              // stop early; remaining will be retried via sync queue
              break;
            }
          }
          renderHeader();
        };
        const listIds = (kind)=>{
          if(kind==='task') return sortListTw('task', tasks).map(x=>Number(x.id)).filter(Number.isFinite);
          if(kind==='bug') return sortListTw('bug', bugs).map(x=>Number(x.id)).filter(Number.isFinite);
          return sortListTw('ops', ops).map(x=>Number(x.id)).filter(Number.isFinite);
        };
        el.querySelectorAll('[data-drag]').forEach(rowEl=>{
          const { kind, id } = parseDrag(rowEl.getAttribute('data-drag'));
          if(!(kind==='task'||kind==='bug'||kind==='ops')) return;
          // only manual mode draggable
          if(sortKeyFor(kind) !== 'manual') return;
          rowEl.addEventListener('dragstart', (e)=>{
            dragging = { kind, id };
            try{ e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', `${kind}:${id}`); }catch(_e){}
          });
          rowEl.addEventListener('dragover', (e)=>{
            if(!dragging || dragging.kind !== kind) return;
            e.preventDefault();
            rowEl.style.outline = '1px dashed color-mix(in srgb, var(--outline-variant) 35%, transparent)';
          });
          rowEl.addEventListener('dragleave', ()=>{
            rowEl.style.outline = '';
          });
          rowEl.addEventListener('drop', async (e)=>{
            if(!dragging || dragging.kind !== kind) return;
            e.preventDefault();
            rowEl.style.outline = '';
            const targetId = id;
            const draggedId = dragging.id;
            if(draggedId === targetId) return;
            const ids = listIds(kind);
            const from = ids.indexOf(draggedId);
            const to = ids.indexOf(targetId);
            if(from < 0 || to < 0) return;
            ids.splice(from, 1);
            const insertAt = (from < to) ? to-0 : to;
            ids.splice(insertAt, 0, draggedId);
            await applyReorder(kind, ids);
          });
          rowEl.addEventListener('dragend', ()=>{
            dragging = null;
            rowEl.style.outline = '';
          });
        });

        $('addTaskBtn').addEventListener('click', ()=> openCreateModal('task'));
        $('addBugBtn').addEventListener('click', ()=> openCreateModal('bug'));

      }

      function kpiCard(label, value, tone, sub){
        return `
          <div class="kpi-card">

        `;
      }

      function renderOverview(el){
        const tasks = (app.board.tasks || []).filter(t=>t && !t.is_archived);
        // 总览需要看到“历史版本”里已完成的 Bug，因此这里不过滤 done
        const bugs = (app.board.bugs || []).filter(b=>b && !b.is_archived);
        const ops = (app.board.ops || []).filter(o=>o && !o.is_archived);
        const milestones = (app.board.milestones || []);
        const backlog = (app.board.backlog || []).filter(backlogRowIsActive);

        // ── Top cards (per spec) ──
        const phase = app.board.currentPhase;
        const phaseTitle = phase ? `${phase.name || ''}·${phase.theme || ''}`.replace(/\s*·\s*$/,'') : '第一阶段·稳功能基础';
        const phaseRange = phase?.month_range || '';
        const phaseDesc = phase?.description || '';

        const msInCurrentPhase = milestones
          .filter(m=> String(m?.phase_id || '') === String(phase?.id || ''))
          .slice();
        const phaseMsTotal = msInCurrentPhase.length;
        const phaseMsDone = msInCurrentPhase.filter(m=>m && m.status==='done').length;
        const phasePct = phaseMsTotal ? Math.round(phaseMsDone / phaseMsTotal * 100) : 0;
        const phaseBarHeadTitle = phaseTitle.replace(/·/g,' · ');

        const weekDateOfVersion = (v)=>{
          const d1 = parseYmdLocal(v?.week_start);
          if(d1) return d1;
          const d2 = parseYmdLocal(v?.target_date);
          if(d2) return d2;
          const d3 = parseYmdLocal(v?._fallback_week_start);
          return d3;
        };
        const now = new Date();
        const wStart = startOfWeekMonday(now);
        const wEnd = endOfWeekSunday(now);
        const isThisWeekVersion = (v)=>{
          const d = weekDateOfVersion(v);
          if(!d) return false;
          return d.getTime() >= wStart.getTime() && d.getTime() <= wEnd.getTime();
        };
        const versAll = (app.board.versions || [])
          .filter(v=>v)
          .slice()
          .sort((a,b)=>(Number(a.sort_order)||0)-(Number(b.sort_order)||0));
        const versThisWeek = versAll.filter(v=> isThisWeekVersion(v));
        const pickPlatVer = (plat)=>{
          const arr = versThisWeek.filter(v=>v.platform===plat).slice();
          arr.sort((a,b)=>(Number(b.sort_order)||0)-(Number(a.sort_order)||0));
          return arr[0] || null;
        };
        const thisWeekByPlat = {
          ios: pickPlatVer('ios'),
          android: pickPlatVer('android'),
          web: pickPlatVer('web'),
        };

        const riskTasks = tasks.filter(t=>t && t.is_risk);
        const riskBugs = bugs.filter(b=>b && b.is_risk);
        const riskOps = ops.filter(o=>o && o.is_risk);
        const riskCount = riskTasks.length + riskBugs.length + riskOps.length;
        const riskSummaryParts = [];
        if(riskTasks.length) riskSummaryParts.push(`${riskTasks.length} 功能`);
        if(riskBugs.length) riskSummaryParts.push(`${riskBugs.length} Bug`);
        if(riskOps.length) riskSummaryParts.push(`${riskOps.length} 运营`);
        const riskSummary = riskSummaryParts.join(' · ');
        const riskItems = [
          ...riskTasks.map(r=>({ kind:'task', row:r })),
          ...riskBugs.map(r=>({ kind:'bug', row:r })),
          ...riskOps.map(r=>({ kind:'ops', row:r })),
        ];
        if(riskCount <= 1) app.overviewRiskShowAll = false;
        const riskTone = riskCount===0 ? 'secondary' : (riskCount<=2 ? 'tertiary' : 'error');
        const riskStrip = riskCount===0 ? 'strip-secondary' : 'strip-error';

        const classify = (v)=>{
          const d = weekDateOfVersion(v);
          if(d){
            if(isInSameWeekMondayToSunday(d, now)) return 'thisweek';
            if(d.getTime() < wStart.getTime()) return 'past';
            if(d.getTime() > wEnd.getTime()) return 'future';
          }
          return 'other';
        };

        const groups = {
          thisweek: versAll.filter(v=> classify(v)==='thisweek'),
          future: versAll.filter(v=> classify(v)==='future'),
          past: versAll.filter(v=> classify(v)==='past'),
          other: versAll.filter(v=> classify(v)==='other'),
        };

        // 若本周没有可解析日期的版本：每个平台兜底取最近一个“未提审/未发布”的版本放到本周区
        const pickFallbackThisWeek = ()=>{
          const picked = [];
          const plats = ['ios','android','web'];
          for(const p of plats){
            const existing = groups.thisweek.find(v=>v && v.platform===p);
            if(existing) continue;
            const cand = versAll
              .filter(v=>v && v.platform===p && v.status !== 'submitted' && v.status !== 'released')
              .slice()
              .sort((a,b)=>(Number(a.sort_order)||0)-(Number(b.sort_order)||0))
              .pop(); // 取最新一个
            if(cand) picked.push(cand);
          }
          // 避免重复
          const ids = new Set(groups.thisweek.map(v=>v.id));
          for(const v of picked){
            if(!ids.has(v.id)){
              // 兜底只用于“没有日期”的版本；禁止把明确属于未来/过去的版本塞进本周
              const d = weekDateOfVersion(v);
              if(!d){
                v._fallback_week_start = ymd(wStart);
                groups.thisweek.push(v);
                // 从其它组移除
                groups.other = groups.other.filter(x=>x.id!==v.id);
              }
            }
          }
        };
        pickFallbackThisWeek();
        // 严格本周：防止非本周版本混入本周列表
        const thisWeekStrict = (groups.thisweek || []).filter(v=>{
          const d = weekDateOfVersion(v);
          return d && isInSameWeekMondayToSunday(d, now);
        });

        const weekMs = (milestones || []).find(m=>{
          const { start: msS, end: msE } = parseMilestoneRange(m);
          if(!msS || !msE) return false;
          return rangesOverlap(msS, msE, wStart, wEnd);
        }) || null;
        const weekMsLabel = ((weekMs?.title || '').trim() || '—');
        const weekMsDateStr = ((weekMs?.date_short || weekMs?.date_full || '').trim() || '—');
        const weekMsTaskCnt = (()=>{
          if(!weekMs) return 0;
          const { start: msS, end: msE } = parseMilestoneRange(weekMs);
          if(!msS || !msE) return 0;
          const matchOverlap = (row)=>{
            const raw = (row && (row.due_date || row.target_date)) ? (row.due_date || row.target_date) : '';
            const { start, end } = parseRangeYmd(raw);
            if(!start || !end) return false;
            return rangesOverlap(start, end, msS, msE);
          };
          return tasks.filter(matchOverlap).length + bugs.filter(matchOverlap).length + ops.filter(matchOverlap).length;
        })();

        const monthSummary = (()=>{
          const ranges = msInCurrentPhase.map(m=>{
            const { start, end } = parseMilestoneRange(m);
            if(!start || !end) return null;
            return { start, end };
          }).filter(Boolean);
          const matchAny = (row)=>{
            if(!ranges.length) return false;
            const raw = (row && (row.due_date || row.target_date)) ? (row.due_date || row.target_date) : '';
            const { start, end } = parseRangeYmd(raw);
            if(!start || !end) return false;
            return ranges.some(r=> rangesOverlap(start, end, r.start, r.end));
          };
          const t = tasks.filter(matchAny);
          const b = bugs.filter(matchAny);
          const o = ops.filter(matchAny);
          const uniqById = (arr)=> Array.from(new Map(arr.map(x=>[String(x.id), x])).values());
          return { t: uniqById(t), b: uniqById(b), o: uniqById(o) };
        })();

        const weekStartTimeOf = (v)=>{
          const d = weekDateOfVersion(v);
          if(!d) return null;
          return startOfWeekMonday(d).getTime();
        };
        const byWeekVers = new Map();
        for(const v of versAll){
          const k = weekStartTimeOf(v);
          if(k==null) continue;
          if(!byWeekVers.has(k)) byWeekVers.set(k, []);
          byWeekVers.get(k).push(v);
        }
        const versForWeekKey = (k)=> (byWeekVers.get(k) || []).slice().sort((a,b)=>(Number(b.sort_order)||0)-(Number(a.sort_order)||0));
        const nextWeekMonday = new Date(wStart); nextWeekMonday.setDate(nextWeekMonday.getDate()+7);
        const nextWeekKey = startOfWeekMonday(nextWeekMonday).getTime();
        const shallowWeekVers = thisWeekStrict.slice().sort((a,b)=>(Number(b.sort_order)||0)-(Number(a.sort_order)||0));
        const pastVersList = (groups.past||[]).slice().sort((a,b)=>(Number(b.sort_order)||0)-(Number(a.sort_order)||0));
        const nextWeekVersList = versForWeekKey(nextWeekKey);
        const otherVersList = (groups.other||[]).slice().sort((a,b)=>(Number(b.sort_order)||0)-(Number(a.sort_order)||0));

        app.overviewVersionExpanded = app.overviewVersionExpanded || {};
        app.overviewGroupOpen = app.overviewGroupOpen || { past:false, nextweek:false, other:false };
        if(app.overviewGroupOpen && typeof app.overviewGroupOpen.future !== 'undefined'){
          app.overviewGroupOpen.nextweek = !!app.overviewGroupOpen.future;
          delete app.overviewGroupOpen.future;
        }
        app.overviewSort = app.overviewSort || {}; // key: `${vid}:${kind}` -> sortKey

        // 历史 / 下周分组内版本卡：默认收起关联列表（第一层可再展开）
        for(const v of versAll){
          if(typeof app.overviewVersionExpanded[v.id] === 'undefined') app.overviewVersionExpanded[v.id] = false;
        }

        function linkedByVersion(row, vid){
          if(!row) return false;
          const id = Number(vid);
          if(Number(row.version_id) === id) return true;
          if(Number(row.version_ios_id) === id) return true;
          if(Number(row.version_android_id) === id) return true;
          if(Number(row.version_web_id) === id) return true;
          return false;
        }
        function listByVersion(vid){
          return {
            // 总览展示真实关联内容（不只结项）
            t: tasks.filter(x=> linkedByVersion(x, vid)),
            b: bugs.filter(x=> linkedByVersion(x, vid)),
            o: ops.filter(x=> linkedByVersion(x, vid)),
          };
        }
        function hasAnyContent(vid){
          const { t, b, o } = listByVersion(vid);
          return (t.length + b.length + o.length) > 0;
        }
        function opsStatusBadge(s){
          const cls = s==='done'?'done' : s==='prog'?'prog' : s==='pause'?'block' : 'ns';
          const label = s==='done'?'已完成' : s==='prog'?'进行中' : s==='pause'?'暂停' : '计划中';
          return { cls, label };
        }
        function sortList(kind, list, sortKey){
          if(!Array.isArray(list)) return [];
          if(!sortKey || sortKey === 'default') return list; // 保持当前默认顺序
          const arr = list.slice();
          if(sortKey === 'status'){
            const rank = (s)=>{
              if(kind === 'ops') return s==='prog'?0 : s==='plan'?1 : s==='pause'?2 : s==='done'?3 : 9;
              return s==='block'?0 : s==='prog'?1 : s==='test'?2 : s==='ns'?3 : s==='done'?4 : 9;
            };
            arr.sort((a,b)=> rank(a?.status) - rank(b?.status));
            return arr;
          }
          if(sortKey === 'due'){
            const get = (r)=>{
              const raw = kind==='ops' ? (r?.target_date || '') : (r?.due_date || '');
              const d = parseYmdLocal(firstYmdFromMaybeRange(raw));
              return d ? d.getTime() : Number.POSITIVE_INFINITY;
            };
            arr.sort((a,b)=> get(a) - get(b));
            return arr;
          }
          if(sortKey === 'pri' && kind === 'task'){
            arr.sort((a,b)=> priRank(a?.priority) - priRank(b?.priority));
            return arr;
          }
          return list;
