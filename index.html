<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindBack 产品看板</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root{
        /* ── B10 design tokens (dark / low-saturation) ── */
        --bg-base:#0B0F1A;
        --bg-sidebar:#0A0D16;
        --bg-elev-1:rgba(255,255,255,0.03);
        --bg-elev-2:rgba(255,255,255,0.045);
        --bg-elev-3:rgba(255,255,255,0.065);
        --bg-card:rgba(255,255,255,0.04);
        --bg-card-hover:rgba(255,255,255,0.06);
        --border:rgba(255,255,255,0.08);
        --border-light:rgba(255,255,255,0.14);

        --text-primary:rgba(255,255,255,0.92);
        --text-secondary:rgba(255,255,255,0.68);
        --text-muted:rgba(255,255,255,0.45);

        /* accent (low saturation) */
        --blue:#7C9DFF;
        --blue-light:#A8BDFF;
        --blue-glow:rgba(124,157,255,0.18);
        --green:#6EE7B7;
        --yellow:#FCD34D;
        --red:#FB7185;
        --orange:#FDBA74;
        --purple:#C4B5FD;
        --teal:#5EEAD4;

        /* typography scale */
        --fs-10:10px;
        --fs-11:11px;
        --fs-12:12px;
        --fs-13:13px;
        --fs-14:14px;
        --fs-16:16px;
        --fs-20:20px;
        --fs-28:28px;

        /* spacing */
        --sp-6:6px;
        --sp-8:8px;
        --sp-10:10px;
        --sp-12:12px;
        --sp-16:16px;
        --sp-20:20px;
        --sp-24:24px;
        --sp-32:32px;

        /* radius */
        --r-8:8px;
        --r-10:10px;
        --r-12:12px;
        --r-14:14px;
      }
      *{box-sizing:border-box}
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:radial-gradient(1200px 600px at 20% -10%, rgba(124,157,255,0.08), transparent 60%),var(--bg-base);color:var(--text-primary);font-size:var(--fs-13);line-height:1.45;min-height:100vh}
      a{color:var(--blue);text-decoration:none}
      a:hover{text-decoration:underline}

      .header{height:56px;background:rgba(8,10,18,0.8);backdrop-filter:saturate(120%) blur(10px);border-bottom:1px solid var(--border);color:var(--text-primary);display:flex;align-items:center;justify-content:space-between;padding:0 var(--sp-24);position:sticky;top:0;z-index:100}
      .brand{display:flex;align-items:center;gap:10px}
      .dot{width:8px;height:8px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue)}
      .title{font-size:var(--fs-14);font-weight:700;letter-spacing:.2px;color:var(--text-primary)}
      .meta{display:flex;align-items:center;gap:10px;font-size:var(--fs-11);color:var(--text-secondary)}
      .pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg-elev-2);border:1px solid var(--border);padding:4px 10px;border-radius:var(--r-10)}
      .db-dot{width:6px;height:6px;border-radius:50%;background:#fbbf24}
      .btn{background:var(--bg-elev-1);border:1px solid var(--border);color:var(--text-secondary);border-radius:var(--r-10);padding:7px 10px;font-size:var(--fs-11);cursor:pointer;transition:all .15s}
      .btn:hover{border-color:var(--border-light);color:var(--text-primary);background:var(--bg-elev-2)}
      .btn.primary{background:rgba(124,157,255,0.14);border-color:rgba(124,157,255,0.24);color:var(--blue-light)}
      .btn.primary:hover{background:rgba(124,157,255,0.18);border-color:rgba(124,157,255,0.30)}

      .layout{display:flex;min-height:calc(100vh - 56px)}
      .sidebar{width:220px;background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent 28%),var(--bg-sidebar);border-right:1px solid var(--border);height:calc(100vh - 56px);position:sticky;top:56px;overflow-y:auto;padding:var(--sp-16) 0}
      .main{flex:1;min-width:0}
      .main-scroll{padding:var(--sp-20) var(--sp-24) 60px}
      .fade{animation:fadeIn .2s ease}
      @keyframes fadeIn{from{opacity:.5}to{opacity:1}}

      .side-month{padding:var(--sp-12) var(--sp-16);margin-bottom:var(--sp-8);border-bottom:1px solid var(--border)}
      .side-month .lbl{font-size:var(--fs-10);color:var(--text-muted);letter-spacing:.9px;text-transform:uppercase}
      .side-month .txt{margin-top:var(--sp-8);font-size:var(--fs-14);font-weight:650;color:var(--text-primary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
      .side-bar{display:flex;align-items:center;gap:10px;margin-top:var(--sp-10)}
      .side-bar .bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
      .side-bar .bar i{display:block;height:100%;background:var(--blue)}
      .side-bar .pct{font-size:var(--fs-11);color:var(--blue)}

      .side-week{padding:10px var(--sp-16);cursor:pointer;color:var(--text-secondary);font-size:var(--fs-12);display:flex;align-items:center;justify-content:space-between;gap:10px;transition:all .15s;border-left:3px solid transparent}
      .side-week:hover{background:var(--bg-elev-1);color:var(--text-primary)}
      .side-week.active{background:rgba(124,157,255,0.10);border-left-color:rgba(124,157,255,0.55);color:var(--text-primary);font-weight:650}
      .side-week .l{display:flex;align-items:center;gap:8px;min-width:0}
      .side-week .dot{width:8px;height:8px;border-radius:50%;box-shadow:none;background:transparent;border:1px solid var(--border-light)}
      .side-week.active .dot{background:var(--blue);border:none}
      .side-week .badge{background:rgba(124,157,255,0.14);color:var(--blue-light);border-radius:999px;padding:2px 8px;font-size:var(--fs-10);font-weight:700;border:1px solid rgba(124,157,255,0.18)}
      .side-week .r{font-size:var(--fs-10);color:var(--text-muted);white-space:nowrap}

      .side-nav{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
      .side-link{padding:10px var(--sp-16);cursor:pointer;color:var(--text-secondary);font-size:var(--fs-12);border-left:3px solid transparent}
      .side-link:hover{background:var(--bg-elev-1);color:var(--text-primary)}
      .side-link.active{background:rgba(124,157,255,0.08);color:var(--text-primary);border-left-color:rgba(124,157,255,0.55);font-weight:650}

      .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-12);margin-bottom:var(--sp-20)}
      .kpi{background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));border:1px solid var(--border);border-radius:var(--r-14);padding:var(--sp-16) var(--sp-20);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
      .kpi:hover{border-color:var(--border-light);background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04))}
      .kpi.active{box-shadow:0 0 0 1px rgba(124,157,255,0.22),0 12px 30px rgba(0,0,0,0.35)}
      .kpi .n{font-size:34px;font-weight:750;line-height:1}
      .kpi .l{font-size:var(--fs-12);color:var(--text-secondary);margin-top:6px}
      .kpi .ico{position:absolute;right:14px;top:10px;font-size:24px;opacity:.35}
      .kpi.blue .n{color:var(--blue)}
      .kpi.yellow .n{color:var(--yellow)}
      .kpi.red .n{color:var(--red)}

      /* 卡片通用（深色） */
      .card{background:linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.03));border:1px solid var(--border);border-radius:var(--r-14);padding:var(--sp-16) var(--sp-20)}
      .card h3{margin:0 0 10px 0;font-size:var(--fs-10);font-weight:750;letter-spacing:1.0px;text-transform:uppercase;color:var(--text-muted)}
      .small{font-size:var(--fs-12);color:var(--text-secondary)}
      .muted{color:var(--text-muted)}
      .view{display:none}
      .view.active{display:block}

      .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
      .row{display:flex;align-items:center;justify-content:space-between;gap:10px}

      .list{display:flex;flex-direction:column;gap:8px}
      .item{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;border:1px solid var(--border);border-radius:var(--r-14);padding:10px 12px;background:var(--bg-card)}
      .item .name{font-weight:700;color:var(--text-primary)}
      .tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
      .tag{font-size:var(--fs-10);border-radius:var(--r-10);padding:2px 7px;background:var(--bg-elev-2);border:1px solid var(--border);color:var(--text-secondary)}

      .status{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:3px 10px;font-size:var(--fs-11);font-weight:750;white-space:nowrap;background:var(--bg-elev-2);border:1px solid var(--border);color:var(--text-secondary)}
      .status.done{color:var(--green);border-color:rgba(52,211,153,0.25)}
      .status.prog{color:var(--blue);border-color:rgba(79,126,255,0.25)}
      .status.risk{color:var(--yellow);border-color:rgba(251,191,36,0.25)}
      .status.block{color:var(--red);border-color:rgba(248,113,113,0.25)}
      .status.ns{color:var(--text-secondary)}

      .empty{border:1px dashed var(--border);border-radius:12px;padding:14px;color:var(--text-secondary);background:rgba(255,255,255,0.03)}
      .footer{margin-top:18px;font-size:11px;color:var(--text-secondary);display:flex;gap:10px;flex-wrap:wrap}

      .inline-edit{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap}
      .edit-input{width:min(680px, 100%);border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:13px;background:var(--bg-card);color:var(--text-primary);outline:none}
      .edit-input::placeholder{color:var(--text-muted)}
      .edit-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
      .edit-area{width:100%;min-height:72px;resize:vertical;border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:13px;background:var(--bg-card);color:var(--text-primary);outline:none}
      .edit-area::placeholder{color:var(--text-muted)}
      .edit-area:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
      .hint{font-size:11px;color:var(--sub)}

      .modal{position:fixed;inset:0;background:rgba(17,24,39,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
      .modal.open{display:flex}
      .modal-card{width:min(520px, 100%);background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.035));border-radius:var(--r-14);border:1px solid var(--border);padding:14px 16px;color:var(--text-primary)}
      .modal-title{font-weight:900;font-size:14px;margin:2px 0 10px}
      .form-row{display:flex;flex-direction:column;gap:6px;margin-top:10px}
      .label{font-size:11px;color:var(--sub)}
      .form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
      .err{color:rgba(255,255,255,0.92);background:rgba(251,113,133,0.12);border:1px solid rgba(251,113,133,0.22);border-radius:var(--r-12);padding:8px 10px;font-size:var(--fs-12);margin-top:10px;display:none}

      /* ── Overview 视觉改版 v2.0 - 月度目标强化 ── */
      .ov-month-hero{background:linear-gradient(135deg, rgba(124,157,255,0.18) 0%, rgba(196,181,253,0.12) 60%, rgba(255,255,255,0.04) 100%);color:var(--text-primary);border-radius:var(--r-14);padding:var(--sp-24) var(--sp-24);margin-bottom:var(--sp-20);border:1px solid rgba(124,157,255,0.18);box-shadow:0 18px 60px rgba(0,0,0,0.38)}
      .ov-month-hero h1{margin:0 0 10px 0;font-size:var(--fs-28);font-weight:850;letter-spacing:-.6px}
      .ov-month-hero .subtitle{font-size:var(--fs-13);color:var(--text-secondary);margin-bottom:14px}
      .ov-month-bar{height:10px;background:rgba(255,255,255,.10);border-radius:999px;overflow:hidden;margin-top:10px;max-width:100%}
      .ov-month-bar > i{display:block;height:100%;background:rgba(124,157,255,.85);border-radius:999px;box-shadow:0 0 18px rgba(124,157,255,.22)}

      .meta .pill.db-pill{background:rgba(255,255,255,.08);border-radius:6px;padding:4px 10px;border:1px solid rgba(255,255,255,.12)}
      .db-label-ok{color:#4ade80;font-weight:600}
      .db-label-warn{color:#fbbf24;font-weight:600}
      .db-label-bad{color:#f87171;font-weight:600}
      .db-dot.pulse{animation:dbPulse 1.2s ease-in-out infinite}
      @keyframes dbPulse{0%,100%{opacity:1}50%{opacity:.35}}

      .ov-week{margin-bottom:16px;border-radius:12px;overflow:hidden}
      .ov-week > summary{list-style:none;cursor:pointer}
      .ov-week > summary::-webkit-details-marker{display:none}

      .ov-week{background:linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.03));border:1px solid var(--border);border-radius:var(--r-14);box-shadow:0 18px 60px rgba(0,0,0,0.28)}
      .ov-week > summary{padding:var(--sp-16) var(--sp-20);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
      .ov-week__body{padding:var(--sp-16) var(--sp-20);border-top:1px solid var(--border)}

      .ov-week--current{border-color:rgba(124,157,255,0.24);box-shadow:0 0 0 1px rgba(124,157,255,0.20),0 24px 80px rgba(0,0,0,0.34)}
      .ov-week--current::before{content:'🎯 本周重点';display:block;font-size:var(--fs-12);font-weight:850;color:var(--blue);margin:var(--sp-16) var(--sp-20) 0;letter-spacing:.8px}
      .ov-week--current > summary{padding-top:var(--sp-10)}
      .ov-week--current .ov-week__chev{display:none}

      .ov-week--future{opacity:.95}

      .ov-week--past{opacity:.72}
      .ov-week--past[open]{opacity:1}

      .ov-badge-week{display:inline-flex;align-items:center;background:rgba(124,157,255,0.16);color:var(--blue-light);font-size:var(--fs-10);font-weight:800;padding:3px 10px;border-radius:999px;margin-right:8px;border:1px solid rgba(124,157,255,0.18)}
      .ov-week-range{color:var(--text-muted);font-size:var(--fs-11)}
      .ov-week-sum-line{font-size:var(--fs-12);color:var(--text-secondary);margin-top:6px}
      .ov-week-progress{font-size:var(--fs-11);color:var(--text-muted);font-weight:650}

      .ov-sec-title{font-size:var(--fs-10);font-weight:850;letter-spacing:1.1px;text-transform:uppercase;color:var(--text-muted);margin:0 0 var(--sp-12);display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
      .ov-sec-title::before{content:'';width:4px;height:16px;border-radius:3px;background:rgba(255,255,255,0.18)}
      .ov-sec-title--new::before{background:#7c3aed}
      .ov-sec-title--opt::before{background:#059669}
      .ov-sec-title--bug::before{background:#ef4444}
      .ov-sec-title--ops::before{background:#f59e0b}
      .ov-sec-title--insight::before{background:#3b82f6}
      .ov-sec-title--big::before{background:#3730a3;width:5px;height:20px}

      .ov-sec-block{margin-bottom:28px}

      /* 三栏布局样式 */
      .three-col-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:32px}
      .col-section{background:linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.03));border:1px solid var(--border);border-radius:var(--r-14);padding:var(--sp-16) var(--sp-20)}
      .col-section-title{font-size:var(--fs-14);font-weight:850;color:var(--text-primary);margin:0 0 var(--sp-12);display:flex;align-items:center;gap:10px}
      .col-section-title::before{content:'';width:4px;height:20px;border-radius:2px}
      .col-section-title.feature-col::before{background:#7c3aed}
      .col-section-title.ops-col::before{background:#f59e0b}
      .col-section-title.data-col::before{background:#3b82f6}

      @media (max-width: 1024px){
        .three-col-grid{grid-template-columns:1fr}
      }

      /* 大功能卡（深色 v2.0） */
      .bf-card{background:var(--bg-card);border:1px solid var(--border);border-top:3px solid var(--blue);border-radius:10px;padding:18px 20px;margin-bottom:12px;transition:box-shadow .15s}
      .bf-card:hover{box-shadow:0 4px 24px rgba(79,126,255,0.12)}
      .bf-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
      .bf-title{font-size:16px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:6px}
      .bf-pct{font-size:14px;font-weight:700;color:var(--blue)}
      .bf-pipe{display:flex;align-items:center;gap:0;margin:12px 0}
      .bf-pipe-step{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:56px}
      .bf-pipe-step span{font-size:11px;color:var(--text-muted)}
      .bf-pipe-step.is-on span{color:var(--blue);font-weight:600}
      .bf-pipe-dot{width:8px;height:8px;border-radius:50%;background:transparent;border:1px solid var(--border-light)}
      .bf-pipe-step.is-on .bf-pipe-dot{width:10px;height:10px;background:var(--blue);border:none;box-shadow:0 0 10px rgba(79,126,255,0.6);animation:pulse 1.5s ease-in-out infinite}
      .bf-pipe-line{flex:1;height:1px;background:var(--border);margin:0 8px}

      .bf-plat-row{display:grid;grid-template-columns:52px 1fr 44px 80px 48px;align-items:center;gap:12px;padding:6px 0;border-top:1px solid #1E2130;cursor:pointer}
      .bf-plat-row:hover{background:rgba(255,255,255,0.02);border-radius:6px}
      .bf-plat-row.is-done{opacity:.72}
      .bf-plat-row.is-done .bf-plat-check{color:var(--green);font-weight:700;margin-left:4px}
      .bf-plat-name{width:52px;flex-shrink:0;font-size:11px;font-weight:700;border-radius:8px;padding:4px 8px;text-align:center}
      .bf-plat-name.ios{background:#1E2040;color:#7AA2FF}
      .bf-plat-name.android{background:#0D2A1E;color:#34D399}
      .bf-plat-name.web{background:#2A1020;color:#F472B6}
      .bf-plat-name.backend{background:#2A1F00;color:#FBBF24}
      .bf-plat-name.ai{background:#1E1040;color:#A78BFA}
      .bf-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
      .bf-bar-fill{height:100%;border-radius:3px}
      .bf-bar-fill.ios{background:#818cf8}
      .bf-bar-fill.android{background:#34d399}
      .bf-bar-fill.web{background:#f472b6}
      .bf-bar-fill.backend{background:#fbbf24}
      .bf-bar-fill.ai{background:#a78bfa}
      .bf-plat-meta{font-size:12px;font-weight:600;text-align:right;color:var(--text-primary)}
      .bf-sub{font-size:11px;color:var(--text-muted)}

      .bf-links{margin-top:12px;display:flex;flex-direction:column;gap:6px}
      .bf-links-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
      .bf-links-lbl{width:48px;flex-shrink:0;font-size:10px;color:var(--text-muted);padding-top:3px}
      .pill-mini{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:11px;margin:0 4px 4px 0;cursor:pointer}
      .pill-mini.new{background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);color:var(--purple)}
      .pill-mini.opt{background:rgba(13,148,136,0.12);border:1px solid rgba(13,148,136,0.3);color:var(--teal)}

      .cap-new{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:100px;margin:0 6px 6px 0;font-size:12px;cursor:pointer;transition:all .15s;user-select:none;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);color:var(--purple)}
      .cap-new:hover{background:rgba(124,58,237,0.2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(124,58,237,0.2)}
      .cap-opt{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:100px;margin:0 6px 6px 0;font-size:12px;cursor:pointer;transition:all .15s;user-select:none;background:rgba(13,148,136,0.12);border:1px solid rgba(13,148,136,0.3);color:var(--teal)}
      .cap-opt:hover{background:rgba(13,148,136,0.2);transform:translateY(-1px)}
      .cap-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
      .cap-plat{font-size:10px;opacity:.85}

      .bug-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;margin:0 4px 4px 0;font-size:12px;cursor:pointer}
      .bug-chip.s0{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red)}
      .bug-chip.s1{background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.3);color:var(--orange)}

      .ops-card{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:14px 16px;margin-bottom:8px;min-width:180px;max-width:220px;cursor:pointer;transition:all .15s}

      .ops-card-title{font-weight:700;color:var(--text-primary);font-size:13px}

      .ops-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-left:8px}
      .ops-badge.plan{background:var(--border);color:var(--text-secondary)}
      .ops-badge.prog{background:rgba(79,126,255,0.15);color:var(--blue)}
      .ops-badge.done{background:rgba(52,211,153,0.15);color:var(--green)}

      .ins-card{background:rgba(79,126,255,0.06);border:1px solid rgba(79,126,255,0.2);border-radius:10px;padding:14px 16px;margin-bottom:8px}

  <body>
    <div class="header">
      <div class="brand">
        <div class="dot"></div>
        <div class="title">MindBack 产品看板</div>
      </div>
      <div class="meta">
        <div class="pill db-pill" title="公开只读 · 数据来自 Supabase">
          <span class="db-dot pulse" id="dbDot"></span>
          <span id="dbLabel">DB 连接中…</span>
        </div>
        <div class="pill">
          <span class="muted">最后更新</span>
          <span id="lastUpdated">—</span>
        </div>
        <button class="btn" id="adminBtn" type="button">管理员登录</button>
        <button class="btn primary" id="saveBtn" type="button" style="display:none">保存更改</button>
        <button class="btn" id="legacyBtn" type="button">打开旧版</button>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div id="sidebarMonth"></div>
        <div id="sidebarWeeks"></div>
        <div class="side-nav" id="sidebarNav"></div>
      </aside>
      <main class="main">
        <div class="main-scroll">
          <div class="view active" id="view-overview"></div>
          <div class="view" id="view-features"></div>
          <div class="view" id="view-bugs"></div>
          <div class="view" id="view-ops"></div>
          <div class="view" id="view-archive"></div>
        </div>
      </main>
    </div>

    <div class="modal" id="authModal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <div class="modal-title" id="authTitle">管理员登录</div>
        <div class="hint">登录后可编辑月目标/周目标并保存到 Supabase。公开访客仍然只读。</div>
        <div class="form-row">
          <div class="label">邮箱</div>
          <input class="edit-input" id="authEmail" autocomplete="username" placeholder="you@example.com" />
        </div>
        <div class="form-row">
          <div class="label">密码</div>
          <input class="edit-input" id="authPassword" type="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <div class="err" id="authErr"></div>
        <div class="form-actions">
          <button class="btn" id="authCancel" type="button">取消</button>
          <button class="btn primary" id="authSubmit" type="button">登录</button>
        </div>
      </div>
    </div>

    <script>
      // ── Supabase 只读连接（公开可用：publishable/anon key） ──
      const SUPABASE_URL = 'https://youwcvqibzscimrcumej.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable__IxFWKd1RZG2qnXRKg5uhg_lxIhgDSx';
      const SNAPSHOT_KEY = 'prod';
      const ADMIN_UID = '618d276a-fbba-4c40-a261-6567c00b0b5f';

      const LEGACY_FILE = 'MindBack产品看板_部署版%20(13).html';

      const VIEWS = [
        { id: 'overview', label: '总览 Overview' },
        { id: 'features', label: '功能详情' },
        { id: 'bugs', label: 'Bug 追踪' },
        { id: 'ops', label: '运营协同' },
        { id: 'archive', label: '历史归档' },
      ];

      function $(id){ return document.getElementById(id); }

      function setDbStatus(type, text){
        const dot = $('dbDot');
        const label = $('dbLabel');
        if(!dot || !label) return;
        label.textContent = text;
        label.className = '';
        dot.classList.remove('pulse');
        if(type === 'ok'){
          dot.style.background = '#4ade80';
          label.classList.add('db-label-ok');
        }else if(type === 'warn'){
          dot.style.background = '#f97316';
          label.classList.add('db-label-warn');
        }else if(type === 'bad'){
          dot.style.background = '#ef4444';
          label.classList.add('db-label-bad');
        }else{
          dot.style.background = 'var(--yellow)';
          dot.classList.add('pulse');
        }
      }

      function setSaveStatus(state){
        // state: idle | saving | saved | error
        if(state === 'saving'){
          setDbStatus('warn', '保存中…');
          return;
        }
        if(state === 'saved'){
          setDbStatus('ok', '✓ 已保存');
          setTimeout(()=>{ setDbStatus('ok', 'DB 已连接'); }, 1500);
          return;
        }
        if(state === 'error'){
          setDbStatus('bad', '保存失败，请重试');
          return;
        }
        // idle: do nothing
      }

      function fmtTime(ts){
        if(!ts) return '—';
        const d = new Date(ts);
        const pad = (n)=> String(n).padStart(2,'0');
        return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }

      function statusLabel(s){
        return s==='done'?'完成'
          : s==='prog'?'进行中'
          : s==='test'?'测试中'
          : s==='risk'?'风险'
          : s==='block'?'阻塞'
          : s==='ns'?'待启动'
          : '未知';
      }

      function statusClass(s){
        return s==='done'?'done'
          : s==='prog'?'prog'
          : s==='test'?'prog'
          : s==='risk'?'risk'
          : s==='block'?'block'
          : 'ns';
      }

      function platformTags(plats){
        const map = { ios:'iOS', android:'Android', web:'Web', backend:'后端', ai:'AI' };
        const arr = Array.isArray(plats) ? plats : [];
        return arr.map(p=>`<span class="tag">${map[p] || p}</span>`).join('');
      }

      function groupCounts({tasks, bugs, ops, milestones, backlog}){
        const t = Array.isArray(tasks) ? tasks : [];
        const b = Array.isArray(bugs) ? bugs : [];
        const o = Array.isArray(ops) ? ops : [];
        const m = Array.isArray(milestones) ? milestones : [];
        const bl = Array.isArray(backlog) ? backlog : [];

        const thisWeek = t.filter(x=>x && x.thisWeek);
        const done = t.filter(x=>x && x.status==='done');
        const prog = t.filter(x=>x && x.status==='prog');
        const riskBlock = t.filter(x=>x && (x.status==='risk' || x.status==='block'));
        const s0s1 = b.filter(x=>x && (x.severity==='s0' || x.severity==='s1') && x.status!=='done');

        return { t, b, o, m, bl, thisWeek, done, prog, riskBlock, s0s1 };
      }

      function renderSidebarNav(activeId){
        const el = $('sidebarNav');
        if(!el) return;
        el.innerHTML = VIEWS.map(v=>{
          const cls = v.id===activeId ? 'side-link active' : 'side-link';
          return `<div class="${cls}" data-view="${v.id}">${v.label}</div>`;
        }).join('');
        el.querySelectorAll('[data-view]').forEach(btn=>{
          btn.addEventListener('click', ()=>{
            const id = btn.getAttribute('data-view');
            switchTab(id);
          });
        });
      }

      function switchTab(id){
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        const view = $('view-'+id);
        if(view) view.classList.add('active');
        renderSidebarNav(id);
      }

      function renderOverview(state, updatedAt){
        const view = $('view-overview');
        const v2 = ensureV2Shape(normalizeSnapshot(state));
        const c = groupCounts(v2.legacy || {});

        renderSidebarMonth(v2);
        renderSidebarWeeks(v2);

        const kpiHtml = `
          <div class="kpi-row">
            <div class="kpi blue${app.kpiFilter==='thisWeek'?' active':''}" data-kpi="thisWeek"><div class="ico">🔵</div><div class="n">${c.thisWeek.length}</div><div class="l">本周推进</div></div>
            <div class="kpi${app.kpiFilter==='prog'?' active':''}" data-kpi="prog"><div class="ico">⚡</div><div class="n">${c.prog.length}</div><div class="l">进行中任务</div></div>
            <div class="kpi yellow${app.kpiFilter==='risk'?' active':''}" data-kpi="risk"><div class="ico">⚠️</div><div class="n">${c.riskBlock.length}</div><div class="l">风险/阻塞</div></div>
            <div class="kpi red${app.kpiFilter==='bug'?' active':''}" data-kpi="bug"><div class="ico">🐛</div><div class="n">${c.s0s1.length}</div><div class="l">未关闭 Bug</div></div>
          </div>
        `;

        view.innerHTML = `
          ${kpiHtml}
          <div id="weekDetail" class="fade"></div>
        `;

        view.querySelectorAll('[data-kpi]').forEach(el=>{
          el.addEventListener('click', ()=>{
            const k = el.getAttribute('data-kpi');
            app.kpiFilter = (app.kpiFilter === k) ? null : k;
            renderWeekDetail();
          });
        });

        renderWeekDetail();

        function renderWeekDetail(){
          const target = $('weekDetail');
          const selId = app.selectedWeekId || currentWeekId(v2.weeks);
          const w = (v2.weeks||[]).find(x=>x.id===selId) || (v2.weeks||[])[0];
          if(!w){ target.innerHTML = `<div class="card">暂无周数据</div>`; return; }
          target.innerHTML = renderWeekDetailCard(v2, w, updatedAt);
          if(app.isAdmin){ bindWeekEdits(); bindMonthPlansEdits(v2, w.month); }
        }
      }

      function bindMonthPlansEdits(v2, monthKey){
        const mk = monthKey || '';
        if(!v2.monthPlans || typeof v2.monthPlans !== 'object') v2.monthPlans = {};
        const titleEl = document.querySelector(`[data-month-title="${CSS.escape(mk || 'month')}"]`);
        const progEl = document.querySelector(`[data-month-progress="${CSS.escape(mk || 'month')}"]`);
        if(titleEl){
          titleEl.addEventListener('input', ()=>{
            if(!v2.monthPlans[mk]) v2.monthPlans[mk] = { title: '', progress: null };
            v2.monthPlans[mk].title = String(titleEl.value || '').trim();
            app.isDirty = true;
            updateSaveBtn();
            renderSidebarMonth(app.draft);
          });
        }
        if(progEl){
          progEl.addEventListener('input', ()=>{
            if(!v2.monthPlans[mk]) v2.monthPlans[mk] = { title: '', progress: null };
            const val = String(progEl.value || '').trim();
            const num = val === '' ? null : Number(val);
            v2.monthPlans[mk].progress = Number.isFinite(num) ? Math.max(0, Math.min(100, num)) : null;
            app.isDirty = true;
            updateSaveBtn();
            renderSidebarMonth(app.draft);
          });
        }
      }

      function renderSidebarMonth(v2){
        const el = $('sidebarMonth');
        if(!el) return;
        const selId = app.selectedWeekId || currentWeekId(v2.weeks||[]);
        const w = (v2.weeks||[]).find(x=>x.id===selId) || (v2.weeks||[])[0];
        const monthKey = w?.month || '';
        const mp = getMonthPlan(v2, monthKey);
        const title = mp?.title || '';
        const progress = Number.isFinite(mp?.progress) ? mp.progress : null;
        const pct = progress===null ? '—' : `${Math.round(progress)}%`;
        const barW = progress===null ? 0 : Math.min(100, Math.max(0, progress));
        el.innerHTML = `
          <div class="side-month">
            <div class="lbl">${monthKey ? escapeHtml(monthKey) + ' · 月目标' : '本月目标'}</div>
            <div class="txt" title="${escapeHtml(title)}">${title ? escapeHtml(title) : '（待填写）'}</div>
            <div class="side-bar">
              <div class="bar"><i style="width:${barW}%"></i></div>
              <div class="pct">${pct}</div>
            </div>
          </div>
        `;
        el.querySelector('.side-month')?.addEventListener('click', ()=>{
          switchTab('overview');
        });
      }

      function renderSidebarWeeks(v2){
        const el = $('sidebarWeeks');
        if(!el) return;
        const weeks = v2.weeks || [];
        const curId = currentWeekId(weeks);
        const selected = app.selectedWeekId || curId;
        el.innerHTML = weeks.map(w=>{
          const isCur = w.id === curId;
          const cls = w.id===selected ? 'side-week active' : 'side-week';
          return `
            <div class="${cls}" data-week="${escapeHtml(w.id)}">
              <div class="l">
                <span class="dot"></span>
                ${isCur ? '<span class="badge">本周</span>' : '<span class="muted">○</span>'}
                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(w.month)}</span>
              </div>
              <div class="r">${escapeHtml(shortRangeLabel(w))}${w.done ? ' ✓' : ''}</div>
            </div>
          `;
        }).join('');
        el.querySelectorAll('[data-week]').forEach(row=>{
          row.addEventListener('click', ()=>{
            app.selectedWeekId = row.getAttribute('data-week');
            // 切换周 => 主内容淡入
            const detail = $('weekDetail');
            if(detail) detail.classList.remove('fade');
            switchTab('overview');
            renderOverview(app.draft, app.snapshotRow?.updated_at);
          });
        });
      }

      function renderWeekDetailCard(v2, w, updatedAt){
        const curId = currentWeekId(v2.weeks||[]);
        const isCur = w.id === curId;
        const badge = isCur ? `<span class="ov-badge-week">本周</span>` : '';
        const monthKey = w.month || '';
        const goal = w.goal || '';
        const criteria = w.criteria || '';
        const monthPlanView = renderMonthPlanCard(v2, monthKey);
        const goalView = app.isAdmin
          ? `<div class="card" style="margin:12px 0"><div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase">本周目标</div><textarea class="edit-area" data-week-goal="${escapeHtml(w.id)}">${escapeHtml(goal)}</textarea></div>`
          : `<div class="card" style="margin:12px 0"><div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase">本周目标</div><div style="margin-top:8px;font-size:14px;line-height:1.6">${goal ? escapeHtml(goal) : '<span class="muted">（待填写）</span>'}</div></div>`;
        const critView = app.isAdmin
          ? `<div class="card" style="margin:12px 0"><div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase">验收标准</div><textarea class="edit-area" data-week-criteria="${escapeHtml(w.id)}">${escapeHtml(criteria)}</textarea></div>`
          : `<div class="card" style="margin:12px 0"><div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase">验收标准</div><div style="margin-top:8px;font-size:14px;line-height:1.6">${criteria ? escapeHtml(criteria) : '<span class="muted">（待填写）</span>'}</div></div>`;

        // 分区（先用现有 v2 分类字段渲染）
        const big = renderBigFeatureCard(v2, w);
        const news = renderCapsules(v2, w.legacy_new_features, 'cap-new');
        const opts = renderCapsules(v2, w.legacy_opt_features, 'cap-opt');
        const bugs = renderBugChips(v2, w.legacy_bugs);
        const ops = renderOpsCards(v2, w, isCur);
        const insights = renderInsightCards(w);

        return `
          <div class="fade">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
              <div style="font-size:14px;font-weight:600;color:var(--text-primary)">${badge} ${escapeHtml(w.month)} · ${escapeHtml(shortRangeLabel(w))}</div>
              <div style="color:var(--blue);font-weight:700">整体进度 —</div>
            </div>
            ${monthPlanView}
            ${goalView}
            ${critView}

            <div class="card" style="margin-top:12px">
              <div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px">大功能</div>
              ${big}
              <div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase;margin:16px 0 8px">新增功能</div>
              <div>${news}</div>
              <div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase;margin:16px 0 8px">优化功能</div>
              <div>${opts}</div>
              <div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase;margin:16px 0 8px">Bug 修复</div>
              <div>${bugs}</div>
              <div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase;margin:16px 0 8px">运营动作</div>
              <div>${ops}</div>
              <div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase;margin:16px 0 8px">数据分析节点</div>
              <div>${insights}</div>
              <div class="small" style="margin-top:12px">数据源：Supabase ${updatedAt ? `（更新于 ${fmtTime(updatedAt)}）` : ''}</div>
            </div>
          </div>
        `;
      }

      function bindMonthEdits(v2){
        // deprecated: month goal now lives per-month under v2.monthPlans, bound in renderMonthPlanCard()
      }

      function getMonthPlan(v2, monthKey){
        if(!v2 || typeof v2 !== 'object') return { title: '', progress: null };
        if(!v2.monthPlans || typeof v2.monthPlans !== 'object') v2.monthPlans = {};
        const mk = monthKey || '';
        const mp = mk && v2.monthPlans[mk] ? v2.monthPlans[mk] : null;
        if(mp && typeof mp === 'object'){
          return {
            title: String(mp.title ?? ''),
            progress: Number.isFinite(mp.progress) ? mp.progress : null,
          };
        }
        // fallback: legacy single month field (旧快照兼容)
        return {
          title: String(v2.month?.title ?? ''),
          progress: Number.isFinite(v2.month?.progress) ? v2.month.progress : null,
        };
      }

      function renderMonthPlanCard(v2, monthKey){
        const mk = monthKey || '';
        const mp = getMonthPlan(v2, mk);
        const title = mp.title || '';
        const progress = Number.isFinite(mp.progress) ? mp.progress : null;
        const pct = progress===null ? '—' : `${Math.round(progress)}%`;
        const barW = progress===null ? 0 : Math.min(100, Math.max(0, progress));
        const keyEsc = escapeHtml(mk || 'month');
        if(app.isAdmin){
          // 输入绑定：用 data-month-key 区分不同月份
          return `
            <div class="card" style="margin:12px 0">
              <div class="row" style="align-items:flex-end">
                <div>
                  <div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase">${mk ? escapeHtml(mk) + ' · 月目标' : '本月目标'}</div>
                  <textarea class="edit-area" style="margin-top:8px" data-month-title="${keyEsc}" placeholder="填写本月目标（可多行）">${escapeHtml(title)}</textarea>
                </div>
                <div style="min-width:150px;text-align:right">
                  <div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase">进度</div>
                  <input class="edit-input" type="number" min="0" max="100" step="1" value="${progress===null?'':Math.round(progress)}" data-month-progress="${keyEsc}" placeholder="%" style="margin-top:8px;width:120px;text-align:right" />
                  <div class="small muted" style="margin-top:6px">${pct}</div>
                </div>
              </div>
              <div class="side-bar" style="margin-top:10px">
                <div class="bar"><i style="width:${barW}%"></i></div>
                <div class="pct">${pct}</div>
              </div>
            </div>
          `;
        }
        return `
          <div class="card" style="margin:12px 0">
            <div class="muted" style="font-size:11px;letter-spacing:.8px;text-transform:uppercase">${mk ? escapeHtml(mk) + ' · 月目标' : '本月目标'}</div>
            <div style="margin-top:8px;font-size:14px;line-height:1.6">${title ? escapeHtml(title) : '<span class="muted">（待填写）</span>'}</div>
            <div class="side-bar" style="margin-top:10px">
              <div class="bar"><i style="width:${barW}%"></i></div>
              <div class="pct">${pct}</div>
            </div>
          </div>
        `;
      }

      function renderPlaceholder(id, title, desc){
        const view = $('view-'+id);
        view.innerHTML = `
          <div class="card">
            <h3>${title}</h3>
            <div style="font-size:14px;font-weight:900;margin-top:2px">${desc}</div>
            <div class="small" style="margin-top:8px">
              这一页会在下一轮按《看板结构设计文档》补齐。当前你可以先使用 Overview，以及右上角“打开旧版”对照。
            </div>
          </div>
        `;
      }

      function legacyLookup(v2, ref){
        const legacy = v2?.legacy || {};
        const kind = ref?.kind;
        const id = ref?.refId;
        if(kind === 'legacy_task'){
          return (legacy.tasks || []).find(x=>x && x.id === id) || null;
        }
        if(kind === 'legacy_bug'){
          return (legacy.bugs || []).find(x=>x && x.id === id) || null;
        }
        return null;
      }

      function ensureWeekShape(w){
        if(!w || typeof w !== 'object') return w;
        if(!Array.isArray(w.bigFeatureIds)) w.bigFeatureIds = [];
        if(!Array.isArray(w.newFeatureIds)) w.newFeatureIds = [];
        if(!Array.isArray(w.optFeatureIds)) w.optFeatureIds = [];
        if(!Array.isArray(w.bugIds)) w.bugIds = [];
        if(!Array.isArray(w.opsIds)) w.opsIds = [];
        if(!Array.isArray(w.insightIds)) w.insightIds = [];
        // v2：先用 legacyRefIds 做“人工分类”的落点（不强制你立即建正规 feature 实体）
        if(!Array.isArray(w.legacy_big_tasks)) w.legacy_big_tasks = [];
        if(!Array.isArray(w.legacy_new_features)) w.legacy_new_features = [];
        if(!Array.isArray(w.legacy_opt_features)) w.legacy_opt_features = [];
        if(!Array.isArray(w.legacy_bugs)) w.legacy_bugs = [];
        if(!Array.isArray(w.insights)) w.insights = [];
        return w;
      }

      function ensureV2Shape(v2){
        if(!v2 || typeof v2 !== 'object') return v2;
        if(!v2.month) v2.month = { title: '', progress: null };
        if(!v2.monthPlans || typeof v2.monthPlans !== 'object') v2.monthPlans = {};
        if(!Array.isArray(v2.weeks)) v2.weeks = buildDefaultWeeks();
        v2.weeks = v2.weeks.map(ensureWeekShape);
        if(!v2.inbox) v2.inbox = { items: [] };
        if(!Array.isArray(v2.inbox.items)) v2.inbox.items = [];
        if(!v2.features) v2.features = { big: [], new: [], opt: [] };
        if(!Array.isArray(v2.features.big)) v2.features.big = [];
        if(v2.features.big.length === 0){
          v2.features.big.push({ id:'big_site', name:'站点', platform: { ios:{progress:null,stage:'dev'}, android:{progress:null,stage:'dev'}, web:{progress:null,stage:'dev'}, backend:{progress:null,stage:'dev'}, ai:{progress:null,stage:'dev'} }, links:{ new:[], opt:[], bugs:[], ops:[] }, tasks: [] });
        }
        return v2;
      }

      async function loadSnapshot(){

        const res = await fetch(url, {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
          }
        });
        if(!res.ok) throw new Error(`Supabase fetch failed: ${res.status} ${res.statusText}`);
        const rows = await res.json();
        return rows && rows[0] ? rows[0] : null;
      }

      async function fetchTable(table, select='*', extraQuery=''){
        const q = extraQuery ? '&' + extraQuery.replace(/^\&+/, '') : '';
        const url = `${SUPABASE_URL}/rest/v1/${encodeURIComponent(table)}?select=${encodeURIComponent(select)}${q}`;
        const res = await fetch(url, {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
          }
        });
        if(!res.ok) throw new Error(`Supabase table fetch failed: ${table} ${res.status} ${res.statusText}`);
        return await res.json();
      }

      function escapeHtml(s){
        return String(s ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function deepClone(obj){
        return obj ? JSON.parse(JSON.stringify(obj)) : obj;
      }

      function normalizeSnapshot(data){
        // v2 shape:
        // {version:2, month:{title,progress}, weeks:[...], legacy:{tasks,bugs,ops,milestones,people,backlog,debtItems}}
        if(data && data.version === 2) return data;

        const legacy = {
          tasks: Array.isArray(data?.tasks) ? data.tasks : [],
          bugs: Array.isArray(data?.bugs) ? data.bugs : [],
          ops: Array.isArray(data?.ops) ? data.ops : [],
          milestones: Array.isArray(data?.milestones) ? data.milestones : [],
          people: Array.isArray(data?.people) ? data.people : [],
          backlog: Array.isArray(data?.backlog) ? data.backlog : [],
          debtItems: Array.isArray(data?.debtItems) ? data.debtItems : [],
        };

        return {
          version: 2,
          month: { title: '', progress: null },
          weeks: buildDefaultWeeks(),
          legacy,
          // inbox 用于后续你在 UI 里完成“重新分类”
          inbox: {
            items: [
              ...legacy.tasks.map(t=>({ kind: 'legacy_task', refId: t.id })),
              ...legacy.bugs.map(b=>({ kind: 'legacy_bug', refId: b.id })),
            ],
          },
          features: {
            big: [{ id:'big_site', name:'站点', platform: { ios:{progress:null,stage:'dev'}, android:{progress:null,stage:'dev'}, web:{progress:null,stage:'dev'}, backend:{progress:null,stage:'dev'}, ai:{progress:null,stage:'dev'} }, links:{ new:[], opt:[], bugs:[], ops:[] }, tasks: [] }],
            new: [],
            opt: [],
          }
        };
      }

      function startOfWeekMonday(d){
        const x = new Date(d);
        const day = x.getDay(); // 0 Sun
        const diff = (day === 0 ? -6 : 1 - day);
        x.setDate(x.getDate() + diff);
        x.setHours(0,0,0,0);
        return x;
      }

      function fmtRange(a,b){
        const pad = (n)=> String(n).padStart(2,'0');
        return `${a.getFullYear()}/${pad(a.getMonth()+1)}/${pad(a.getDate())}–${pad(b.getMonth()+1)}/${pad(b.getDate())}`;
      }

      function buildDefaultWeeks(){
        // 本月 + 近三个月：每个月取覆盖该月的周（周一-周日）
        const now = new Date();
        const months = [];
        for(let i=0;i<4;i++){
          const m = new Date(now.getFullYear(), now.getMonth()-i, 1);
          months.push({ y:m.getFullYear(), m:m.getMonth() });
        }

        const out = [];
        months.forEach(({y,m})=>{
          const first = new Date(y,m,1);
          const last = new Date(y,m+1,0);
          let cur = startOfWeekMonday(first);
          while(cur <= last){
            const end = new Date(cur); end.setDate(end.getDate()+6);
            out.push({
              id: `${y}-${String(m+1).padStart(2,'0')}-${fmtRange(cur,end)}`,
              month: `${y}/${String(m+1).padStart(2,'0')}`,
              range: fmtRange(cur,end),
              goal: '',
              criteria: '',
              bigFeatureIds: [],
              newFeatureIds: [],
              optFeatureIds: [],
              bugIds: [],
              opsIds: [],
              insightIds: [],
            });
            cur = new Date(cur); cur.setDate(cur.getDate()+7);
          }
        });

        // 按时间倒序（本月在前），但同月内按周正序更符合阅读
        const byMonth = new Map();
        out.forEach(w=>{
          if(!byMonth.has(w.month)) byMonth.set(w.month, []);
          byMonth.get(w.month).push(w);
        });
        const monthOrder = months.map(x=>`${x.y}/${String(x.m+1).padStart(2,'0')}`);
        const final = [];
        monthOrder.forEach(mk=>{
          const arr = byMonth.get(mk) || [];
          arr.sort((a,b)=>a.range.localeCompare(b.range));
          final.push(...arr);
        });
        return final;
      }

      function currentWeekId(weeks){
        const now = new Date();
        const monday = startOfWeekMonday(now);
        const end = new Date(monday); end.setDate(end.getDate()+6);
        const r = fmtRange(monday,end);
        const ym = `${monday.getFullYear()}/${String(monday.getMonth()+1).padStart(2,'0')}`;
        const found = weeks.find(w=>w.month===ym && w.range===r);
        return found ? found.id : null;
      }

      function parseWeekBounds(w){
        if(!w?.range) return null;
        const parts = String(w.range).split('–');
        if(parts.length < 2) return null;
        const L = parts[0].trim().split('/').map(Number);
        const R = parts[1].trim().split('/').map(Number);
        if(L.length < 3 || R.length < 2) return null;
        const yy = L[0], mo = L[1]-1, dd = L[2];
        const start = new Date(yy, mo, dd); start.setHours(0,0,0,0);
        let em = R[0]-1, ed = R[1];
        let end = new Date(yy, em, ed);
        if(end < start) end = new Date(yy+1, em, ed);
        end.setHours(23,59,59,999);
        return { start, end };
      }

      function weekBucket(w, curId){
        if(w.id === curId) return 'current';
        const b = parseWeekBounds(w);
        if(!b) return 'future';
        const now = new Date();
        const mon = startOfWeekMonday(now); mon.setHours(0,0,0,0);
        const sun = new Date(mon); sun.setDate(sun.getDate()+6); sun.setHours(23,59,59,999);
        if(b.end < mon) return 'past';
        if(b.start > sun) return 'future';
        if(b.end < now) return 'past';
        return 'future';
      }

      function shortRangeLabel(w){
        const b = parseWeekBounds(w);
        if(!b) return escapeHtml(w.range||'');
        const a = b.start, e = b.end;
        return `${a.getMonth()+1}/${a.getDate()}–${e.getMonth()+1}/${e.getDate()}`;
      }

      function weekSummaryLine(w, bucket, curId){
        const sr = shortRangeLabel(w);
        if(w.id === curId){
          return `<span class="ov-badge-week">本周</span><span class="ov-week-range">${escapeHtml(w.month)} · ${sr}</span>`;
        }
        if(bucket === 'past'){
          return `<span class="ov-week-sum-line">▶ 上周 ${sr}　<span style="color:#10b981;font-weight:600">✓ 已完成</span>${w.goal ? `　<span class="ov-week-range">${escapeHtml(w.goal.slice(0,48))}${w.goal.length>48?'…':''}</span>` : ''}</span>`;
        }
        const g = w.goal ? escapeHtml(w.goal.slice(0,56)) + (w.goal.length>56?'…':'') : '—';
        return `<span class="ov-week-sum-line">▶ 下周 ${sr}　<span class="ov-week-range">目标方向：${g}</span></span>`;
      }

      function statusDotColor(st){
        if(st==='done') return '#10b981';
        if(st==='prog') return '#3b82f6';
        if(st==='risk') return '#f59e0b';
        if(st==='block') return '#ef4444';
        return '#9ca3af';
      }

      function statusGlyph(st){
        if(st==='done') return '✓';
        if(st==='prog') return '⚙';
        return '·';
      }

      function platMetaForItem(item){
        const plats = Array.isArray(item?.plat) ? item.plat : [];
        const map = { ios:'iOS', android:'Android', web:'Web', backend:'后端', ai:'AI' };
        return plats.map(p=>`${map[p]||p} ${statusGlyph(item?.status)}`).join(' · ');
      }

      function inferPipelineIndex(big){
        const order = ['design','dev','test','shipped'];
        let idx = 1;
        const keys = ['ios','android','web','backend','ai'];
        for(const k of keys){
          const st = big?.platform?.[k]?.stage || 'dev';
          const i = order.indexOf(st);
          if(i >= 0 && i > idx) idx = i;
        }
        return idx;
      }

      function platAggFromBigTasks(v2, w, platKey){
        const refs = w.legacy_big_tasks || [];
        let tot = 0, done = 0;
        for(const r of refs){
          const t = legacyLookup(v2, r);
          if(!t || !Array.isArray(t.plat) || !t.plat.includes(platKey)) continue;
          tot++;
          if(t.status === 'done') done++;
        }
        return { tot, done, pct: tot ? Math.round(100*done/tot) : null };
      }

      function renderPipeline(big){
        const labels = ['设计中','开发中','联调/测试','已上线'];
        const cur = inferPipelineIndex(big);
        let html = '<div class="bf-pipe">';
        labels.forEach((lb, i)=>{
          if(i) html += '<div class="bf-pipe-line"></div>';
          const on = i === cur ? ' is-on' : '';
          html += `<div class="bf-pipe-step${on}"><div class="bf-pipe-dot"></div><span>${lb}</span></div>`;
        });
        html += '</div>';
        return html;
      }

      function renderBigFeatureCard(v2, w){
        const big = (v2.features?.big || [])[0];
        if(!big) return '<div class="empty">暂无大功能数据</div>';
        const keys = [
          { k:'ios', label:'iOS' },
          { k:'android', label:'Android' },
          { k:'web', label:'Web' },
          { k:'backend', label:'后端' },
          { k:'ai', label:'AI' },
        ];
        let sum = 0, n = 0;
        const rows = keys.map(({k,label})=>{
          const stored = big.platform?.[k]?.progress;
          const agg = platAggFromBigTasks(v2, w, k);
          const pct = Number.isFinite(stored) ? stored : (agg.pct !== null ? agg.pct : 0);
          if(agg.tot > 0 || Number.isFinite(stored)){ sum += pct; n++; }
          const doneRow = pct >= 100;
          return `
            <div class="bf-plat-row${doneRow ? ' is-done' : ''}">
              <div class="bf-plat-name ${k}">${label}</div>
              <div class="bf-bar-wrap"><div class="bf-bar-fill ${k}" style="width:${pct}%"></div></div>
              <div class="bf-plat-meta ${k}">${pct}%</div>
              <div class="bf-sub">${agg.tot ? `${agg.done}/${agg.tot} 子任务` : '—'}</div>
              ${doneRow ? '<span class="bf-plat-check">✓</span>' : ''}
            </div>
          `;
        }).join('');
        const overall = n ? Math.round(sum/n) : 0;

        const linkNew = Array.isArray(big.links?.new) ? big.links.new : [];
        const linkOpt = Array.isArray(big.links?.opt) ? big.links.opt : [];
        const linksHtml = (linkNew.length || linkOpt.length) ? `
          <div class="bf-links">
            ${linkNew.length ? `<div class="bf-links-row"><span class="bf-links-lbl">关联新增</span><div>${linkNew.map(x=>`<span class="pill-mini new">${escapeHtml(typeof x==='string'?x:x.name||'')}</span>`).join('')}</div></div>` : ''}
            ${linkOpt.length ? `<div class="bf-links-row"><span class="bf-links-lbl">关联优化</span><div>${linkOpt.map(x=>`<span class="pill-mini opt">${escapeHtml(typeof x==='string'?x:x.name||'')}</span>`).join('')}</div></div>` : ''}
          </div>
        ` : '';

        return `
          <div class="bf-card">
            <div class="bf-head">
              <div class="bf-title">🏗 ${escapeHtml(big.name || '大功能')}</div>
              <div class="bf-pct">整体 ${overall}%</div>
            </div>
            ${renderPipeline(big)}
            <div style="margin-top:12px">${rows}</div>
            ${linksHtml}
          </div>
        `;
      }

      function renderCapsules(v2, refs, capClass){
        if(!refs?.length) return '<div class="small muted">暂无条目（可在「功能详情」收件箱归类到本周）</div>';
        return '<div style="display:flex;flex-direction:column;gap:12px">' + refs.map(r=>{
          const item = legacyLookup(v2, r);
          if(!item) return '';
          const dot = `<span class="cap-dot" style="background:${statusDotColor(item.status)}"></span>`;
          const plat = platMetaForItem(item);
          const statusBadge = `<span class="status ${statusClass(item.status)}" style="font-size:10px;padding:2px 8px;margin-left:8px">${statusLabel(item.status)}</span>`;
          const goal = item.note ? `<div style="font-size:11px;color:var(--text-secondary);margin-top:6px;line-height:1.45">${escapeHtml(item.note)}</div>` : '';
          return `
            <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px 14px">
              <div style="display:flex;align-items:center;gap:8px">
                ${dot}
                <span style="font-weight:700;font-size:13px">${escapeHtml(item.name||'#')}</span>
                ${statusBadge}
              </div>
              ${plat ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px">${escapeHtml(plat)}</div>` : ''}
              ${goal}
            </div>
          `;
        }).join('') + '</div>';
      }

      function renderBugChips(v2, refs){
        if(!refs?.length) return '<div class="small muted">暂无 Bug（可在「功能详情」归类到本周）</div>';
        return '<div style="display:flex;flex-direction:column;gap:10px">' + refs.map(r=>{
          const item = legacyLookup(v2, r);
          if(!item) return '';
          const sev = (item.severity || 's1').toLowerCase();
          const cls = sev === 's0' ? 's0' : 's1';
          const icon = sev === 's0' ? '🔴' : '🟡';
          const owner = Array.isArray(item.owners) && item.owners.length ? ` · ${item.owners.join('、')}` : '';
          const statusBadge = `<span class="status ${statusClass(item.status)}" style="font-size:10px;padding:2px 8px">${statusLabel(item.status)}</span>`;
          return `
            <div class="bug-chip ${cls}" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px">
              <div style="flex:1">
                <div>${icon} <b>${(sev||'').toUpperCase()}</b> ${escapeHtml(item.name||'Bug')}</div>
                <div style="font-size:11px;opacity:.85;margin-top:6px;color:var(--text-secondary)">${escapeHtml(owner)}</div>
              </div>
              ${statusBadge}
            </div>
          `;
        }).join('') + '</div>';
      }

      function renderOpsCards(v2, w, isCurrentWeek){
        const ops = v2.legacy?.ops || [];
        if(!isCurrentWeek || !ops.length) return '<div class="small muted">当周暂无运营条目（或仅在「本周」展示全局运营摘要）</div>';
        return ops.slice(0, 8).map(o=>{
          const st = o.status || 'plan';
          const bcls = st==='done' ? 'done' : st==='prog' ? 'prog' : 'plan';
          const stLabel = st==='done' ? '已完成' : st==='prog' ? '进行中' : '计划中';
          return `
            <div class="ops-card">
              <div>
                <span style="font-size:14px">📣</span>
                <span class="ops-card-title">${escapeHtml(o.name||'')}</span>
                <span class="ops-badge ${bcls}">${stLabel}</span>
              </div>
              <div class="ops-card-sub">渠道：${escapeHtml(o.channel||'—')}　·　目标：${escapeHtml(o.note||'—')}</div>
            </div>
          `;
        }).join('');
      }

      function renderInsightCards(w){
        const list = Array.isArray(w.insights) ? w.insights : [];
        if(!list.length){
          return '<div class="small muted">暂无数据分析节点（可在后续版本为每周添加 insights 数组）</div>';
        }
        return list.map(ins=>`
          <div class="ins-card">
            <div class="ins-title">📊 ${escapeHtml(ins.title||'分析主题')}</div>
            <div class="ins-line">触发：${escapeHtml(ins.trigger||'—')}　指标：${escapeHtml(ins.metrics||'—')}</div>
            <div class="ins-dec">决策：${escapeHtml(ins.decision||'—')}</div>
          </div>
        `).join('');
      }

      function renderWeeks(v2){
        const weeks = Array.isArray(v2.weeks) ? v2.weeks.map(ensureWeekShape) : [];
        const curId = currentWeekId(weeks);
        const curMonth = curId ? (weeks.find(x=>x.id===curId)?.month) : null;
        const isAdmin = app.isAdmin;

        return weeks.map(w=>{
          const bucket = weekBucket(w, curId);
          const isCurrent = (w.id===curId && w.month===curMonth);
          const open = isCurrent ? ' open' : '';
          const cls = bucket === 'current' ? 'ov-week ov-week--current' : bucket === 'past' ? 'ov-week ov-week--past' : 'ov-week ov-week--future';

          const goalView = isAdmin
            ? `<textarea class="edit-area" data-week-goal="${escapeHtml(w.id)}" placeholder="本周目标描述">${escapeHtml(w.goal||'')}</textarea>`
            : `<div class="small" style="margin-top:6px">${w.goal ? escapeHtml(w.goal) : '<span class="muted">（目标待填写）</span>'}</div>`;
          const critView = isAdmin
            ? `<textarea class="edit-area" data-week-criteria="${escapeHtml(w.id)}" placeholder="验收标准">${escapeHtml(w.criteria||'')}</textarea>`
            : `<div class="small" style="margin-top:6px">${w.criteria ? '验收：'+escapeHtml(w.criteria) : '<span class="muted">（验收标准待填写）</span>'}</div>`;

          const summaryLeft = isCurrent
            ? `<div>${weekSummaryLine(w, bucket, curId)}</div>`
            : `<div>${weekSummaryLine(w, bucket, curId)}</div>`;
          const summaryRight = isCurrent
            ? `<div class="ov-week-progress">整体进度：—</div>`
            : '';

          return `
            <details class="${cls}"${open}>
              <summary style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
                <div style="flex:1;min-width:0">${summaryLeft}</div>
                ${summaryRight ? `<div class="ov-week__chev">${summaryRight}</div>` : ''}
              </summary>
              <div class="ov-week__body">
                <div class="ov-sec-block">
                  <div class="ov-sec-title">本周目标</div>
                  ${goalView}
                </div>
                <div class="ov-sec-block">
                  <div class="ov-sec-title">验收标准</div>
                  ${critView}
                </div>

                <div class="ov-sec-block">
                  <div class="ov-sec-title ov-sec-title--big">大功能</div>
                  ${renderBigFeatureCard(v2, w)}
                </div>
                <div class="ov-sec-block">
                  <div class="ov-sec-title ov-sec-title--new">新增功能</div>
                  <div>${renderCapsules(v2, w.legacy_new_features, 'cap-new')}</div>
                </div>
                <div class="ov-sec-block">
                  <div class="ov-sec-title ov-sec-title--opt">优化功能</div>
                  <div>${renderCapsules(v2, w.legacy_opt_features, 'cap-opt')}</div>
                </div>
                <div class="ov-sec-block">
                  <div class="ov-sec-title ov-sec-title--bug">Bug 修复</div>
                  <div>${renderBugChips(v2, w.legacy_bugs)}</div>
                </div>
                <div class="ov-sec-block">
                  <div class="ov-sec-title ov-sec-title--ops">运营动作</div>
                  ${renderOpsCards(v2, w, isCurrent)}
                </div>
                <div class="ov-sec-block">
                  <div class="ov-sec-title ov-sec-title--insight">数据分析节点</div>
                  ${renderInsightCards(w)}
                </div>
              </div>
            </details>
          `;
        }).join('');
      }

      function updateSaveBtn(){
        const btn = $('saveBtn');
        if(!btn) return;
        btn.style.display = app.isAdmin ? 'inline-flex' : 'none';
        btn.disabled = !app.isDirty;
        btn.textContent = app.isDirty ? '保存更改' : '已保存';
      }

      function openAuthModal(){
        $('authModal').classList.add('open');
        $('authErr').style.display = 'none';
      }
      function closeAuthModal(){
        $('authModal').classList.remove('open');
        $('authErr').style.display = 'none';
      }

      async function signIn(){
        const email = $('authEmail').value.trim();
        const password = $('authPassword').value;
        const errBox = $('authErr');
        errBox.style.display = 'none';
        if(!email || !password){
          errBox.textContent = '请填写邮箱和密码。';
          errBox.style.display = 'block';
          return;
        }
        if(!app.supabase){
          errBox.textContent = 'Supabase SDK 未加载，请刷新页面重试。';
          errBox.style.display = 'block';
          return;
        }
        const { data, error } = await app.supabase.auth.signInWithPassword({ email, password });
        if(error){
          errBox.textContent = error.message || '登录失败';
          errBox.style.display = 'block';
          return;
        }
        const uid = data?.user?.id;
        app.isAdmin = (uid === ADMIN_UID);
        if(!app.isAdmin){
          errBox.textContent = '登录成功，但该账号没有管理员写入权限。';
          errBox.style.display = 'block';
          await app.supabase.auth.signOut();
          return;
        }
        closeAuthModal();
        const ab = $('adminBtn');
        ab.textContent = '已登录 ✓';
        ab.style.color = 'var(--green)';
        ab.style.borderColor = 'rgba(52,211,153,0.35)';
        updateSaveBtn();
        // 重新渲染，让输入框出现
        renderOverview(app.draft, app.snapshotRow?.updated_at);
        renderFeaturesTab(app.draft);
        bindWeekEdits();
      }

      function bindWeekEdits(){
        if(!app.isAdmin) return;
        document.querySelectorAll('[data-week-goal]').forEach(el=>{
          el.addEventListener('input', ()=>{
            const id = el.getAttribute('data-week-goal');
            const w = app.draft.weeks.find(x=>x.id===id);
            if(w){ w.goal = el.value; app.isDirty = true; updateSaveBtn(); }
          });
        });
        document.querySelectorAll('[data-week-criteria]').forEach(el=>{
          el.addEventListener('input', ()=>{
            const id = el.getAttribute('data-week-criteria');
            const w = app.draft.weeks.find(x=>x.id===id);
            if(w){ w.criteria = el.value; app.isDirty = true; updateSaveBtn(); }
          });
        });
      }

      async function saveSnapshot(){
        if(!app.isAdmin || !app.isDirty) return;
        if(!app.supabase){
          alert('Supabase SDK 未加载，请刷新页面重试。');
          return;
        }
        const { data: sessionData } = await app.supabase.auth.getSession();
        const accessToken = sessionData?.session?.access_token;
        if(!accessToken){
          alert('未检测到登录状态，请重新登录。');
          return;
        }

        // 写回：更新 kanban_snapshot(key=prod) 的 data 字段
        setSaveStatus('saving');
        const url = `${SUPABASE_URL}/rest/v1/kanban_snapshot?key=eq.${encodeURIComponent(SNAPSHOT_KEY)}`;
        const res = await fetch(url, {
          method: 'PATCH',
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: 'Bearer ' + accessToken,
            'Content-Type': 'application/json',
            Prefer: 'return=representation',
          },
          body: JSON.stringify({ data: app.draft }),
        });
        const text = await res.text();
        if(!res.ok){
          console.warn(text);
          setSaveStatus('error');
          alert('保存失败：请检查 Supabase RLS 策略是否已配置。');
          return;
        }
        // PostgREST 在“0 行被更新”时也可能返回 200 + []
        let updatedAt = null;
        try{
          const rows = JSON.parse(text);
          if(!Array.isArray(rows) || rows.length === 0){
            setSaveStatus('error');
            alert('保存未生效：后端没有更新任何行（通常是 RLS 拒绝或没有匹配到 key=prod）。');
            console.warn('Save returned empty representation:', text);
            return;
          }
          updatedAt = rows?.[0]?.updated_at || null;
        }catch(e){
          setSaveStatus('error');
          alert('保存返回无法解析，建议在 Supabase 表里核对 updated_at 是否变化。');
          console.warn('Save response parse failed:', e, text);
          return;
        }

        // 二次校验：保存后立刻再读一次后端，确保已写入
        try{
          const verify = await loadSnapshot();
          const vAt = verify?.updated_at || null;
          if(!vAt || (updatedAt && vAt !== updatedAt)){
            setSaveStatus('error');
            alert('保存后校验失败：后端 updated_at 未按预期更新，请在 Supabase 表里确认。');
            console.warn('Verify mismatch:', { updatedAt, vAt, verify });
            return;
          }
          app.snapshotRow = verify;
          app.snapshot = verify?.data || app.snapshot;
          $('lastUpdated').textContent = fmtTime(vAt);
          app.isDirty = false;
          updateSaveBtn();
          setSaveStatus('saved');
        }catch(e){
          setSaveStatus('error');
          alert('保存成功但校验读取失败：请刷新页面或在 Supabase 表里确认 updated_at。');
          console.warn('Verify read failed:', e);
        }
      }

      $('adminBtn').addEventListener('click', openAuthModal);
      $('authCancel').addEventListener('click', closeAuthModal);
      $('authSubmit').addEventListener('click', signIn);
      $('authModal').addEventListener('click', (e)=>{ if(e.target === e.currentTarget) closeAuthModal(); });
      $('saveBtn').addEventListener('click', saveSnapshot);

      init().then(()=>{ bindWeekEdits(); updateSaveBtn(); });
    </script>
  </body>
</html>
