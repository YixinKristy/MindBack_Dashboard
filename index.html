      function renderAllTasks(el){
        const tasks = (app.board.tasks || []).filter(t=>t && !t.is_archived);
        const bugs = (app.board.bugs || []).filter(b=>b && !b.is_archived);
        const ops = (app.board.ops || []).filter(o=>o && !o.is_archived);
        const versions = (app.board.versions || []).filter(v=>v);

        // 全量任务：默认展示所有状态（含已完成）
        app.allTasksFilter = app.allTasksFilter || { q:'', showDone:true, sort:'manual' };
        const q = String(app.allTasksFilter.q || '').trim().toLowerCase();
        const showDone = !!app.allTasksFilter.showDone;
        const sortKey = app.allTasksFilter.sort || 'manual';

        const pick = (kind, row)=>{
          const name = (row?.name || row?.title || '').trim();
          if(!name) return null;
          if(!showDone && String(row?.status||'') === 'done') return null;
          if(q && !name.toLowerCase().includes(q) && !String(row?.note||'').toLowerCase().includes(q)) return null;
          const vids = rowLinkedVersions(row);
          const vlabels = vids.map(id=>{
            const v = versions.find(x=>x && Number(x.id)===Number(id));
            if(!v) return '';
            return `${v.platform}:${v.version_num||('#'+v.id)}`;
          }).filter(Boolean).slice(0,3);
          const sub = kind==='ops' ? formatDateOrRange(row.target_date||'') : (row.due_date || '');
          const badge = kind==='ops' ? opsStatusBadge(row.status) : taskStatusBadge(row.status || 'ns');
          return { kind, id: row.id, name, row, badge, sub, vlabels };
        };

        const items = [
          ...tasks.map(r=> pick('task', r)).filter(Boolean),
          ...bugs.map(r=> pick('bug', r)).filter(Boolean),
          ...ops.map(r=> pick('ops', r)).filter(Boolean),
        ];

        const manualRank = (r)=> Number.isFinite(Number(r?.row?.sort_order)) ? Number(r.row.sort_order) : 0;
        const doneTs = (r)=>{
          const s = String(r?.row?.done_at || '').trim();
          if(s){ const d=new Date(s); if(!Number.isNaN(d.getTime())) return d.getTime(); }
          const u = String(r?.row?.updated_at || '').trim();
          if(u){ const d=new Date(u); if(!Number.isNaN(d.getTime())) return d.getTime(); }
          return 0;
        };
        const kindRank = (k)=> k==='task'?0 : k==='bug'?1 : 2;
        const sorted = items.slice().sort((a,b)=>{
          if(sortKey === 'done_time'){
            const ad = String(a.row?.status||'')==='done' ? 0 : 1;
            const bd = String(b.row?.status||'')==='done' ? 0 : 1;
            if(ad!==bd) return ad-bd;
            if(ad===0) return doneTs(b)-doneTs(a);
          }
          if(sortKey === 'priority'){
            const ap = a.kind==='task' ? priRank(a.row?.priority) : 9;
            const bp = b.kind==='task' ? priRank(b.row?.priority) : 9;
            if(ap!==bp) return ap-bp;
          }
          // manual-ish: type then sort_order then id
          return kindRank(a.kind)-kindRank(b.kind) || manualRank(a)-manualRank(b) || Number(a.id)-Number(b.id);
        });

        el.innerHTML = `
          <div class="section">
            <div class="kicker">全量任务</div>
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:10px;">
              <input class="input" id="allQ" placeholder="搜索名称/备注…" value="${esc(app.allTasksFilter.q||'')}" style="max-width:360px;" />
              <select class="select" id="allSort" style="width:auto;min-width:160px;">
                <option value="manual" ${sortKey==='manual'?'selected':''}>默认顺序</option>
                <option value="priority" ${sortKey==='priority'?'selected':''}>按优先级（任务）</option>
                <option value="done_time" ${sortKey==='done_time'?'selected':''}>按完成时间</option>
              </select>
              <label style="display:flex;align-items:center;gap:8px;color:var(--text-secondary);font-size:12px;font-weight:850;letter-spacing:.03em;">
                <input type="checkbox" id="allShowDone" ${showDone?'checked':''} />
                显示已完成
              </label>
              <div style="margin-left:auto;color:var(--text-secondary);font-size:12px;">共 ${sorted.length} 条</div>
            </div>
          </div>

          <div class="section">
            <div class="columns3">
              <div class="col">
                <div class="col-head">
                  <div class="col-title">功能</div>
                  <button class="add-btn" id="allAddTask" type="button">+ 添加</button>
                </div>
                <div class="list">
                  ${sorted.filter(x=>x.kind==='task').map(it=>`
                    <div class="row-item dev" data-open="task:${esc(it.id)}">
                      <div class="row-name">${esc(it.name)}</div>
                      <div class="dot ${esc(dotCls(it.row.status))}"></div>
                    </div>
                  `).join('') || `<div style="color:var(--text-secondary)">暂无</div>`}
                </div>
              </div>
              <div class="col">
                <div class="col-head">
                  <div class="col-title">Bug</div>
                  <button class="add-btn" id="allAddBug" type="button">+ 添加</button>
                </div>
                <div class="list">
                  ${sorted.filter(x=>x.kind==='bug').map(it=>`
                    <div class="row-item bug" data-open="bug:${esc(it.id)}">
                      <div class="row-name">${esc(it.name)}</div>
                      <div class="dot ${esc(dotCls(it.row.status))}"></div>
                    </div>
                  `).join('') || `<div style="color:var(--text-secondary)">暂无</div>`}
                </div>
              </div>
              <div class="col">
                <div class="col-head">
                  <div class="col-title">运营</div>
                  <button class="add-btn" id="allAddOps" type="button">+ 添加</button>
                </div>
                <div class="list">
                  ${sorted.filter(x=>x.kind==='ops').map(it=>`
                    <div class="row-item ops" data-open="ops:${esc(it.id)}">
                      <div class="row-name">${esc(it.name)}</div>
                      <div class="dot ${esc(dotCls(it.row.status))}"></div>
                    </div>
                  `).join('') || `<div style="color:var(--text-secondary)">暂无</div>`}
                </div>
              </div>
            </div>
          </div>
        `;

        if($('allQ')){
          $('allQ').addEventListener('input', ()=>{
            app.allTasksFilter.q = $('allQ').value || '';
            render();
          });
        }
        if($('allSort')){
          $('allSort').addEventListener('change', ()=>{
            app.allTasksFilter.sort = $('allSort').value;
            render();
          });
        }
        if($('allShowDone')){
          $('allShowDone').addEventListener('change', ()=>{
            app.allTasksFilter.showDone = $('allShowDone').checked;
            render();
          });
        }
        el.querySelectorAll('[data-open]').forEach(x=>{
          x.addEventListener('click', ()=>{
            const [kind, id] = x.getAttribute('data-open').split(':');
            openDrawerByKey(kind, id);
          });
        });
        if($('allAddTask')) $('allAddTask').addEventListener('click', ()=> openCreateModal('task'));
        if($('allAddBug')) $('allAddBug').addEventListener('click', ()=> openCreateModal('bug'));
        if($('allAddOps')) $('allAddOps').addEventListener('click', ()=> openCreateModal('ops'));
      }

      function renderMilestones(el){
        const phases = app.board.phases || [];
        const currentSort = app.board.currentPhase?.sort_order || 99;
        const currentId = app.board.currentPhase?.id || null;
        const milestones = app.board.milestones || [];
        const tasks = (app.board.tasks || []).filter(t=>t && !t.is_archived);
        const bugsAll = (app.board.bugs || []).filter(b=>b && !b.is_archived);
        const opsAll = (app.board.ops || []).filter(o=>o && !o.is_archived);
        app.milestoneExpanded = app.milestoneExpanded || {};
        const byPhase = new Map();
        phases.forEach(p=> byPhase.set(p.id, []));
        milestones.forEach(m=>{
          const pid = m.phase_id || currentId || 1;
          if(!byPhase.has(pid)) byPhase.set(pid, []);
          byPhase.get(pid).push(m);
        });

        const phaseLabelForAxis = (p)=>{
          const raw = String(p?.month_range || '').trim();
          if(raw.includes('~')){
            const [a,b] = raw.split('~').map(x=>x.trim());
            const d1 = parseYmdLocal(a), d2 = parseYmdLocal(b);
            if(d1 && d2){
              // 同月：显示“2026年4月”；跨月：显示“2026年7-8月”
              const y1 = d1.getFullYear(), y2 = d2.getFullYear();
              const m1 = d1.getMonth()+1, m2 = d2.getMonth()+1;
              if(y1===y2){
                if(m1===m2) return `${y1}年${m1}月`;
                return `${y1}年${m1}-${m2}月`;
              }
              return `${y1}年${m1}月-${y2}年${m2}月`;
            }
          }
          return raw;
        };

        el.innerHTML = `
          <div class="phase-axis">
            <div class="axis-line">
              ${phases.map((p)=>{
                const cls = p.is_current ? 'axis-node current' : ((p.sort_order||0) < currentSort ? 'axis-node past' : 'axis-node');
                const name = `${phaseLabelForAxis(p) || ''}·${p.theme || p.name || ''}`.replace(/^\s*·\s*/,'').replace(/\s*·\s*$/,'');
                return `
                  <div class="${cls}" data-open="phase:${esc(p.id)}" title="点击编辑阶段">

            const list = (byPhase.get(p.id) || []).slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
            const timeline = buildOverviewMilestoneTimeline(list);
            const listHtml = buildMilestoneTabListHtml(p, timeline, tasks, bugsAll, opsAll);
            const isCurrent = !!p.is_current;
            return `
              <div class="ms-group${isCurrent?' ms-group--current':''}">
                <div class="group-head">
                  <span class="group-badge" data-open="phase:${esc(p.id)}" style="cursor:pointer;" title="点击编辑阶段">${esc(`${p.name || ''}·${phaseLabelForAxis(p) || ''}`.replace(/\s*·\s*$/,''))}</span>
                  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;">
                    <span style="color:var(--text-secondary);font-size:12px;">${esc(p.theme || '')}</span>
                    <button class="btn ghost" type="button" data-add-milestone-phase="${esc(String(p.id))}" style="padding:6px 12px;font-size:12px;flex-shrink:0;">+ 新增里程碑</button>
                  </div>
                </div>
                <div class="milestone-list">
                  ${listHtml}
                </div>
              </div>
            `;
          }).join('')}
        `;

        el.querySelectorAll('[data-open]').forEach(x=>{
          x.addEventListener('click', ()=>{
            const [kind, id] = x.getAttribute('data-open').split(':');
            openDrawerByKey(kind, id);
          });
        });
        el.querySelectorAll('[data-msexpand]').forEach(x=>{
          x.addEventListener('click', (e)=>{
            e.stopPropagation();
            const id = x.getAttribute('data-msexpand');

            });

        el.querySelectorAll('[data-ms-fill-gap]').forEach(x=>{
          x.addEventListener('click', (e)=>{
            e.stopPropagation();
            const ws = x.getAttribute('data-ms-fill-gap');
            const pid = x.getAttribute('data-ms-phase');
            openCreateModalWithDefaults('milestone', {
              week_start: (ws || '').trim(),
              phase_id: pid != null && pid !== '' ? Number(pid) : app.board?.currentPhase?.id,
            });
          });

        el.querySelectorAll('[data-statuspick]').forEach(x=>{
          x.addEventListener('change', async ()=>{
            const [kind, id] = x.getAttribute('data-statuspick').split(':');
            x.className = ('select ' + (x.value ? ('status-' + x.value) : '')).trim();

      function renderBacklog(el){
        const phases = app.board.phases || [];
        if(!app.backlogFilter) app.backlogFilter = { q:'', phase:'', kind:'', pri:'' };
        const f = app.backlogFilter;
        const all = (app.board.backlog || []).filter(backlogRowIsActive);
        const qlow = (f.q || '').trim().toLowerCase();
        const filtered = all.filter(x=>{
          if(f.phase && String(x.phase_id || '') !== String(f.phase)) return false;
          if(f.kind && (x.item_kind || 'task') !== f.kind) return false;
          if(f.pri && (x.priority || 'p2') !== f.pri) return false;
          if(qlow){
            const blob = `${x.name||''} ${x.module||''} ${x.note||''}`.toLowerCase();
            if(!blob.includes(qlow)) return false;
          }
          return true;
        }).slice().sort((a,b)=>{
          const pr = priRank(a.priority) - priRank(b.priority);
          if(pr !== 0) return pr;
          return Number(a.phase_id||0) - Number(b.phase_id||0);
        });

        const phaseOpts = `<option value="">全部阶段</option>` + phases.map(p=>{
          const lab = `${p.name||''} ${p.month_range||''}`.trim();
          const sel = String(f.phase)===String(p.id) ? 'selected' : '';
          return `<option value="${esc(String(p.id))}" ${sel}>${esc(lab)}</option>`;
        }).join('');

        el.innerHTML = `
          <div class="backlog-toolbar">
            <span class="bl-toolbar-title">全部 · ${filtered.length} / ${all.length}</span>
            <input class="input" id="bl_filter_q" type="search" autocomplete="off" placeholder="搜索名称、模块、备注…" value="${esc(f.q||'')}" />
            <select class="select" id="bl_filter_phase" title="按阶段筛选">${phaseOpts}</select>
            <select class="select" id="bl_filter_kind" title="规划类型">
              <option value="" ${f.kind===''?'selected':''}>全部类型</option>
              <option value="task" ${f.kind==='task'?'selected':''}>功能</option>
              <option value="bug" ${f.kind==='bug'?'selected':''}>Bug</option>
              <option value="ops" ${f.kind==='ops'?'selected':''}>运营</option>
            </select>
            <select class="select" id="bl_filter_pri" title="优先级">
              <option value="" ${f.pri===''?'selected':''}>全部优先级</option>
              ${['p0','p1','p2','p3'].map(p=>`<option value="${p}" ${f.pri===p?'selected':''}>${p.toUpperCase()}</option>`).join('')}
            </select>
            <button class="add-btn" id="addBacklogBtn" type="button">+ 新增 Backlog</button>
          </div>
          <div class="backlog-list">
            ${filtered.length ? filtered.map(x=>{
              const pd = priDotCls(x.priority);
              const mod = x.module || '—';
              const phase = phases.find(p=>p.id=== (x.phase_id || phases[0]?.id));
              const kindLab = backlogItemKindLabel(x.item_kind || 'task');
              const verHint = formatBacklogVersionHint(x);
              const platStr = (backlogPlatformsFromVersions(x).slice(0,3).join('/') || (x.platforms||[]).slice(0,2).join('/')).toUpperCase();
              return `
                <div class="bl-row" data-open="backlog:${esc(x.id)}">
                  <span class="pri-dot ${esc(pd)}"></span>
                  <span class="bl-name">${esc(x.name || '未命名')}</span>
                  <div class="bl-tags">
                    <span class="tag">${esc(kindLab)}</span>
                    <span class="tag">${esc(mod)}</span>
                    <span class="tag">${esc(phase ? (phase.name || '') : '阶段')}</span>
                    <span class="tag">${esc(verHint || platStr || '—')}</span>
                  </div>
                </div>
              `;
            }).join('') : (all.length ? `<div class="section">暂无符合条件的 Backlog</div>` : `<div class="section">暂无 Backlog</div>`)}
          </div>
        `;

        const qEl = $('bl_filter_q');
        if(qEl){
          let qTimer = null;
          qEl.addEventListener('input', ()=>{
            const v = qEl.value;
            const c = qEl.selectionStart;
            app.backlogFilter.q = v;
            clearTimeout(qTimer);
            qTimer = setTimeout(()=>{
              render();
              const n = $('bl_filter_q');
              if(n){
                n.value = app.backlogFilter.q || '';
                n.focus();
                const pos = Math.min(typeof c === 'number' ? c : n.value.length, n.value.length);
                try{ n.setSelectionRange(pos, pos); }catch(_e){}
              }
            }, 200);
          });
        }
        const onFilterChange = ()=>{
          app.backlogFilter.phase = $('bl_filter_phase') ? ($('bl_filter_phase').value || '') : '';
          app.backlogFilter.kind = $('bl_filter_kind') ? ($('bl_filter_kind').value || '') : '';
          app.backlogFilter.pri = $('bl_filter_pri') ? ($('bl_filter_pri').value || '') : '';
          render();
        };
        ['bl_filter_phase','bl_filter_kind','bl_filter_pri'].forEach(id=>{
          const s = $(id);
          if(s) s.addEventListener('change', onFilterChange);
        });

        el.querySelectorAll('[data-open]').forEach(x=>{
          x.addEventListener('click', ()=>{
            const [kind, id] = (x.getAttribute('data-open')||'').split(':');
            openDrawerByKey(kind, id);
          });
        });
        $('addBacklogBtn').addEventListener('click', ()=> openCreateModal('backlog'));
      }

      async function refresh(){
        // 当存在待同步队列时，刷新按钮用于“同步/重试”
        await syncNow();
      }

      function openLogin(){
        $('loginModal').classList.add('open');
        $('loginErr').style.display = 'none';
        $('loginErr').textContent = '';
      }
      function closeLogin(){
        $('loginModal').classList.remove('open');
        $('loginErr').style.display = 'none';
      }
      async function doLogin(){
        const email = $('loginEmail').value.trim();
        const password = $('loginPassword').value;
        const err = $('loginErr');
        err.style.display = 'none';
        try{
          await signIn(email, password);
          $('adminBtn').textContent = '已登录 ✓';
          toast('ok', '登录成功');
          closeLogin();
        }catch(e){
          err.textContent = e.message || '登录失败';
          err.style.display = 'block';
        }
      }

      $('refreshBtn').addEventListener('click', ()=> refresh().catch(e=>{ console.warn(e); toast('bad','刷新失败'); }));
      $('syncBtn').addEventListener('click', ()=> syncNow().catch(e=>{ console.warn(e); toast('bad','同步失败'); }));
      $('legacyBtn').addEventListener('click', ()=> window.open(LEGACY_FILE, '_blank'));
      $('adminBtn').addEventListener('click', openLogin);
      $('sidebarToggle').addEventListener('click', ()=>{
        app.sidebarCollapsed = !app.sidebarCollapsed;
        try{ localStorage.setItem('mindback_sidebar_collapsed_v1', app.sidebarCollapsed ? '1' : '0'); }catch(_e){}
        applySidebarCollapsed();
        renderHeader();
      });
      $('loginCancel').addEventListener('click', closeLogin);
      $('loginSubmit').addEventListener('click', doLogin);

      $('overlay').addEventListener('click', (e)=>{ if(e.target === e.currentTarget) closeDrawer(); });
      $('drawerClose').addEventListener('click', closeDrawer);
      document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') { closeDrawer(); closeLogin(); closeCreateModal(); } });
      $('loginModal').addEventListener('click', (e)=>{ if(e.target === e.currentTarget) closeLogin(); });
      $('createModal').addEventListener('click', (e)=>{ if(e.target === e.currentTarget) closeCreateModal(); });
      $('weekPickerModal').addEventListener('click', (e)=>{ if(e.target === e.currentTarget) closeWeekPicker(); });
      $('datePickerModal').addEventListener('click', (e)=>{ if(e.target === e.currentTarget) closeDateOrRangePicker(); });
      $('createCancel').addEventListener('click', closeCreateModal);
      $('createSubmit').addEventListener('click', ()=> submitCreate().catch(e=>{ console.warn(e); toast('bad','新增失败'); }));
      $('wkPrev').addEventListener('click', ()=>{ weekPicker.cursor = new Date(weekPicker.cursor.getFullYear(), weekPicker.cursor.getMonth()-1, 1); renderWeekPicker(); });
      $('wkNext').addEventListener('click', ()=>{ weekPicker.cursor = new Date(weekPicker.cursor.getFullYear(), weekPicker.cursor.getMonth()+1, 1); renderWeekPicker(); });
      $('wkRemove').addEventListener('click', ()=>{
        if(weekPicker.targetElId){
          const el = $(weekPicker.targetElId);
          if(el) el.value = '';
        }
        closeWeekPicker();
      });
      $('wkDone').addEventListener('click', ()=>{
        if(weekPicker.targetElId){
          const el = $(weekPicker.targetElId);
          if(el && weekPicker.weekStart){
            el.value = ymd(weekPicker.weekStart);
          }
        }
        closeWeekPicker();
      });

      $('dpCancel').addEventListener('click', closeDateOrRangePicker);
      $('dpClear').addEventListener('click', ()=>{
        const id = app.datePicker.targetId;
        if(id){
          const el = $(id);
          if(el) el.value = '';
        }
        closeDateOrRangePicker();
      });
      $('dpDone').addEventListener('click', ()=>{
        const id = app.datePicker.targetId;
        if(!id){ closeDateOrRangePicker(); return; }
        const el = $(id);
        if(!el){ closeDateOrRangePicker(); return; }
        const s = ($('dpStart') && $('dpStart').value) ? $('dpStart').value.trim() : '';
        const e = ($('dpEnd') && $('dpEnd').value) ? $('dpEnd').value.trim() : '';
        // 规则：只填开始=单日；开始+起止=范围
        if(s && e) el.value = `${s}~${e}`;
        else el.value = s || '';
        closeDateOrRangePicker();
      });

      (async function init(){
        $('todayStr').textContent = todayStr();
        try{
          // 自动恢复管理员会话（不保存密码，仅保存 token）
          try{
            const rawAuth = localStorage.getItem('mindback_auth_v1');
            const auth = rawAuth ? JSON.parse(rawAuth) : null;
            const rt = auth?.refresh_token || null;
            const at = auth?.access_token || null;
            const exp = Number(auth?.expires_at || 0);
            if(rt){
              // 有 refresh_token：优先刷新一次，保证 token 新鲜
              await refreshSession(rt);
              $('adminBtn').textContent = '已登录 ✓';
            }else if(at){
              // 仅有 access_token：尽力恢复（可能已过期）
              app.accessToken = at;
              app.user = auth?.user || null;
              $('adminBtn').textContent = '已登录 ✓';
            }
          }catch(_e){}
          try{
            const raw = localStorage.getItem('mindback_sidebar_collapsed_v1');
            app.sidebarCollapsed = raw === '1';
          }catch(_e){}
          app.syncQueue = loadQueue();
          const draft = loadLocalDraft();
          const qLen = (app.syncQueue || []).length;
          // 有待同步：必须优先本地草稿（离线队列与前端状态一致）
          // 无待同步：始终拉远端，避免多人协作时被过期 localStorage 草稿覆盖
          if(draft?.board && qLen > 0){
            app.board = draft.board;
            toast('warn', '已加载本地草稿（有待同步变更）');
          }else{
            app.board = await loadBoard();
            saveLocalDraft();
          }
          applySidebarCollapsed();
          render();
        }catch(e){
          console.warn(e);
          $('content').innerHTML = `<div class="section">无法从 Supabase 读取数据，请检查网络或 RLS。</div>`;
          toast('bad','加载失败');
        }
      })();
    </script>
  </body>
</html>
